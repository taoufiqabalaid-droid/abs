<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre des absences — Institut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Libre+Franklin:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F3EEE1;--paper-line:#D9CFB8;--paper-dark:#E7DFC9;--ink:#1B2A3C;--ink-soft:#4A5568;--binder:#22314A;--binder-light:#324667;--absent:#A6303A;--absent-bg:#F5E3E1;--gold:#B8934A;--good:#3E6B4F;--radius:4px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Libre Franklin',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--binder);color:var(--paper);padding:22px 32px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;border-bottom:4px solid var(--gold)}
header h1{font-family:'Fraunces',serif;font-size:26px;margin:0 0 2px}
header .sub{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#C7D1E2}
.header-stats{display:flex;gap:22px}
.header-stat{text-align:right}
.header-stat b{display:block;font-family:'Fraunces',serif;font-size:22px;color:var(--gold)}
.header-stat span{font-size:11px;color:#B9C4D8;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.filters{background:var(--paper-dark);border-bottom:1px solid var(--paper-line);padding:14px 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,input[type="text"],input[type="date"]{font-family:'IBM Plex Mono',monospace;font-size:12.5px;border:1px solid var(--paper-line);background:#fff;padding:8px 10px;border-radius:var(--radius);color:var(--ink)}
input[type="text"]{font-family:'Libre Franklin',sans-serif;min-width:200px}
select:focus,input:focus,button:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}
.filters label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);display:flex;flex-direction:column;gap:4px;font-family:'IBM Plex Mono',monospace}
button{font-family:'Libre Franklin',sans-serif;cursor:pointer}
.btn{background:var(--ink);color:var(--paper);border:none;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;transition:background .15s}
.btn:hover{background:var(--binder-light)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn.ghost:hover{background:rgba(0,0,0,.05)}
.btn.danger{background:var(--absent);color:#fff}
.btn.danger:hover{background:#8a252e}
.btn.gold{background:var(--gold);color:#fff}
.btn.gold:hover{background:#9a7a3c}
.spacer{flex:1}
.body-grid{display:grid;grid-template-columns:1fr 260px;gap:0;flex:1}
@media(max-width:900px){.body-grid{grid-template-columns:1fr}}
main{padding:22px 32px 40px}
aside{border-left:1px solid var(--paper-line);padding:22px 20px;display:flex;flex-direction:column;gap:20px}
.stats-title{font-family:'Fraunces',serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 8px}
.top-item{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px dotted var(--paper-line)}
.top-item:last-child{border-bottom:none}
.top-item b{font-family:'IBM Plex Mono',monospace;color:var(--absent)}
.roster{background:rgba(255,255,255,.55);border:1px solid var(--paper-line);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);padding:10px 12px;border-bottom:1px solid var(--paper-line);background:var(--paper-dark);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--paper-line);vertical-align:top;font-size:13px}
tbody tr:hover{background:rgba(166,48,58,.04)}
tbody tr:last-child td{border-bottom:none}
.cell-date{font-family:'IBM Plex Mono',monospace;white-space:nowrap;font-size:12px}
.cell-seance{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);white-space:nowrap}
.cell-name{font-weight:600}
.tag{display:inline-block;font-size:10.5px;font-family:'IBM Plex Mono',monospace;background:var(--binder);color:var(--paper);padding:2px 6px;border-radius:3px;margin-right:4px}
.cell-module{font-size:12.5px;color:var(--ink-soft);max-width:220px}
.cell-obs{font-size:12px;color:var(--ink-soft);font-style:italic;max-width:160px}
.row-actions{white-space:nowrap}
.icon-btn{background:none;border:none;color:var(--ink-soft);font-size:14px;opacity:.55;margin-right:6px;cursor:pointer;padding:2px 4px}
.icon-btn:hover{opacity:1;color:var(--absent)}
.empty{padding:50px 20px;text-align:center;color:var(--ink-soft);font-family:'Fraunces',serif;font-size:16px}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink-soft)}
.pagination button{background:#fff;border:1px solid var(--paper-line);border-radius:var(--radius);padding:6px 10px;font-size:12px}
.pagination button:disabled{opacity:.4;cursor:default}
.results-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);padding:0 2px 10px}
.modal-backdrop{position:fixed;inset:0;background:rgba(27,42,60,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);border-radius:8px;padding:24px;width:480px;max-width:100%;box-shadow:0 14px 36px rgba(0,0,0,.25);border:1px solid var(--paper-line);max-height:88vh;overflow:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal.wide{width:640px}
.modal h3{margin:0 0 16px;font-family:'Fraunces',serif;font-size:18px}
.field{margin-bottom:12px;display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace}
.field input,.field select,.field textarea{width:100%;font-family:'Libre Franklin',sans-serif;font-size:13.5px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:8px 10px;background:#fff}
.field textarea{resize:vertical;min-height:50px;font-family:'Libre Franklin',sans-serif}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.loading{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;color:var(--ink-soft);font-size:15px;z-index:100}
.student-picker{border:1px solid var(--paper-line);border-radius:var(--radius);background:#fff;padding:8px;display:flex;flex-direction:column;gap:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip-row:empty{display:none}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--binder);color:var(--paper);font-size:12px;font-family:'Libre Franklin',sans-serif;padding:4px 6px 4px 10px;border-radius:999px}
.chip button{background:none;border:none;color:var(--paper);opacity:.7;cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.chip button:hover{opacity:1}
.student-input-row{position:relative}
.student-suggestions{position:absolute;z-index:5;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid var(--paper-line);border-radius:var(--radius);max-height:160px;overflow-y:auto;box-shadow:0 6px 18px rgba(0,0,0,.12)}
.student-suggestions div{padding:7px 10px;font-size:12.5px;cursor:pointer}
.student-suggestions div:hover,.student-suggestions div.active{background:var(--paper-dark)}
.picker-hint{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace}
.mgmt-list{max-height:340px;overflow-y:auto;border:1px solid var(--paper-line);border-radius:var(--radius);background:#fff}
.mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--paper-line);font-size:13px;gap:8px}
.mgmt-item:last-child{border-bottom:none}
.mgmt-item:hover{background:var(--paper-dark)}
.mgmt-item-info{flex:1;min-width:0}
.mgmt-item-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mgmt-item-meta{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace}
.mgmt-item .btn{padding:4px 10px;font-size:11px;flex-shrink:0}
.mgmt-search{margin-bottom:12px}
.drop-zone{border:2px dashed var(--paper-line);border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(184,147,74,.06)}
.drop-zone-icon{font-size:32px;margin-bottom:8px;opacity:.5}
.drop-zone-text{font-size:13px;color:var(--ink-soft);margin-bottom:4px}
.drop-zone-hint{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;opacity:.7}
.preview-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
.preview-table th{background:var(--paper-dark);font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;text-align:left;border-bottom:1px solid var(--paper-line)}
.preview-table td{padding:5px 8px;border-bottom:1px solid var(--paper-line)}
.preview-table .dup{color:var(--gold);font-style:italic}
.preview-table .new{color:var(--good);font-weight:600}
.import-stats{display:flex;gap:16px;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;font-size:12px}
.import-stats span{display:flex;align-items:center;gap:4px}
.import-stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.confirm-box{background:var(--absent-bg);border:1px solid var(--absent);border-radius:var(--radius);padding:14px;margin-bottom:14px;font-size:13px;line-height:1.5}
.confirm-box strong{color:var(--absent)}
.format-info{background:rgba(255,255,255,.6);border:1px solid var(--paper-line);border-radius:var(--radius);padding:12px;margin-bottom:14px;font-size:12px;line-height:1.6;color:var(--ink-soft)}
.format-info code{background:var(--paper-dark);padding:1px 5px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px}
.xls-loading{text-align:center;padding:40px;font-family:'Fraunces',serif;color:var(--ink-soft)}
.xls-loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--paper-line);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

var xlsxLoaded = false;
var xlsxLoading = false;

function loadXlsxLib() {
  return new Promise(function(resolve, reject) {
    if (xlsxLoaded && window.XLSX) { resolve(); return; }
    if (xlsxLoading) {
      var check = setInterval(function() {
        if (xlsxLoaded) { clearInterval(check); resolve(); }
      }, 100);
      setTimeout(function() { clearInterval(check); reject(new Error('Timeout')); }, 15000);
      return;
    }
    xlsxLoading = true;
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = function() { xlsxLoaded = true; xlsxLoading = false; resolve(); };
    s.onerror = function() { xlsxLoading = false; reject(new Error('Impossible de charger la bibliothèque Excel. Vérifiez votre connexion internet.')); };
    document.head.appendChild(s);
  });
}

  try { var s = localStorage.getItem(LS_MOD_KEY); if (s) { moduleRegistry = JSON.parse(s); return; } } catch(e) {}
  moduleRegistry = {};
  SEED.forEach(function(r) { if (!r.module) return; var k = (r.filiere||'')+'_'+(r.semestre||''); if (!moduleRegistry[k]) moduleRegistry[k]=[]; if (moduleRegistry[k].indexOf(r.module)===-1) moduleRegistry[k].push(r.module); });

}
function saveModuleRegistry() { try { localStorage.setItem(LS_MOD_KEY, JSON.stringify(moduleRegistry)); } catch(e) {} }
function loadRecords() {
  try { var s = localStorage.getItem(LS_KEY); if (s) { state.records = JSON.parse(s); return; } } catch(e) {}
  state.records = JSON.parse(JSON.stringify(SEED)); saveRecords();

function saveRecords() { try { localStorage.setItem(LS_KEY, JSON.stringify(state.records)); } catch(e) {} }

function unique(arr) { var seen = {}; return arr.filter(function(x) { if (seen[x]) return false; seen[x]=true; return true; }); }
function getFilieres() { return unique(state.records.map(function(r){return r.filiere}).filter(Boolean)).sort(); }
function getSemestres() { return unique(state.records.map(function(r){return r.semestre}).filter(Boolean)).sort(); }
function getModulesForFilter() {
  var f=state.filters.filiere, s=state.filters.semestre;
  var mods = state.records.filter(function(r){ if(f&&r.filiere!==f) return false; if(s&&r.semestre!==s) return false; return r.module; }).map(function(r){return r.module});
  return unique(mods).sort();
}
function getModulesForForm(fil, sem) {
  var key = (fil||'')+'_'+(sem||'');

  var rec = state.records.filter(function(r){ return (!fil||r.filiere===fil)&&(!sem||r.semestre===sem)&&r.module; }).map(function(r){return r.module});
  return unique(reg.concat(rec)).sort();
}
function getStudentsForForm(fil, sem) {
  return unique(state.records.filter(function(r){ return (!fil||r.filiere===fil)&&(!sem||r.semestre===sem)&&r.etudiant; }).map(function(r){return r.etudiant})).sort();

function getAllStudents() {
  var map = {};
  state.records.forEach(function(r) { if(!r.etudiant) return; if(!map[r.etudiant]) map[r.etudiant]={name:r.etudiant, filieres:{}, count:0}; var e=map[r.etudiant]; if(r.filiere) e.filieres[r.filiere]=1; e.count++; });
  return Object.keys(map).map(function(k){ var e=map[k]; e.filieres=Object.keys(e.filieres).sort(); return e; }).sort(function(a,b){return a.name.localeCompare(b.name)});
}
function getAllModules() {
  var map = {};
  state.records.forEach(function(r) { if(!r.module) return; var k=r.module+'||'+(r.filiere||'')+'||'+(r.semestre||''); if(!map[k]) map[k]={name:r.module,filiere:r.filiere||'',semestre:r.semestre||'',count:0}; map[k].count++; });
  Object.keys(moduleRegistry).forEach(function(key) { var p=key.split('_'), f=p[0]||'', s=p[1]||''; (moduleRegistry[key]||[]).forEach(function(m) { var fk=m+'||'+f+'||'+s; if(!map[fk]) map[fk]={name:m,filiere:f,semestre:s,count:0}; }); });
  return Object.keys(map).map(function(k){return map[k]}).sort(function(a,b){return a.name.localeCompare(b.name)});
}
function formatDate(d) { if(!d) return '\u2014'; var p=d.split('-'); if(p.length!==3) return d; return p[2]+'/'+p[1]+'/'+p[0]; }
function filteredRecords() {
  var f=state.filters;
  return state.records.filter(function(r) {
    if(f.filiere && r.filiere!==f.filiere) return false;
    if(f.semestre && r.semestre!==f.semestre) return false;
    if(f.module && r.module!==f.module) return false;
    if(f.dateFrom && r.date && r.date<f.dateFrom) return false;
    if(f.dateTo && r.date && r.date>f.dateTo) return false;
    if(f.search) { var q=f.search.toLowerCase(); if(!(r.etudiant||'').toLowerCase().indexOf(q)>=0 && !(r.module||'').toLowerCase().indexOf(q)>=0 && !(r.observation||'').toLowerCase().indexOf(q)>=0) return false; }
    return true;
  });
}
function topAbsent(n) {
  var map={};
  state.records.forEach(function(r) { if(!r.etudiant) return; if(state.filters.filiere&&r.filiere!==state.filters.filiere) return; if(state.filters.semestre&&r.semestre!==state.filters.semestre) return; map[r.etudiant]=(map[r.etudiant]||0)+1; });
  return Object.keys(map).map(function(k){return [k,map[k]]}).sort(function(a,b){return b[1]-a[1]}).slice(0,n);
}
function newId() {
  var m=0; state.records.forEach(function(r){ var n=parseInt(r.id.replace('r',''),10); if(n>m) m=n; }); return 'r'+String(m+1).padStart(4,'0');
}

/* ══════════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════════ */
var toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

/* ══════════════════════════════════════════════════════════════
   RENDU PRINCIPAL
   ══════════════════════════════════════════════════════════════ */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderApp() {
  var app = document.getElementById('app');
  var filieres = getFilieres(), semestres = getSemestres(), modules = getModulesForFilter();
  var recs = filteredRecords(), total = recs.length;
  var totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (state.page > totalPages) state.page = totalPages;
  var pageRecs = recs.slice((state.page-1)*PER_PAGE, state.page*PER_PAGE);
  var top = topAbsent(8), totalAbs = state.records.length;

  var h = '';
  // HEADER
  h += '<header><div><h1>Registre des absences</h1><div class="sub">Institut des Sciences de la Sant\u00e9 \u2014 Gestion acad\u00e9mique</div></div>';
  h += '<div class="header-stats">';
  h += '<div class="header-stat"><b>'+totalAbs+'</b><span>Absences</span></div>';
  h += '<div class="header-stat"><b>'+getAllStudents().length+'</b><span>\u00c9tudiants</span></div>';
  h += '<div class="header-stat"><b>'+getAllModules().length+'</b><span>Modules</span></div>';
  h += '</div></header>';

  // FILTERS
  h += '<div class="filters">';
  h += '<label>Fili\u00e8re<select id="fFiliere"><option value="">Toutes</option>';
  filieres.forEach(function(f){ h += '<option value="'+esc(f)+'"'+(state.filters.filiere===f?' selected':'')+'>'+esc(f)+'</option>'; });
  h += '</select></label>';
  h += '<label>Semestre<select id="fSemestre"><option value="">Tous</option>';
  semestres.forEach(function(s){ h += '<option value="'+esc(s)+'"'+(state.filters.semestre===s?' selected':'')+'>'+esc(s)+'</option>'; });
  h += '</select></label>';
  h += '<label>Module<select id="fModule"><option value="">Tous</option>';
  modules.forEach(function(m){ h += '<option value="'+esc(m)+'"'+(state.filters.module===m?' selected':'')+'>'+esc(m)+'</option>'; });
  h += '</select></label>';
  h += '<label>Du<input type="date" id="fFrom" value="'+(state.filters.dateFrom||'')+'"></label>';
  h += '<label>Au<input type="date" id="fTo" value="'+(state.filters.dateTo||'')+'"></label>';
  h += '<label>Rechercher<input type="text" id="fSearch" placeholder="Nom, module..." value="'+esc(state.filters.search||'')+'"></label>';
  h += '<div class="spacer"></div>';
  h += '<button class="btn" onclick="openAbsenceModal()">+ Absence</button>';
  h += '<button class="btn ghost" onclick="openStudentMgmt()">G\u00e9rer \u00e9tudiants</button>';
  h += '<button class="btn ghost" onclick="openModuleMgmt()">G\u00e9rer modules</button>';
  h += '</div>';

  // BODY
  h += '<div class="body-grid"><main>';
  h += '<div class="results-count">'+total+' r\u00e9sultat'+(total!==1?'s':'')+'</div>';
  h += '<div class="roster">';
  if (pageRecs.length) {
    h += '<table><thead><tr><th>Date</th><th>S\u00e9ance</th><th>\u00c9tudiant</th><th>Fili\u00e8re</th><th>Module</th><th>Obs.</th><th></th></tr></thead><tbody>';
    pageRecs.forEach(function(r) {
      h += '<tr>';
      h += '<td class="cell-date">'+formatDate(r.date)+'</td>';
      h += '<td class="cell-seance">'+esc(r.seance||'\u2014')+'</td>';
      h += '<td class="cell-name">'+esc(r.etudiant)+'</td>';
      h += '<td><span class="tag">'+esc(r.filiere)+'</span> '+(r.semestre||'')+'</td>';
      h += '<td class="cell-module">'+esc(r.module)+'</td>';
      h += '<td class="cell-obs">'+esc(r.observation||'')+'</td>';
      h += '<td class="row-actions">';
      h += '<button class="icon-btn" title="Modifier" onclick="openAbsenceModal(\''+r.id+'\')">&#9998;</button>';
      h += '<button class="icon-btn" title="Supprimer" onclick="deleteRecord(\''+r.id+'\')">&#10005;</button>';
      h += '</td></tr>';
    });
    h += '</tbody></table>';
  } else {
    h += '<div class="empty">Aucune absence enregistr\u00e9e pour ces crit\u00e8res.</div>';
  }
  h += '</div>';
  if (totalPages > 1) {
    h += '<div class="pagination">';
    h += '<button'+(state.page<=1?' disabled':'')+' onclick="goPage('+(state.page-1)+')">Pr\u00e9c.</button>';
    h += '<span>'+state.page+' / '+totalPages+'</span>';
    h += '<button'+(state.page>=totalPages?' disabled':'')+' onclick="goPage('+(state.page+1)+')">Suiv.</button>';
    h += '</div>';
  }
  h += '</main><aside>';

  // SIDEBAR
  h += '<div><p class="stats-title">Absences les plus fr\u00e9quentes</p>';
  if (top.length) { top.forEach(function(t){ h += '<div class="top-item"><span>'+esc(t[0])+'</span><b>'+t[1]+'</b></div>'; }); }
  else { h += '<div class="top-item"><span style="color:var(--ink-soft)">Aucune donn\u00e9e</span></div>'; }
  h += '</div><div><p class="stats-title">R\u00e9partition par fili\u00e8re</p>';
  filieres.forEach(function(f) { var c=state.records.filter(function(r){return r.filiere===f}).length; var pct=totalAbs?Math.round(c/totalAbs*100):0; h += '<div class="top-item"><span>'+esc(f)+'</span><b>'+c+' ('+pct+'%)</b></div>'; });
  h += '</div></aside></div>';

  app.innerHTML = h;

  // Attacher événements filtres
  document.getElementById('fFiliere').onchange = function(e){ state.filters.filiere=e.target.value; state.page=1; renderApp(); };
  document.getElementById('fSemestre').onchange = function(e){ state.filters.semestre=e.target.value; state.page=1; renderApp(); };
  document.getElementById('fModule').onchange = function(e){ state.filters.module=e.target.value; state.page=1; renderApp(); };
  document.getElementById('fFrom').onchange = function(e){ state.filters.dateFrom=e.target.value; state.page=1; renderApp(); };
  document.getElementById('fTo').onchange = function(e){ state.filters.dateTo=e.target.value; state.page=1; renderApp(); };
  var st;
  document.getElementById('fSearch').oninput = function(e){ clearTimeout(st); st=setTimeout(function(){ state.filters.search=e.target.value; state.page=1; renderApp(); }, 250); };
}

function goPage(p) { state.page = p; renderApp(); }

/* ══════════════════════════════════════════════════════════════
   SUPPRESSION D'UN ENREGISTREMENT
   ══════════════════════════════════════════════════════════════ */
function deleteRecord(id) {
  var r = state.records.find(function(x){return x.id===id});
  if (!r) return;
  openConfirmModal('Supprimer cette absence ?',
    '<strong>'+esc(r.etudiant)+'</strong> \u2014 '+esc(r.module)+'<br>'+formatDate(r.date)+' '+(r.seance||''),
    function() { state.records = state.records.filter(function(x){return x.id!==id}); saveRecords(); renderApp(); showToast('Absence supprim\u00e9e.'); }
  );
}

/* ══════════════════════════════════════════════════════════════
   MODALE DE CONFIRMATION
   ══════════════════════════════════════════════════════════════ */
function openConfirmModal(title, body, onConfirm) {
  var bd = document.createElement('div'); bd.className = 'modal-backdrop';
  bd.innerHTML = '<div class="modal" style="width:380px"><h3>'+title+'</h3><div class="confirm-box">'+body+'</div><div class="modal-actions"><button class="btn ghost" id="cfC">Annuler</button><button class="btn danger" id="cfO">Confirmer la suppression</button></div></div>';
  document.body.appendChild(bd);
  bd.querySelector('#cfC').onclick = function(){ bd.remove(); };
  bd.querySelector('#cfO').onclick = function(){ bd.remove(); onConfirm(); };
  bd.onclick = function(e){ if(e.target===bd) bd.remove(); };
}

/* ══════════════════════════════════════════════════════════════
   MODALE D'ABSENCE
   ══════════════════════════════════════════════════════════════ */
function openAbsenceModal(editId) {
  var rec = editId ? state.records.find(function(r){return r.id===editId}) : null;
  var isEdit = !!rec;
  var filieres = getFilieres(), semestres = getSemestres();
  var defF = rec ? rec.filiere : state.filters.filiere || '';
  var defS = rec ? rec.semestre : state.filters.semestre || '';

  var bd = document.createElement('div'); bd.className = 'modal-backdrop';
  var html = '<div class="modal"><h3>'+(isEdit?"Modifier l'absence":"Nouvelle absence")+'</h3>';
  html += '<div class="two-col">';
  html += '<div class="field"><label>Fili\u00e8re</label><select id="aFil"><option value="">--</option>';
  filieres.forEach(function(f){ html+='<option value="'+esc(f)+'"'+(f===defF?' selected':'')+'>'+esc(f)+'</option>'; });
  html += '<option value="__new">+ Nouvelle fili\u00e8re</option></select></div>';
  html += '<div class="field"><label>Semestre</label><select id="aSem"><option value="">--</option>';
  semestres.forEach(function(s){ html+='<option value="'+esc(s)+'"'+(s===defS?' selected':'')+'>'+esc(s)+'</option>'; });
  html += '<option value="__new">+ Nouveau</option></select></div></div>';
  html += '<div id="nfField" class="field" style="display:none"><label>Nom de la fili\u00e8re</label><input type="text" id="aNFil" placeholder="Ex: SM, SMI..."></div>';
  html += '<div id="nsField" class="field" style="display:none"><label>Nom du semestre</label><input type="text" id="aNSem" placeholder="Ex: S3"></div>';
  html += '<div class="field"><label>Module</label><select id="aMod"><option value="">\u2014 Choisir \u2014</option></select></div>';
  html += '<div class="field"><label>\u00c9tudiants absents</label><div class="student-picker" id="sPicker"><div class="chip-row" id="chipRow"></div><div class="student-input-row"><input type="text" id="sInput" placeholder="Taper un nom..." autocomplete="off"><div class="student-suggestions" id="sSug" style="display:none"></div></div><div class="picker-hint">Tapez pour rechercher, puis cliquez pour ajouter</div></div></div>';
  html += '<div class="two-col"><div class="field"><label>Date</label><input type="date" id="aDate" value="'+(rec?rec.date||'':'')+'"></div>';
  html += '<div class="field"><label>S\u00e9ance</label><select id="aSea"><option value="">\u2014 Choisir \u2014</option>';
  ['08H30 - 10H30','08H30 - 12H30','10H30 - 12H30','14H00 - 16H00','14H00 - 18H00','15H00 - 18H00','16H00 - 18H00'].forEach(function(s){ html+='<option value="'+s+'"'+(rec&&rec.seance===s?' selected':'')+'>'+s+'</option>'; });
  html += '<option value="__c">Autre...</option></select></div></div>';
  html += '<div id="csField" class="field" style="display:none"><label>Horaire personnalis\u00e9</label><input type="text" id="aCSea" placeholder="Ex: 09H00 - 11H00"></div>';
  html += '<div class="field"><label>Observation</label><textarea id="aObs" rows="2">'+(rec?esc(rec.observation||''):'')+'</textarea></div>';
  html += '<div class="modal-actions"><button class="btn ghost" id="aC">Annuler</button><button class="btn" id="aS">'+(isEdit?'Enregistrer':'Ajouter')+'</button></div></div>';
  bd.innerHTML = html;
  document.body.appendChild(bd);

  var selected = rec ? [rec.etudiant] : [];
  var sugIdx = -1;

  function refreshChips() {
    var row = bd.querySelector('#chipRow');
    row.innerHTML = '';
    selected.forEach(function(s, i) {
      var chip = document.createElement('span'); chip.className = 'chip'; chip.textContent = s;
      var btn = document.createElement('button'); btn.textContent = '\u00d7'; btn.onclick = function(){ selected.splice(i,1); refreshChips(); };
      chip.appendChild(btn); row.appendChild(chip);
    });
  }
  refreshChips();

  function getCurFil() { return bd.querySelector('#aFil').value==='__new' ? bd.querySelector('#aNFil').value.trim() : bd.querySelector('#aFil').value; }
  function getCurSem() { return bd.querySelector('#aSem').value==='__new' ? bd.querySelector('#aNSem').value.trim() : bd.querySelector('#aSem').value; }

  function refreshModules() {
    var f=getCurFil(), s=getCurSem(), mods=getModulesForForm(f,s), curVal=rec?rec.module:'';
    var sel=bd.querySelector('#aMod');
    sel.innerHTML='<option value="">\u2014 Choisir \u2014</option>';
    mods.forEach(function(m){ sel.innerHTML+='<option value="'+esc(m)+'"'+(m===curVal?' selected':'')+'>'+esc(m)+'</option>'; });
  }

  function refreshSug(q) {
    var f=getCurFil(), s=getCurSem(), all=getStudentsForForm(f,s), ql=q.toLowerCase();
    var filtered = ql ? all.filter(function(n){ return n.toLowerCase().indexOf(ql)>=0 && selected.indexOf(n)===-1; }) : all.filter(function(n){ return selected.indexOf(n)===-1; });
    var box=bd.querySelector('#sSug');
    if(!filtered.length){ box.style.display='none'; return; }
    sugIdx=-1; box.innerHTML=''; box.style.display='block';
    filtered.forEach(function(n){
      var d=document.createElement('div'); d.textContent=n;
      d.onmousedown=function(){ if(selected.indexOf(n)===-1){ selected.push(n); refreshChips(); } bd.querySelector('#sInput').value=''; box.style.display='none'; };
      box.appendChild(d);
    });
  }

  bd.querySelector('#aFil').onchange = function(e){ bd.querySelector('#nfField').style.display=e.target.value==='__new'?'':'none'; refreshModules(); };
  bd.querySelector('#aSem').onchange = function(e){ bd.querySelector('#nsField').style.display=e.target.value==='__new'?'':'none'; refreshModules(); };
  bd.querySelector('#aNFil').oninput = refreshModules;
  bd.querySelector('#aNSem').oninput = refreshModules;
  bd.querySelector('#aSea').onchange = function(e){ bd.querySelector('#csField').style.display=e.target.value==='__c'?'':'none'; };

  var sInput = bd.querySelector('#sInput');
  sInput.oninput = function(){ refreshSug(sInput.value); };
  sInput.onfocus = function(){ refreshSug(sInput.value); };
  sInput.onkeydown = function(e) {
    var items = bd.querySelector('#sSug').children;
    if(e.key==='ArrowDown'){ e.preventDefault(); sugIdx=Math.min(sugIdx+1,items.length-1); hlSug(items); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); sugIdx=Math.max(sugIdx-1,0); hlSug(items); }
    else if(e.key==='Enter' && sugIdx>=0 && items[sugIdx]){ e.preventDefault(); var name=items[sugIdx].textContent; if(selected.indexOf(name)===-1){selected.push(name);refreshChips();} sInput.value=''; bd.querySelector('#sSug').style.display='none'; }
  };
  function hlSug(items){ for(var i=0;i<items.length;i++) items[i].className=(i===sugIdx?'active':''); if(items[sugIdx]) items[sugIdx].scrollIntoView({block:'nearest'}); }

  refreshModules();

  bd.querySelector('#aC').onclick = function(){ bd.remove(); };
  bd.querySelector('#aS').onclick = function() {
    var f=getCurFil(), s=getCurSem(), mod=bd.querySelector('#aMod').value, date=bd.querySelector('#aDate').value;
    var sea=bd.querySelector('#aSea').value; if(sea==='__c') sea=bd.querySelector('#aCSea').value.trim();
    var obs=bd.querySelector('#aObs').value.trim()||null;
    if(!f){ showToast('Veuillez choisir une fili\u00e8re.'); return; }
    if(!s){ showToast('Veuillez choisir un semestre.'); return; }
    if(!mod){ showToast('Veuillez choisir un module.'); return; }
    if(!selected.length){ showToast('Veuillez ajouter au moins un \u00e9tudiant.'); return; }
    if(isEdit) state.records = state.records.filter(function(r){return r.id!==editId});
    selected.forEach(function(name){ state.records.push({id:newId(),filiere:f,semestre:s,module:mod,etudiant:name,date:date||null,seance:sea||null,observation:obs}); });
    saveRecords(); bd.remove(); renderApp();
    showToast(isEdit?'Absence modifi\u00e9e.':selected.length+' absence(s) ajout\u00e9e(s).');
  };
  bd.onclick = function(e){ if(e.target===bd) bd.remove(); };
}

/* ══════════════════════════════════════════════════════════════
   GESTION DES ÉTUDIANTS
   ══════════════════════════════════════════════════════════════ */
function openStudentMgmt(q) {
  var students = getAllStudents();
  var ql = (q||'').toLowerCase();
  var filtered = ql ? students.filter(function(s){ return s.name.toLowerCase().indexOf(ql)>=0; }) : students;

  var bd = document.createElement('div'); bd.className = 'modal-backdrop';
  var html = '<div class="modal wide"><h3>Gestion des \u00e9tudiants <span style="font-size:13px;color:var(--ink-soft);font-family:\'IBM Plex Mono\',monospace">('+students.length+' au total)</span></h3>';
  html += '<div class="mgmt-search"><input type="text" id="stuS" placeholder="Rechercher un \u00e9tudiant..." value="'+esc(q||'')+'" style="width:100%;font-family:\'Libre Franklin\',sans-serif;font-size:13.5px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:8px 10px;background:#fff"></div>';
  html += '<div class="mgmt-list" id="stuL">';
  if(filtered.length) {
    filtered.forEach(function(s){
      html += '<div class="mgmt-item"><div class="mgmt-item-info"><div class="mgmt-item-name">'+esc(s.name)+'</div><div class="mgmt-item-meta">'+esc(s.filieres.join(', '))+' \u2014 '+s.count+' absence'+(s.count>1?'s':'')+'</div></div>';
      html += '<button class="btn danger" data-n="'+esc(s.name)+'" data-c="'+s.count+'">Supprimer</button></div>';
    });
  } else { html += '<div class="empty" style="padding:30px">Aucun \u00e9tudiant trouv\u00e9.</div>'; }
  html += '</div><div class="modal-actions"><button class="btn ghost" id="stuX">Fermer</button></div></div>';
  bd.innerHTML = html; document.body.appendChild(bd);

  var st;
  bd.querySelector('#stuS').oninput = function(e){ clearTimeout(st); st=setTimeout(function(){ var v=e.target.value; bd.remove(); openStudentMgmt(v); }, 300); };

  bd.querySelectorAll('.btn.danger').forEach(function(btn){
    btn.onclick = function(){
      var name=btn.getAttribute('data-n'), count=parseInt(btn.getAttribute('data-c'),10);
      openConfirmModal('Supprimer un \u00e9tudiant',
        'Voulez-vous supprimer <strong>'+esc(name)+'</strong> et ses <strong>'+count+'</strong> enregistrement(s) d\'absence ? Cette action est irr\u00e9versible.',
        function(){ state.records=state.records.filter(function(r){return r.etudiant!==name}); saveRecords(); var sv=bd.querySelector('#stuS').value; bd.remove(); openStudentMgmt(sv); renderApp(); showToast('\u00c9tudiant "'+name+'" supprim\u00e9 ('+count+' absences retir\u00e9es).'); }
      );
    };
  });
  bd.querySelector('#stuX').onclick = function(){ bd.remove(); };
  bd.onclick = function(e){ if(e.target===bd) bd.remove(); };
}

/* ══════════════════════════════════════════════════════════════
   GESTION DES MODULES
   ══════════════════════════════════════════════════════════════ */
function openModuleMgmt(q) {
  var modules = getAllModules();
  var ql = (q||'').toLowerCase();
  var filtered = ql ? modules.filter(function(m){ return m.name.toLowerCase().indexOf(ql)>=0 || m.filiere.toLowerCase().indexOf(ql)>=0; }) : modules;

  var bd = document.createElement('div'); bd.className = 'modal-backdrop';
  var html = '<div class="modal wide"><h3>Gestion des modules <span style="font-size:13px;color:var(--ink-soft);font-family:\'IBM Plex Mono\',monospace">('+modules.length+' au total)</span></h3>';
  html += '<div class="mgmt-search"><input type="text" id="modS" placeholder="Rechercher un module..." value="'+esc(q||'')+'" style="width:100%;font-family:\'Libre Franklin\',sans-serif;font-size:13.5px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:8px 10px;background:#fff;margin-bottom:10px">';
  html += '<button class="btn gold" id="modImp" style="width:100%">Importer des modules depuis Excel</button></div>';
  html += '<div class="mgmt-list" id="modL" style="max-height:280px">';
  if(filtered.length) {
    filtered.forEach(function(m){
      html += '<div class="mgmt-item"><div class="mgmt-item-info"><div class="mgmt-item-name">'+esc(m.name)+'</div><div class="mgmt-item-meta"><span class="tag" style="margin:0">'+esc(m.filiere)+'</span> '+esc(m.semestre)+' \u2014 '+m.count+' absence'+(m.count>1?'s':'')+'</div></div>';
      html += '<button class="btn danger" data-n="'+esc(m.name)+'" data-f="'+esc(m.filiere)+'" data-s="'+esc(m.semestre)+'" data-c="'+m.count+'">Supprimer</button></div>';
    });
  } else { html += '<div class="empty" style="padding:30px">Aucun module trouv\u00e9.</div>'; }
  html += '</div><div class="modal-actions"><button class="btn ghost" id="modX">Fermer</button></div></div>';
  bd.innerHTML = html; document.body.appendChild(bd);

  var st;
  bd.querySelector('#modS').oninput = function(e){ clearTimeout(st); st=setTimeout(function(){ var v=e.target.value; bd.remove(); openModuleMgmt(v); }, 300); };

  bd.querySelector('#modImp').onclick = function(){ var sv=bd.querySelector('#modS').value; bd.remove(); openExcelImportModal(sv); };

  bd.querySelectorAll('.btn.danger').forEach(function(btn){
    btn.onclick = function(){
      var name=btn.getAttribute('data-n'), fil=btn.getAttribute('data-f'), sem=btn.getAttribute('data-s'), count=parseInt(btn.getAttribute('data-c'),10);
      var msg = count>0 ? 'Voulez-vous supprimer le module <strong>'+esc(name)+'</strong> ('+esc(fil)+' / '+esc(sem)+') et ses <strong>'+count+'</strong> enregistrement(s) d\'absence ?' : 'Voulez-vous supprimer le module <strong>'+esc(name)+'</strong> ('+esc(fil)+' / '+esc(sem)+') du registre ?';
      openConfirmModal('Supprimer un module', msg, function(){
        state.records=state.records.filter(function(r){ return !(r.module===name && r.filiere===fil && r.semestre===sem); });
        saveRecords();
        var key=fil+'_'+sem;
        if(moduleRegistry[key]){ moduleRegistry[key]=moduleRegistry[key].filter(function(m){return m!==name}); if(!moduleRegistry[key].length) delete moduleRegistry[key]; saveModuleRegistry(); }
        var sv=bd.querySelector('#modS').value; bd.remove(); openModuleMgmt(sv); renderApp();
        showToast('Module "'+name+'" supprim\u00e9.'+(count>0?' ('+count+' absences retir\u00e9es)':''));
      });
    };
  });
  bd.querySelector('#modX').onclick = function(){ bd.remove(); };
  bd.onclick = function(e){ if(e.target===bd) bd.remove(); };
}

/* ══════════════════════════════════════════════════════════════
   IMPORT EXCEL (chargement dynamique de SheetJS)
   ══════════════════════════════════════════════════════════════ */
var pendingImport = null;

function openExcelImportModal(returnSearch) {
  pendingImport = null;

  var bd = document.createElement('div'); bd.className = 'modal-backdrop';
  var html = '<div class="modal wide"><h3>Importer des modules depuis Excel</h3>';
  html += '<div class="format-info"><strong>Format attendu du fichier :</strong><br>Le fichier Excel (.xlsx, .xls, .csv) doit contenir les colonnes suivantes :<br><code>Module</code> (obligatoire) \u2014 Nom du module<br><code>Fili\u00e8re</code> (optionnel) \u2014 Si absent, valeur par d\u00e9faut<br><code>Semestre</code> (optionnel) \u2014 Si absent, valeur par d\u00e9faut<br><br>La premi\u00e8re ligne doit contenir les en-t\u00eates de colonnes.</div>';
  html += '<div class="two-col" style="margin-bottom:14px">';
  html += '<div class="field"><label>Fili\u00e8re par d\u00e9faut</label><select id="xlF"><option value="">\u2014 Aucune \u2014</option>';
  getFilieres().forEach(function(f){ html+='<option value="'+esc(f)+'">'+esc(f)+'</option>'; });
  html += '</select></div>';
  html += '<div class="field"><label>Semestre par d\u00e9faut</label><select id="xlS"><option value="">\u2014 Aucun \u2014</option>';
  getSemestres().forEach(function(s){ html+='<option value="'+esc(s)+'">'+esc(s)+'</option>'; });
  html += '</select></div></div>';
  html += '<div class="drop-zone" id="dropZ"><div class="drop-zone-icon">&#128196;</div><div class="drop-zone-text">Glissez votre fichier Excel ici ou cliquez pour parcourir</div><div class="drop-zone-hint">.xlsx, .xls, .csv accept\u00e9s</div><input type="file" id="xlFI" accept=".xlsx,.xls,.csv" style="display:none"></div>';
  html += '<div id="xlPrev" style="display:none"><div class="import-stats" id="xlSt"></div><div style="max-height:200px;overflow:auto;border:1px solid var(--paper-line);border-radius:var(--radius)"><table class="preview-table" id="xlPT"></table></div><div class="modal-actions" style="justify-content:space-between"><button class="btn ghost" id="xlB">Retour</button><button class="btn" id="xlOk">Confirmer l\'import</button></div></div>';
  html += '<div id="xlNoP"><div class="modal-actions"><button class="btn ghost" id="xlC">Annuler</button></div></div></div>';
  bd.innerHTML = html; document.body.appendChild(bd);

  var dropZ = bd.querySelector('#dropZ'), fileInput = bd.querySelector('#xlFI');
  dropZ.onclick = function(){ fileInput.click(); };
  dropZ.ondragover = function(e){ e.preventDefault(); dropZ.classList.add('dragover'); };
  dropZ.ondragleave = function(){ dropZ.classList.remove('dragover'); };
  dropZ.ondrop = function(e){ e.preventDefault(); dropZ.classList.remove('dragover'); if(e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]); };
  fileInput.onchange = function(){ if(fileInput.files.length) processFile(fileInput.files[0]); };

  function processFile(file) {
    // Charger la bibliothèque XLSX dynamiquement si pas encore faite
    loadXlsxLib().then(function() {
      doProcessFile(file);
    }).catch(function(err) {
      showToast(err.message || 'Erreur de chargement Excel');
    });
  }

  function doProcessFile(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, {type:'array'});
        var ws = wb.Sheets[wb.SheetNames[0]];
        var json = XLSX.utils.sheet_to_json(ws, {defval:''});
        if(!json.length){ showToast('Le fichier est vide ou ne contient pas de donn\u00e9es.'); return; }

        var headers = Object.keys(json[0]);
        var modCol = findCol(headers, ['module','modules','nom du module','nom_module','intitule','intitulé']);
        var filCol = findCol(headers, ['filiere','filière','section']);
        var semCol = findCol(headers, ['semestre','sem','niveau']);

        if(!modCol){ showToast('Colonne "Module" introuvable. V\u00e9rifiez les en-t\u00eates.'); return; }

        var defFil = bd.querySelector('#xlF').value;
        var defSem = bd.querySelector('#xlS').value;
        var toImport = [];

        json.forEach(function(row) {
          var modName = String(row[modCol]||'').trim();
          if(!modName) return;
          var fil = String(row[filCol]||defFil||'').trim();
          var sem = String(row[semCol]||defSem||'').trim();
          if(!fil||!sem) return;
          var key = fil+'_'+sem;
          var exists = (moduleRegistry[key]||[]).indexOf(modName)>=0;
          toImport.push({module:modName, filiere:fil, semestre:sem, key:key, exists:exists});
        });

        if(!toImport.length){ showToast('Aucun module valide trouv\u00e9 (v\u00e9rifiez fili\u00e8re et semestre).'); return; }

        pendingImport = toImport;
        var newC = toImport.filter(function(r){return !r.exists}).length;
        var dupC = toImport.filter(function(r){return r.exists}).length;

        bd.querySelector('#xlPrev').style.display = '';
        bd.querySelector('#xlNoP').style.display = 'none';
        dropZ.style.display = 'none';

        bd.querySelector('#xlSt').innerHTML = '<span><span class="dot" style="background:var(--good)"></span> '+newC+' nouveau'+(newC>1?'x':'')+'</span><span><span class="dot" style="background:var(--gold)"></span> '+dupC+' doublon'+(dupC>1?'s':'')+' (ignor\u00e9'+(dupC>1?'s':'')+')</span>';

        var pt = bd.querySelector('#xlPT');
        pt.innerHTML = '<thead><tr><th>Module</th><th>Fili\u00e8re</th><th>Semestre</th><th>Statut</th></tr></thead><tbody>';
        toImport.forEach(function(r){
          pt.innerHTML += '<tr><td>'+esc(r.module)+'</td><td>'+esc(r.filiere)+'</td><td>'+esc(r.semestre)+'</td><td class="'+(r.exists?'dup':'new')+'">'+(r.exists?'Existe d\u00e9j\u00e0':'Nouveau')+'</td></tr>';
        });
        pt.innerHTML += '</tbody>';
      } catch(err) {
        console.error(err);
        showToast('Erreur lors de la lecture du fichier : '+err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  bd.querySelector('#xlOk').onclick = function(){
    if(!pendingImport) return;
    var added = 0;
    pendingImport.forEach(function(r){ if(r.exists) return; if(!moduleRegistry[r.key]) moduleRegistry[r.key]=[]; moduleRegistry[r.key].push(r.module); added++; });
    saveModuleRegistry(); bd.remove(); openModuleMgmt(returnSearch||''); renderApp();
    showToast(added+' module'+(added>1?'s':'')+' import\u00e9'+(added>1?'s':'')+' avec succ\u00e8s.');
    pendingImport = null;
  };
  bd.querySelector('#xlB').onclick = function(){ pendingImport=null; bd.remove(); openModuleMgmt(returnSearch||''); };
  bd.querySelector('#xlC').onclick = function(){ bd.remove(); };
  bd.onclick = function(e){ if(e.target===bd) bd.remove(); };
}

function findCol(headers, candidates) {
  for(var i=0;i<candidates.length;i++){
    for(var j=0;j<headers.length;j++){
      if(headers[j].trim().toLowerCase()===candidates[i].toLowerCase()) return headers[j];
    }
  }
  for(var i=0;i<candidates.length;i++){
    for(var j=0;j<headers.length;j++){
      if(headers[j].trim().toLowerCase().indexOf(candidates[i].toLowerCase())>=0) return headers[j];
    }
  }
  return null;
}

/* ══════════════════════════════════════════════════════════════
   INITIALISATION
   ══════════════════════════════════════════════════════════════ */
(function(){
  try {
    loadRecords();
    loadModuleRegistry();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';
    renderApp();
  } catch(err) {
    document.getElementById('loading').innerHTML = 'Erreur : '+err.message+'<br><br><button class="btn" onclick="localStorage.clear();location.reload()">R\u00e9initialiser</button>';
    console.error(err);
  }
})();
</script>
</body>
</html>
