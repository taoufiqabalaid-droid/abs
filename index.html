<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion des Absences — 2025/2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0B0F19;
  --bg2: #111827;
  --card: #151C2C;
  --card2: #1A2332;
  --border: #1E293B;
  --border2: #2A3A50;
  --fg: #E2E8F0;
  --muted: #64748B;
  --accent: #10B981;
  --accent2: #059669;
  --accent-glow: rgba(16,185,129,0.15);
  --danger: #EF4444;
  --danger2: #DC2626;
  --danger-glow: rgba(239,68,68,0.12);
  --warn: #F59E0B;
  --warn-glow: rgba(245,158,11,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden; }
h1,h2,h3,h4,h5 { font-family: 'Space Grotesk', sans-serif; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* Fond animé subtil */
.bg-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 20%, rgba(16,185,129,0.04), transparent),
    radial-gradient(ellipse 500px 500px at 90% 80%, rgba(16,185,129,0.03), transparent),
    radial-gradient(ellipse 300px 300px at 50% 50%, rgba(245,158,11,0.02), transparent);
}

/* Sidebar */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 280px;
  background: var(--bg2); border-right: 1px solid var(--border);
  z-index: 50; display: flex; flex-direction: column;
  transition: transform 0.3s ease;
}
.sidebar-logo {
  padding: 24px 20px; border-bottom: 1px solid var(--border);
}
.sidebar-nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 11px 14px;
  border-radius: 10px; cursor: pointer; transition: all 0.2s;
  color: var(--muted); font-weight: 500; font-size: 14px; margin-bottom: 2px;
}
.nav-item:hover { background: var(--card); color: var(--fg); }
.nav-item.active {
  background: var(--accent-glow); color: var(--accent);
  box-shadow: inset 3px 0 0 var(--accent);
}
.nav-item i { width: 20px; text-align: center; font-size: 15px; }

/* Groupe selector dans sidebar */
.group-section { padding: 10px; border-top: 1px solid var(--border); }
.group-search {
  width: 100%; padding: 9px 12px 9px 34px; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px; color: var(--fg);
  font-size: 13px; outline: none; transition: border-color 0.2s;
}
.group-search:focus { border-color: var(--accent); }
.group-search-wrap { position: relative; }
.group-search-wrap i {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 13px;
}
.group-list { max-height: 260px; overflow-y: auto; margin-top: 8px; }
.group-item {
  padding: 8px 12px; border-radius: 7px; cursor: pointer;
  font-size: 13px; color: var(--muted); transition: all 0.15s;
  display: flex; justify-content: space-between; align-items: center;
}
.group-item:hover { background: var(--card); color: var(--fg); }
.group-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 600; }
.group-item .count {
  background: var(--card2); padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.group-item.active .count { background: rgba(16,185,129,0.2); }
.group-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); padding: 8px 12px 4px; font-weight: 700; }

/* Main */
.main { margin-left: 280px; padding: 24px 32px; position: relative; z-index: 1; min-height: 100vh; }

/* Cartes stats */
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 20px 24px; transition: all 0.25s; position: relative; overflow: hidden;
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.stat-card .icon-wrap {
  width: 44px; height: 44px; border-radius: 10px; display: flex;
  align-items: center; justify-content: center; font-size: 18px;
}
.stat-card .stat-value { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 700; }
.stat-card .stat-label { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* Tableau */
.data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.data-table thead th {
  background: var(--bg2); padding: 12px 16px; text-align: left;
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 5;
}
.data-table tbody td {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-size: 13.5px; transition: background 0.15s;
}
.data-table tbody tr:hover td { background: var(--card2); }
.data-table tbody tr.absent-row td { background: var(--danger-glow); }

/* Checkbox custom */
.abs-checkbox {
  appearance: none; width: 20px; height: 20px; border: 2px solid var(--border2);
  border-radius: 5px; cursor: pointer; transition: all 0.2s; position: relative;
  flex-shrink: 0;
}
.abs-checkbox:hover { border-color: var(--danger); }
.abs-checkbox:checked {
  background: var(--danger); border-color: var(--danger);
}
.abs-checkbox:checked::after {
  content: '✓'; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); color: white; font-size: 13px; font-weight: 700;
}

/* Boutons */
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
  border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
  border: none; transition: all 0.2s; font-family: 'DM Sans';
}
.btn-primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 4px 12px rgba(16,185,129,0.3);
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16,185,129,0.4); }
.btn-danger { background: var(--danger); color: #fff; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
.btn-danger:hover { background: var(--danger2); }
.btn-ghost {
  background: transparent; color: var(--muted); border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--fg); background: var(--card); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 7px; }

/* Inputs */
.form-input {
  background: var(--card); border: 1px solid var(--border); border-radius: 9px;
  padding: 10px 14px; color: var(--fg); font-size: 14px; outline: none;
  transition: border-color 0.2s; font-family: 'DM Sans'; width: 100%;
}
.form-input:focus { border-color: var(--accent); }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
select.form-input { cursor: pointer; }

/* Badge */
.badge {
  display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.badge-danger { background: var(--danger-glow); color: var(--danger); }
.badge-warn { background: var(--warn-glow); color: var(--warn); }
.badge-ok { background: var(--accent-glow); color: var(--accent); }

/* Toast */
.toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 14px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px; min-width: 300px;
  animation: toastIn 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast-success { background: #065F46; color: #A7F3D0; border: 1px solid #10B981; }
.toast-error { background: #7F1D1D; color: #FCA5A5; border: 1px solid #EF4444; }
.toast-info { background: #1E3A5F; color: #93C5FD; border: 1px solid #3B82F6; }
.toast-exit { animation: toastOut 0.3s ease forwards; }
@keyframes toastIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { to { opacity:0; transform:translateX(60px); } }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px; max-width: 500px; width: 90%;
  transform: scale(0.95); transition: transform 0.25s;
}
.modal-overlay.show .modal-box { transform: scale(1); }

/* Barre de progression */
.progress-bar {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px; transition: width 0.5s ease;
}

/* Animations */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease both; }
.fade-up-d1 { animation-delay: 0.05s; }
.fade-up-d2 { animation-delay: 0.1s; }
.fade-up-d3 { animation-delay: 0.15s; }
.fade-up-d4 { animation-delay: 0.2s; }

/* Étiquette absent */
.absent-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--danger-glow); color: var(--danger);
  padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;
}

/* Hamburger mobile */
.hamburger { display: none; position: fixed; top: 16px; left: 16px; z-index: 60;
  width: 40px; height: 40px; border-radius: 10px; background: var(--card);
  border: 1px solid var(--border); cursor: pointer; align-items: center; justify-content: center;
  color: var(--fg); font-size: 18px;
}
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 16px; padding-top: 64px; }
  .hamburger { display: flex; }
}

/* Bar chart simple */
.bar-chart-bar {
  transition: width 0.6s ease; border-radius: 0 4px 4px 0; min-width: 2px;
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Hamburger mobile -->
<button class="hamburger" id="hamburgerBtn" aria-label="Menu"><i class="fas fa-bars"></i></button>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;">
        <i class="fas fa-clipboard-check" style="color:#fff;font-size:16px;"></i>
      </div>
      <div>
        <div style="font-family:'Space Grotesk';font-weight:700;font-size:16px;">AbsenceTrack</div>
        <div style="font-size:11px;color:var(--muted);">2025 — 2026</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-item active" data-tab="enregistrement" onclick="switchTab('enregistrement')">
      <i class="fas fa-pen-to-square"></i> Enregistrement
    </div>
    <div class="nav-item" data-tab="historique" onclick="switchTab('historique')">
      <i class="fas fa-clock-rotate-left"></i> Historique
    </div>
    <div class="nav-item" data-tab="statistiques" onclick="switchTab('statistiques')">
      <i class="fas fa-chart-pie"></i> Statistiques
    </div>
    <div class="nav-item" data-tab="etudiants" onclick="switchTab('etudiants')">
      <i class="fas fa-users"></i> Fiches Etudiants
    </div>
  </nav>

  <div class="group-section">
    <div class="group-search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" class="group-search" placeholder="Rechercher un groupe..." id="groupSearch" oninput="filterGroups()">
    </div>
    <div class="group-list" id="groupList"></div>
  </div>
</aside>

<!-- Contenu principal -->
<div class="main" id="mainContent">
  <!-- En-tête dynamique -->
  <div id="pageHeader" style="margin-bottom:24px;"></div>

  <!-- Onglet Enregistrement -->
  <div id="tab-enregistrement" class="tab-content">
    <!-- Barre de sélection -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;" class="fade-up">
      <div>
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="absDate">
      </div>
      <div>
        <label class="form-label">Creneau horaire</label>
        <select class="form-input" id="absTime">
          <option value="">-- Choisir --</option>
        </select>
      </div>
      <div>
        <label class="form-label">Module</label>
        <select class="form-input" id="absModule">
          <option value="">-- Choisir --</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px;">
        <button class="btn btn-primary" onclick="saveAbsences()" style="white-space:nowrap;">
          <i class="fas fa-save"></i> Enregistrer
        </button>
        <button class="btn btn-ghost" onclick="clearSelection()" style="white-space:nowrap;" title="Tout deselectionner">
          <i class="fas fa-rotate-left"></i>
        </button>
      </div>
    </div>

    <!-- Recherche et filtres étudiants -->
    <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;align-items:center;" class="fade-up fade-up-d1">
      <div style="position:relative;flex:1;min-width:200px;">
        <i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;"></i>
        <input type="text" class="form-input" style="padding-left:34px;" placeholder="Rechercher un etudiant..." id="studentSearch" oninput="filterStudents()">
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-sm btn-ghost" onclick="selectAllVisible()"><i class="fas fa-check-double"></i> Tout cocher</button>
        <button class="btn btn-sm btn-ghost" onclick="deselectAllVisible()"><i class="fas fa-xmark"></i> Tout decocher</button>
      </div>
      <div style="font-size:13px;color:var(--muted);" id="absCountLabel">0 absent(s) selectionne(s)</div>
    </div>

    <!-- Grille etudiants -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;" class="fade-up fade-up-d2">
      <div style="max-height:60vh;overflow-y:auto;" id="studentGrid"></div>
    </div>
  </div>

  <!-- Onglet Historique -->
  <div id="tab-historique" class="tab-content" style="display:none;">
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center;" class="fade-up">
      <div style="position:relative;flex:1;min-width:200px;">
        <i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;"></i>
        <input type="text" class="form-input" style="padding-left:34px;" placeholder="Rechercher dans l'historique..." id="histSearch" oninput="renderHistory()">
      </div>
      <input type="date" class="form-input" style="width:auto;" id="histDateFrom" onchange="renderHistory()">
      <span style="color:var(--muted);font-size:13px;">a</span>
      <input type="date" class="form-input" style="width:auto;" id="histDateTo" onchange="renderHistory()">
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> Exporter CSV</button>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;" class="fade-up fade-up-d1">
      <div style="max-height:65vh;overflow-y:auto;" id="historyTable"></div>
    </div>
  </div>

  <!-- Onglet Statistiques -->
  <div id="tab-statistiques" class="tab-content" style="display:none;">
    <div id="statsContent"></div>
  </div>

  <!-- Onglet Fiches Etudiants -->
  <div id="tab-etudiants" class="tab-content" style="display:none;">
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center;" class="fade-up">
      <div style="position:relative;flex:1;min-width:200px;">
        <i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;"></i>
        <input type="text" class="form-input" style="padding-left:34px;" placeholder="Rechercher un etudiant..." id="etudSearch" oninput="renderStudentCards()">
      </div>
      <select class="form-input" style="width:auto;" id="etudSort" onchange="renderStudentCards()">
        <option value="name">Trier par nom</option>
        <option value="abs-desc">Plus d'absences</option>
        <option value="abs-asc">Moins d'absences</option>
      </select>
    </div>
    <div id="studentCards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;"></div>
  </div>
</div>

<!-- Modal confirmation -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h3 style="font-size:18px;margin-bottom:8px;" id="modalTitle">Confirmation</h3>
    <p style="color:var(--muted);font-size:14px;margin-bottom:20px;" id="modalMsg"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Annuler</button>
      <button class="btn btn-danger btn-sm" id="modalConfirmBtn" onclick="closeModal()">Confirmer</button>
    </div>
  </div>
</div>

<script>
// ============================================
// DONNEES — Groupes, etudiants, modules
// ============================================
const TIME_SLOTS = [
  '08H30 - 10H30','10H30 - 12H30','08H30 - 12H30',
  '14H00 - 16H00','16H00 - 18H00','14H00 - 18H00','15H00 - 18H00'
];

// Format compact: noms separes par |
function P(s){ return s?s.split('|').filter(x=>x.trim()):[]; }

const GROUPS = {
  'ISUSI S3': {
    students: P('ACHLIKH AICHA|AGOUZOUL MOUNA|ARROUY IKRAM|AZIZ AMINA|BANI NAJMA|BENCHAMA MOHAMED ALI|BOUIDA KATRE-ENNADA|BOURISSA HAMZA|DENDOUN ISLAM|EBOUR KHAOULA|El ABDELLAOUI FATIMA-EZZAHRA|EL HARRARI OUSSAMA|EL HOR HAJAR|EL JAOUHARI MALAK|El MIKH SALMA|ELMOUDAFFAR WISSAL|ENNAJIH RIHAM|ET.TAGHELATY HANANE|FASSINI CHAIMAA|HANGOUR HAFSA|IMAZZANE MAROUA|LABBIHI KAOUTAR|LAFHAL BADER|NAJEH RADWA|NAOUAR MBARKA|OUARHOU AMINE|OUILKI JIHAD|OUIS MOHAMED|OUJAA IMANE|OUKOUZAMT HAYATE|OUNASSER ISRAA|RAIS ANAS|SAADI IMANE|SAADOUNI DOUAA|TOUIL KELTOUM|ZAKAR CHAIMA'),
    modules: ["Pathologie medico-chirurgicale d'urgence","Puériculture et maladies transmissibles","Organisation des urgences et semiologie telephonique","Soins infirmiers en medecine et chirurgie d'urgence","Stage 1 service d'urgences","Stage 2 Dechoquage"]
  },
  'ISUSI S5': {
    students: P('AMARIR MOHAMMED|ARIF KHADIJA|BELLAGCHAIRI HIBA|BERRAMY HIBA|CHAIBI AYA|CHAKHCH YASSMINE|CHAOUKI FATIMA EZZAHRAA|DAHI ILYAS|EL ACHKAR BOUTAINA|EL HADAR HAJAR|EL MOUDDEN OUISAL|ESSAKHI HASNAE|GAZGAZ SALOUA|HOUSSAYNI IMANE|HOUSSNI ZAKARIA|IBRQI IMANE|IDSASSI ZINEB|KDAIRE NOUHAILA|KERROUM KHADIJA|KHORCHID MARIA|LAAZIZ KHADIJA|LACH-HEB MERIEM|LAKOUIS IMANE|MABROUR ABDELLAH|MACHKOUR SALMA|MIMOUNE WISSALE|MIMOUNI ANAS|M\'KIOUASS SALMA|SBOUITA IBTISSAM|TADILI FATIMA-EZZAHRA|CHOUCRI HICHAM'),
    modules: ["Pharmacologie de l'urgence","Materiel et appareillage des soins de sante des urgences et secourisme","Reanimation","Methodologie de recherche","Stage 3 Reanimation medicochirurgicale","Stage 4 Bloc Operatoire"]
  },
  'LABO S3': {
    students: P('AAA IBTIHAL|AIT BOURHIM IMANE|BADI ZINEB|BELFASSI FATIMA-EZZAHERAE|BOUCHRIHA MARYEM|BOUDLIH ILIAS|BOUSALHI NADA|CHARDAOUI OUISSAL|CHERKAOUI ABDERRAHMANE|DAU LAM ACHUIL LAM|DAYAB AMAL|EDDARKAOUI AMINA|EL HADI BADER|EL MALKI OUARDA|EL MANYANI CHAIMAA|ELAMOUD SARA|ELBAZ MOHAMED AMINE|ELMAKKAOUI SALAH EDDINE|ESSAADI ILYASS|ESSAADI ZOUHAYR|ESSADEK YOUSSEF|HASSANI MBECHEZI ELARIF|JEBBAD YASMINE|MQAINTAR SAMI|MULENGA MERCY CHIBESA|NOUGHOU AYA|RAGHIB ANAS|RAHEL GHIZLANE|SEKOURI MARYEM|SILOMBA TEPWANJI|TOYBA IBRAHIM|ZEROUALI MARYAM'),
    modules: ["Biochimie clinique","Hematologie & Hemobiologie","Immunologie generale/ Immuno-Analyse","Biochimie clinique analytique TP","Stage d'Hematologie & d'Immuno-hematologie","Stage de biochimie"]

// ============================================
// ETAT DE L'APPLICATION
// ============================================
let currentGroup = 'ISUSI S3';
let currentTab = 'enregistrement';
let absences = []; // Toutes les absences enregistrees

// Charger depuis localStorage
function loadData() {
  try {
    const saved = localStorage.getItem('absenceTrack_data');
    if (saved) absences = JSON.parse(saved);
  } catch(e) { absences = []; }
}
function saveData() {
  localStorage.setItem('absenceTrack_data', JSON.stringify(absences));
}

// ============================================
// INITIALISATION
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  loadData();
  // Date du jour par defaut
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('absDate').value = today;
  // Remplir les creneaux horaires
  const timeSel = document.getElementById('absTime');
  TIME_SLOTS.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    timeSel.appendChild(opt);
  });
  // Render groupe list
  renderGroupList();
  // Selectionner le premier groupe
  selectGroup('ISUSI S3');
  // Hamburger
  document.getElementById('hamburgerBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });
  // Fermer sidebar au clic hors zone (mobile)
  document.getElementById('mainContent').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
  });
});

// ============================================
// NAVIGATION / GROUPES
// ============================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  document.getElementById('sidebar').classList.remove('open');
  renderCurrentTab();
}

function renderGroupList() {
  const container = document.getElementById('groupList');
  const search = (document.getElementById('groupSearch').value || '').toLowerCase();
  // Regrouper par filiere
  const filieres = {};
  Object.keys(GROUPS).forEach(g => {
    if (search && !g.toLowerCase().includes(search)) return;
    const parts = g.split(' ');
    const filiere = parts.slice(0, -1).join(' ');
    if (!filiere[filiere]) filieres[filiere] = [];
    filieres[filiere].push(g);
  });
  // Corriger
  const filMap = {};
  Object.keys(GROUPS).forEach(g => {
    if (search && !g.toLowerCase().includes(search)) return;
    const match = g.match(/^(.+?)\s+S\d+$/);
    const fil = match ? match[1] : g;
    if (!filMap[fil]) filMap[fil] = [];
    filMap[fil].push(g);
  });
  let html = '';
  // Trier les filieres, puis les semestres
  Object.keys(filMap).sort().forEach(fil => {
    html += `<div class="group-label">${fil}</div>`;
    filMap[fil].sort((a,b) => {
      const sa = parseInt(a.match(/S(\d+)$/)[1]);
      const sb = parseInt(b.match(/S(\d+)$/)[1]);
      return sa - sb;
    }).forEach(g => {
      const count = GROUPS[g].students.length;
      const active = g === currentGroup ? 'active' : '';
      html += `<div class="group-item ${active}" onclick="selectGroup('${g}')">${g}<span class="count">${count}</span></div>`;
    });
  });
  container.innerHTML = html;
}

function filterGroups() { renderGroupList(); }

function selectGroup(group) {
  currentGroup = group;
  renderGroupList();
  updateModuleSelect();
  renderCurrentTab();
  document.getElementById('sidebar').classList.remove('open');
}

function updateModuleSelect() {
  const sel = document.getElementById('absModule');
  sel.innerHTML = '<option value="">-- Choisir --</option>';
  (GROUPS[currentGroup]?.modules || []).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
}

function renderCurrentTab() {
  switch(currentTab) {
    case 'enregistrement': renderStudentGrid(); break;
    case 'historique': renderHistory(); break;
    case 'statistiques': renderStats(); break;
    case 'etudiants': renderStudentCards(); break;
  }
  renderPageHeader();
}

function renderPageHeader() {
  const students = GROUPS[currentGroup]?.students || [];
  const tabNames = { enregistrement: 'Enregistrement des absences', historique: 'Historique des absences', statistiques: 'Statistiques', etudiants: 'Fiches etudiants' };
  const tabIcons = { enregistrement: 'fa-pen-to-square', historique: 'fa-clock-rotate-left', statistiques: 'fa-chart-pie', etudiants: 'fa-users' };
  document.getElementById('pageHeader').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
          <span style="background:var(--accent-glow);color:var(--accent);padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;">${currentGroup}</span>
          <span style="color:var(--muted);font-size:13px;">${students.length} etudiants</span>
        </div>
        <h2 style="font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px;">

        ${currentTab === 'historique' ? `<button class="btn btn-ghost btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> Exporter CSV</button>` : ''}
        ${currentTab === 'statistiques' ? `<button class="btn btn-ghost btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> Exporter CSV</button>` : ''}
      </div>
    </div>
  `;
}

// ============================================
// ONGLET ENREGISTREMENT
// ============================================
function renderStudentGrid() {
  const students = GROUPS[currentGroup]?.students || [];
  const search = (document.getElementById('studentSearch')?.value || '').toLowerCase();
  const filtered = students.filter(s => s.toLowerCase().includes(search));

  // Obtenir les absences deja enregistrees pour ce groupe/date/creneau/module
  const date = document.getElementById('absDate').value;
  const time = document.getElementById('absTime').value;
  const mod = document.getElementById('absModule').value;
  const existing = getAbsencesFor(currentGroup, date, time, mod);

  let html = `<table class="data-table">
    <thead><tr>
      <th style="width:50px;"><input type="checkbox" class="abs-checkbox" id="checkAll" onchange="toggleAll(this.checked)" title="Tout cocher/decocher"></th>
      <th style="width:60px;">N</th>
      <th>Nom complet</th>
      <th style="width:120px;">Statut</th>
      <th style="width:200px;">Justification</th>
    </tr></thead><tbody>`;

  filtered.forEach((name, i) => {
    const abs = existing.find(a => a.student === name);
    const checked = abs ? 'checked' : '';
    const rowClass = abs ? 'absent-row' : '';
    const origIdx = students.indexOf(name) + 1;
    const statusHtml = abs
      ? `<span class="absent-tag"><i class="fas fa-xmark"></i> Absent</span>`
      : `<span style="color:var(--accent);font-size:12px;font-weight:600;"><i class="fas fa-check"></i> Present</span>`;
    const justVal = abs?.justification || '';
    html += `<tr class="${rowClass}" data-student="${name}">
      <td><input type="checkbox" class="abs-checkbox student-cb" data-name="${name}" ${checked} onchange="updateAbsCount()"></td>
      <td style="color:var(--muted);font-size:13px;">${origIdx}</td>
      <td style="font-weight:500;">${name}</td>
      <td>${statusHtml}</td>
      <td><input type="text" class="form-input" style="padding:6px 10px;font-size:12px;" placeholder="Justification..." data-just="${name}" value="${justVal}"></td>
    </tr>`;
  });

  if (filtered.length === 0) {
    html += `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);">Aucun etudiant trouve</td></tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('studentGrid').innerHTML = html;
  updateAbsCount();
}

function filterStudents() { renderStudentGrid(); }

function toggleAll(checked) {
  document.querySelectorAll('.student-cb').forEach(cb => {
    cb.checked = checked;
    cb.closest('tr').classList.toggle('absent-row', checked);
    // Mettre a jour le statut visuel
    const statusTd = cb.closest('tr').children[3];
    statusTd.innerHTML = checked
      ? `<span class="absent-tag"><i class="fas fa-xmark"></i> Absent</span>`
      : `<span style="color:var(--accent);font-size:12px;font-weight:600;"><i class="fas fa-check"></i> Present</span>`;
  });
  updateAbsCount();
}

function selectAllVisible() { toggleAll(true); document.getElementById('checkAll').checked = true; }
function deselectAllVisible() { toggleAll(false); document.getElementById('checkAll').checked = false; }

function updateAbsCount() {
  const count = document.querySelectorAll('.student-cb:checked').length;
  document.getElementById('absCountLabel').textContent = `${count} absent(s) selectionne(s)`;
  document.getElementById('absCountLabel').style.color = count > 0 ? 'var(--danger)' : 'var(--muted)';
}

function clearSelection() {
  deselectAllVisible();
  document.querySelectorAll('[data-just]').forEach(inp => inp.value = '');
}

// Ecouter les changements de date/creneau/module pour rafraichir
document.addEventListener('change', e => {
  if (['absDate','absTime','absModule'].includes(e.target.id)) {
    renderStudentGrid();
  }
});

function getAbsencesFor(group, date, time, mod) {
  return absences.filter(a =>
    a.group === group && a.date === date && a.time === time && a.module === mod
  );
}

function saveAbsences() {
  const date = document.getElementById('absDate').value;
  const time = document.getElementById('absTime').value;
  const mod = document.getElementById('absModule').value;

  if (!date) { showToast('Veuillez selectionner une date', 'error'); return; }
  if (!time) { showToast('Veuillez selectionner un creneau horaire', 'error'); return; }
  if (!mod) { showToast('Veuillez selectionner un module', 'error'); return; }

  // Supprimer les anciennes absences pour cette session
  absences = absences.filter(a =>
    !(a.group === currentGroup && a.date === date && a.time === time && a.module === mod)
  );

  // Ajouter les nouvelles
  const checked = document.querySelectorAll('.student-cb:checked');
  if (checked.length === 0) {
    showToast('Aucune absence a enregistrer', 'info');
    saveData();
    renderStudentGrid();
    return;
  }

  checked.forEach(cb => {
    const name = cb.dataset.name;
    const justInput = document.querySelector(`[data-just="${name}"]`);
    absences.push({
      id: Date.now() + Math.random(),
      group: currentGroup,
      student: name,
      date, time, module: mod,
      justification: justInput ? justInput.value.trim() : '',
      timestamp: new Date().toISOString()
    });
  });

  saveData();
  showToast(`${checked.length} absence(s) enregistree(s) avec succes`, 'success');
  renderStudentGrid();
}

// ============================================
// ONGLET HISTORIQUE
// ============================================
function renderHistory() {
  const search = (document.getElementById('histSearch')?.value || '').toLowerCase();
  const dateFrom = document.getElementById('histDateFrom')?.value || '';
  const dateTo = document.getElementById('histDateTo')?.value || '';

  let filtered = absences.filter(a => a.group === currentGroup);
  if (search) filtered = filtered.filter(a => a.student.toLowerCase().includes(search) || (a.module||'').toLowerCase().includes(search) || (a.justification||'').toLowerCase().includes(search));
  if (dateFrom) filtered = filtered.filter(a => a.date >= dateFrom);
  if (dateTo) filtered = filtered.filter(a => a.date <= dateTo);

  // Trier par date decroissante puis nom
  filtered.sort((a,b) => b.date.localeCompare(a.date) || a.student.localeCompare(b.student));

  let html = `<table class="data-table">
    <thead><tr>
      <th>Date</th><th>Creneau</th><th>Module</th><th>Etudiant</th><th>Justification</th><th style="width:60px;">Action</th>
    </tr></thead><tbody>`;

  if (filtered.length === 0) {
    html += `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted);">
      <i class="fas fa-inbox" style="font-size:32px;display:block;margin-bottom:12px;opacity:0.3;"></i>
      Aucun enregistrement d'absence pour ce groupe
    </td></tr>`;
  } else {
    let lastDate = '';
    filtered.forEach(a => {
      const dateSep = a.date !== lastDate;
      lastDate = a.date;
      const dateFormatted = formatDate(a.date);
      html += `<tr>
        <td style="font-weight:${dateSep?'600':'400'};font-size:${dateSep?'13px':'12px'};color:${dateSep?'var(--fg)':'var(--muted)'};">${dateSep ? dateFormatted : ''}</td>
        <td style="font-size:12px;">${a.time || '-'}</td>
        <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${a.module||''}">${a.module || '-'}</td>
        <td style="font-weight:500;">${a.student}</td>
        <td style="font-size:12px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${a.justification||''}">${a.justification || '-'}</td>
        <td><button class="btn btn-sm btn-ghost" style="padding:4px 8px;color:var(--danger);" onclick="deleteAbsence(${a.id})" title="Supprimer"><i class="fas fa-trash-can"></i></button></td>
      </tr>`;
    });
  }

  html += '</tbody></table>';
  document.getElementById('historyTable').innerHTML = html;
}

function deleteAbsence(id) {
  showModal('Supprimer cette absence', 'Cette action est irreversible. Voulez-vous vraiment supprimer cet enregistrement ?', () => {
    absences = absences.filter(a => a.id !== id);
    saveData();
    renderHistory();
    showToast('Absence supprimee', 'success');
  });
}

// ============================================
// ONGLET STATISTIQUES
// ============================================
function renderStats() {
  const groupAbs = absences.filter(a => a.group === currentGroup);
  const students = GROUPS[currentGroup]?.students || [];
  const totalSessions = [...new Set(groupAbs.map(a => `${a.date}_${a.time}_${a.module}`))].length;

  // Stats par etudiant
  const studentStats = {};
  students.forEach(s => { studentStats[s] = 0; });
  groupAbs.forEach(a => { if (studentStats[a.student] !== undefined) studentStats[a.student]++; });

  const totalAbsences = groupAbs.length;
  const avgAbs = students.length ? (totalAbsences / students.length).toFixed(1) : 0;
  const maxAbs = Math.max(...Object.values(studentStats), 0);
  const studentsWithAbs = Object.values(studentStats).filter(v => v > 0).length;

  // Top absents
  const sorted = Object.entries(studentStats).sort((a,b) => b[1] - a[1]);
  const topAbs = sorted.filter(([,v]) => v > 0).slice(0, 10);

  // Stats par module
  const moduleStats = {};
  groupAbs.forEach(a => {
    const m = a.module || 'Non defini';
    moduleStats[m] = (moduleStats[m] || 0) + 1;
  });
  const sortedModules = Object.entries(moduleStats).sort((a,b) => b[1] - a[1]);

  // Stats par date
  const dateStats = {};
  groupAbs.forEach(a => {
    dateStats[a.date] = (dateStats[a.date] || 0) + 1;
  });
  const sortedDates = Object.entries(dateStats).sort((a,b) => a[0].localeCompare(b[0]));

  let html = `
  <!-- Cartes resume -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px;" class="fade-up">
    <div class="stat-card">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="icon-wrap" style="background:var(--danger-glow);color:var(--danger);"><i class="fas fa-user-xmark"></i></div>
        <div>
          <div class="stat-value" style="color:var(--danger);">${totalAbsences}</div>
          <div class="stat-label">Total absences</div>
        </div>
      </div>
    </div>
    <div class="stat-card">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="icon-wrap" style="background:var(--warn-glow);color:var(--warn);"><i class="fas fa-chart-line"></i></div>
        <div>
          <div class="stat-value" style="color:var(--warn);">${avgAbs}</div>
          <div class="stat-label">Moyenne / etudiant</div>
        </div>
      </div>
    </div>
    <div class="stat-card">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="icon-wrap" style="background:var(--accent-glow);color:var(--accent);"><i class="fas fa-calendar-check"></i></div>
        <div>
          <div class="stat-value" style="color:var(--accent);">${totalSessions}</div>
          <div class="stat-label">Seances enregistrees</div>
        </div>
      </div>
    </div>
    <div class="stat-card">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="icon-wrap" style="background:rgba(139,92,246,0.12);color:#8B5CF6;"><i class="fas fa-users"></i></div>
        <div>
          <div class="stat-value" style="color:#8B5CF6;">${studentsWithAbs}/${students.length}</div>
          <div class="stat-label">Etudiants concernes</div>
        </div>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <!-- Top absents -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;" class="fade-up fade-up-d1">
      <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-ranking-star" style="color:var(--danger);"></i> Etudiants les plus absents
      </h3>`;

  if (topAbs.length === 0) {
    html += `<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">Aucune donnee</div>`;
  } else {
    topAbs.forEach(([name, count], i) => {
      const pct = maxAbs > 0 ? (count / maxAbs * 100) : 0;
      const barColor = count >= 5 ? 'var(--danger)' : count >= 3 ? 'var(--warn)' : 'var(--accent)';
      html += `<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:6px;">
            <span style="color:var(--muted);font-size:11px;width:18px;">${i+1}.</span> ${name}
          </span>
          <span class="badge ${count >= 5 ? 'badge-danger' : count >= 3 ? 'badge-warn' : 'badge-ok'}">${count}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barColor};"></div></div>
      </div>`;
    });
  }

  html += `</div>
    <!-- Par module -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;" class="fade-up fade-up-d2">
      <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-book" style="color:var(--accent);"></i> Absences par module
      </h3>`;

  if (sortedModules.length === 0) {
    html += `<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">Aucune donnee</div>`;
  } else {
    const maxMod = sortedModules[0][1];
    sortedModules.forEach(([mod, count]) => {
      const pct = maxMod > 0 ? (count / maxMod * 100) : 0;
      html += `<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:500;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${mod}">${mod}</span>
          <span style="font-size:12px;color:var(--muted);font-weight:600;">${count}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--accent);"></div></div>
      </div>`;
    });
  }

  html += `</div></div>

  <!-- Evolution temporelle -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:20px;" class="fade-up fade-up-d3">
    <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
      <i class="fas fa-chart-bar" style="color:var(--warn);"></i> Evolution des absences par date
    </h3>`;

  if (sortedDates.length === 0) {
    html += `<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;">Aucune donnee</div>`;
  } else {
    const maxDate = Math.max(...sortedDates.map(([,v]) => v));
    html += `<div style="display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:10px;">`;
    sortedDates.forEach(([date, count]) => {
      const pct = maxDate > 0 ? (count / maxDate * 100) : 0;
      const barColor = count >= maxDate * 0.7 ? 'var(--danger)' : count >= maxDate * 0.4 ? 'var(--warn)' : 'var(--accent)';
      html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
        <span style="font-size:11px;font-weight:600;color:${barColor};">${count}</span>
        <div style="width:100%;height:${Math.max(pct, 4)}%;background:${barColor};border-radius:4px 4px 0 0;min-height:4px;transition:height 0.5s;"></div>
        <span style="font-size:9px;color:var(--muted);transform:rotate(-45deg);white-space:nowrap;">${date.slice(5)}</span>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('statsContent').innerHTML = html;
}

// ============================================
// ONGLET FICHES ETUDIANTS
// ============================================
function renderStudentCards() {
  const students = GROUPS[currentGroup]?.students || [];
  const search = (document.getElementById('etudSearch')?.value || '').toLowerCase();
  const sort = document.getElementById('etudSort')?.value || 'name';

  // Calculer les stats par etudiant
  const groupAbs = absences.filter(a => a.group === currentGroup);
  const studentData = students.map(name => {
    const absList = groupAbs.filter(a => a.student === name);
    const modules = [...new Set(absList.map(a => a.module).filter(Boolean))];
    return { name, count: absList.length, modules, lastAbs: absList.length ? absList[absList.length-1].date : null };
  });

  let filtered = studentData;
  if (search) filtered = filtered.filter(s => s.name.toLowerCase().includes(search));

  if (sort === 'abs-desc') filtered.sort((a,b) => b.count - a.count);
  else if (sort === 'abs-asc') filtered.sort((a,b) => a.count - b.count);
  else filtered.sort((a,b) => a.name.localeCompare(b.name));

  let html = '';
  filtered.forEach(s => {
    const statusClass = s.count >= 5 ? 'badge-danger' : s.count >= 3 ? 'badge-warn' : s.count > 0 ? 'badge-ok' : '';
    const borderColor = s.count >= 5 ? 'var(--danger)' : s.count >= 3 ? 'var(--warn)' : 'var(--border)';
    html += `<div style="background:var(--card);border:1px solid ${borderColor};border-radius:12px;padding:16px;transition:all 0.2s;" class="fade-up"
      onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 20px rgba(0,0,0,0.3)'"
      onmouseleave="this.style.transform='';this.style.boxShadow=''">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div>
          <div style="font-weight:600;font-size:14px;margin-bottom:2px;">${s.name}</div>
          <div style="font-size:11px;color:var(--muted);">${currentGroup}</div>
        </div>
        ${statusClass ? `<span class="badge ${statusClass}">${s.count} abs.</span>` : `<span style="font-size:11px;color:var(--accent);font-weight:600;"><i class="fas fa-check-circle"></i> Aucune absence</span>`}
      </div>
      ${s.modules.length > 0 ? `<div style="font-size:11px;color:var(--muted);margin-bottom:6px;"><i class="fas fa-book" style="margin-right:4px;"></i> Modules: ${s.modules.slice(0,3).join(', ')}${s.modules.length > 3 ? ` +${s.modules.length-3}` : ''}</div>` : ''}
      ${s.lastAbs ? `<div style="font-size:11px;color:var(--muted);"><i class="fas fa-calendar" style="margin-right:4px;"></i> Derniere: ${formatDate(s.lastAbs)}</div>` : ''}
    </div>`;
  });

  if (filtered.length === 0) {
    html = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);">
      <i class="fas fa-search" style="font-size:32px;display:block;margin-bottom:12px;opacity:0.3;"></i>
      Aucun etudiant trouve
    </div>`;
  }

  document.getElementById('studentCards').innerHTML = html;
}

// ============================================
// EXPORT CSV
// ============================================
function exportCSV() {
  const groupAbs = absences.filter(a => a.group === currentGroup);
  if (groupAbs.length === 0) {
    showToast('Aucune donnee a exporter', 'info');
    return;
  }
  groupAbs.sort((a,b) => a.date.localeCompare(b.date) || a.student.localeCompare(b.student));

  let csv = '\uFEFF'; // BOM pour Excel
  csv += 'Date,Creneau,Module,Etudiant,Justification\n';
  groupAbs.forEach(a => {
    csv += `${a.date},"${a.time}","${a.module}","${a.student}","${a.justification || ''}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `absences_${currentGroup.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Fichier CSV exporte avec succes', 'success');
}

// ============================================
// UTILITAIRES
// ============================================
function formatDate(dateStr) {
  if (!dateStr) return '-';
  const parts = dateStr.split('-');
  const months = ['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
  return `${parseInt(parts[2])} ${months[parseInt(parts[1])-1]} ${parts[0]}`;
}

function showToast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
  toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('toast-exit');
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

let modalCallback = null;
function showModal(title, msg, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  modalCallback = onConfirm;
  document.getElementById('modalConfirmBtn').onclick = () => {
    closeModal();
    if (modalCallback) modalCallback();
  };
  document.getElementById('confirmModal').classList.add('show');
}
function closeModal() {
  document.getElementById('confirmModal').classList.remove('show');
  modalCallback = null;
}
// Fermer modal au clic hors zone
document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Responsive grille stats
const statsGrid = document.querySelector('#tab-statistiques .fade-up');
</script>
