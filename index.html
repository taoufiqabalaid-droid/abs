<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre des absences — Institut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Libre+Franklin:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3EEE1;
    --paper-line:#D9CFB8;
    --paper-dark:#E7DFC9;
    --ink:#1B2A3C;
    --ink-soft:#4A5568;
    --binder:#22314A;
    --binder-light:#324667;
    --absent:#A6303A;
    --absent-bg:#F5E3E1;
    --gold:#B8934A;
    --good:#3E6B4F;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Libre Franklin',sans-serif;
    min-height:100vh;
  }
  .app{display:flex; flex-direction:column; min-height:100vh;}

  /* HEADER */
  header{
    background:var(--binder);
    color:var(--paper);
    padding:22px 32px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:4px solid var(--gold);
  }
  header h1{
    font-family:'Fraunces',serif;
    font-size:26px;
    margin:0 0 2px;
  }
  header .sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:#C7D1E2;
  }
  .header-stats{
    display:flex; gap:22px;
  }
  .header-stat{text-align:right;}
  .header-stat b{
    display:block; font-family:'Fraunces',serif; font-size:22px; color:var(--gold);
  }
  .header-stat span{font-size:11px; color:#B9C4D8; font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:.05em;}

  /* FILTER BAR */
  .filters{
    background:var(--paper-dark);
    border-bottom:1px solid var(--paper-line);
    padding:14px 32px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  select, input[type="text"], input[type="date"]{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    border:1px solid var(--paper-line);
    background:#fff;
    padding:8px 10px;
    border-radius:var(--radius);
    color:var(--ink);
  }
  input[type="text"]{font-family:'Libre Franklin',sans-serif; min-width:200px;}
  select:focus, input:focus, button:focus, textarea:focus{
    outline:2px solid var(--gold); outline-offset:1px;
  }
  .filters label{
    font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft);
    display:flex; flex-direction:column; gap:4px; font-family:'IBM Plex Mono',monospace;
  }
  button{font-family:'Libre Franklin',sans-serif; cursor:pointer;}
  .btn{
    background:var(--ink); color:var(--paper); border:none;
    padding:9px 16px; border-radius:var(--radius); font-size:13px; font-weight:600;
  }
  .btn:hover{background:var(--binder-light);}
  .btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--ink);}
  .btn.ghost:hover{background:rgba(0,0,0,.05);}
  .btn.danger{background:var(--absent); color:#fff;}
  .spacer{flex:1;}

  /* LAYOUT */
  .body-grid{
    display:grid;
    grid-template-columns:1fr 260px;
    gap:0;
    flex:1;
  }
  @media (max-width:900px){
    .body-grid{grid-template-columns:1fr;}
  }
  main{padding:22px 32px 40px;}
  aside{
    border-left:1px solid var(--paper-line);
    padding:22px 20px;
    display:flex; flex-direction:column; gap:20px;
  }
  .stats-title{
    font-family:'Fraunces',serif; font-size:13px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--ink-soft); margin:0 0 8px;
  }
  .top-item{
    display:flex; justify-content:space-between; font-size:12.5px; padding:6px 0;
    border-bottom:1px dotted var(--paper-line);
  }
  .top-item:last-child{border-bottom:none;}
  .top-item b{font-family:'IBM Plex Mono',monospace; color:var(--absent);}

  /* TABLE */
  .roster{
    background:rgba(255,255,255,.55);
    border:1px solid var(--paper-line);
    border-radius:6px;
    overflow:hidden;
  }
  table{width:100%; border-collapse:collapse;}
  thead th{
    text-align:left;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:10px 12px;
    border-bottom:1px solid var(--paper-line);
    background:var(--paper-dark);
    white-space:nowrap;
  }
  tbody td{
    padding:9px 12px;
    border-bottom:1px solid var(--paper-line);
    vertical-align:top;
    font-size:13px;
  }
  tbody tr:hover{background:rgba(166,48,58,.04);}
  tbody tr:last-child td{border-bottom:none;}
  .cell-date{font-family:'IBM Plex Mono',monospace; white-space:nowrap; font-size:12px;}
  .cell-seance{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft); white-space:nowrap;}
  .cell-name{font-weight:600;}
  .tag{
    display:inline-block; font-size:10.5px; font-family:'IBM Plex Mono',monospace;
    background:var(--binder); color:var(--paper); padding:2px 6px; border-radius:3px; margin-right:4px;
  }
  .cell-module{font-size:12.5px; color:var(--ink-soft); max-width:220px;}
  .cell-obs{font-size:12px; color:var(--ink-soft); font-style:italic; max-width:160px;}
  .row-actions{white-space:nowrap;}
  .icon-btn{
    background:none; border:none; color:var(--ink-soft); font-size:14px; opacity:.55; margin-right:6px;
  }
  .icon-btn:hover{opacity:1; color:var(--absent);}

  .empty{padding:50px 20px; text-align:center; color:var(--ink-soft); font-family:'Fraunces',serif; font-size:16px;}

  .pagination{
    display:flex; align-items:center; justify-content:center; gap:10px;
    padding:14px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--ink-soft);
  }
  .pagination button{
    background:#fff; border:1px solid var(--paper-line); border-radius:var(--radius);
    padding:6px 10px; font-size:12px;
  }
  .pagination button:disabled{opacity:.4; cursor:default;}

  /* MODAL */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(27,42,60,.4);
    display:flex; align-items:center; justify-content:center; z-index:60; padding:20px;
  }
  .modal{
    background:var(--paper); border-radius:8px; padding:24px;
    width:420px; max-width:100%; box-shadow:0 14px 36px rgba(0,0,0,.25);
    border:1px solid var(--paper-line);
    max-height:88vh; overflow:auto;
  }
  .modal h3{margin:0 0 16px; font-family:'Fraunces',serif;}
  .field{margin-bottom:12px; display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .field input, .field select, .field textarea{
    width:100%; font-family:'Libre Franklin',sans-serif; font-size:13.5px;
    border:1px solid var(--paper-line); border-radius:var(--radius); padding:8px 10px; background:#fff;
  }
  .field textarea{resize:vertical; min-height:50px; font-family:'Libre Franklin',sans-serif;}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:16px;}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper);
    padding:10px 18px; border-radius:6px; font-size:13px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:80;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

  .loading{
    position:fixed; inset:0; background:var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; color:var(--ink-soft); font-size:15px; z-index:100;
  }
  .results-count{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); padding:0 2px 10px;
  }

  /* MULTI-SELECT STUDENT PICKER */
  .student-picker{
    border:1px solid var(--paper-line); border-radius:var(--radius); background:#fff;
    padding:8px; display:flex; flex-direction:column; gap:8px;
  }
  .chip-row{display:flex; flex-wrap:wrap; gap:6px;}
  .chip-row:empty{display:none;}
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--binder); color:var(--paper);
    font-size:12px; font-family:'Libre Franklin',sans-serif;
    padding:4px 6px 4px 10px; border-radius:999px;
  }
  .chip button{
    background:none; border:none; color:var(--paper); opacity:.7; cursor:pointer;
    font-size:13px; line-height:1; padding:0 2px;
  }
  .chip button:hover{opacity:1; color:var(--absent-bg);}
  .student-input-row{position:relative;}
  .student-suggestions{
    position:absolute; z-index:5; top:calc(100% + 2px); left:0; right:0;
    background:#fff; border:1px solid var(--paper-line); border-radius:var(--radius);
    max-height:160px; overflow-y:auto; box-shadow:0 6px 18px rgba(0,0,0,.12);
  }
  .student-suggestions div{
    padding:7px 10px; font-size:12.5px; cursor:pointer;
  }
  .student-suggestions div:hover, .student-suggestions div.active{
    background:var(--paper-dark);
  }
  .picker-hint{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
</style>
</head>

<script>
(function(){

const STORAGE_KEY = 'absences-institut-v1';
let records = [];
let saveTimer = null;

let filters = { filiere:'', semestre:'', q:'', from:'', to:'' };
let page = 1;
const PAGE_SIZE = 40;

function uid(){ return 'r'+Math.random().toString(36).slice(2,10); }

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      records = JSON.parse(res.value);
      return;
    }
  }catch(e){
    console.log('Aucune donnée sauvegardée, chargement des données importées.', e);
  }
  // First run: seed from the imported Excel data
  try{
    const seedEl = document.getElementById('seed-data');
    records = JSON.parse(seedEl.textContent);
  }catch(e){
    console.error('Erreur de chargement des données importées', e);
    records = [];
  }
  scheduleSave(true);
}

function scheduleSave(immediate){
  clearTimeout(saveTimer);
  const run = async ()=>{
    try{
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(records), false);
      if(!result) console.error('Échec de l’enregistrement.');
    }catch(e){
      console.error('Erreur de stockage', e);
      showToast('⚠ Échec de l’enregistrement — réessayez.');
    }
  };
  if(immediate){ run(); } else { saveTimer = setTimeout(run, 300); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 1900);
}

function uniqueSorted(arr){
  return Array.from(new Set(arr.filter(Boolean))).sort((a,b)=>a.localeCompare(b));
}

function getFiliereOptions(){ return uniqueSorted(records.map(r=>r.filiere)); }
function getSemestreOptions(){ return ['S1','S2','S3','S4','S5','S6'].filter(s=> records.some(r=>r.semestre===s)); }

function applyFilters(){
  let out = records;
  if(filters.filiere) out = out.filter(r=>r.filiere===filters.filiere);
  if(filters.semestre) out = out.filter(r=>r.semestre===filters.semestre);
  if(filters.q.trim()){
    const q = filters.q.trim().toLowerCase();
    out = out.filter(r=>
      (r.etudiant||'').toLowerCase().includes(q) ||
      (r.module||'').toLowerCase().includes(q)
    );
  }
  if(filters.from) out = out.filter(r=> r.date && r.date >= filters.from);
  if(filters.to) out = out.filter(r=> r.date && r.date <= filters.to);
  // sort by date desc, nulls last
  out = out.slice().sort((a,b)=>{
    if(!a.date && !b.date) return 0;
    if(!a.date) return 1;
    if(!b.date) return -1;
    return b.date.localeCompare(a.date);
  });
  return out;
}

function computeTopStudents(filtered){
  const counts = {};
  filtered.forEach(r=>{ counts[r.etudiant] = (counts[r.etudiant]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
}
function computeTopModules(filtered){
  const counts = {};
  filtered.forEach(r=>{ if(r.module) counts[r.module] = (counts[r.module]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
}

function render(){
  const app = document.getElementById('app');
  const filtered = applyFilters();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if(page > totalPages) page = totalPages;
  const pageItems = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  const totalStudents = new Set(records.map(r=>r.etudiant)).size;
  const filiereOpts = getFiliereOptions();
  const semestreOpts = getSemestreOptions();

  app.innerHTML = `
    <header>
      <div>
        <h1>Registre des absences</h1>
        <div class="sub">Institut de formation aux carrières de santé — année 2025/2026</div>
      </div>
      <div class="header-stats">
        <div class="header-stat"><b>${records.length}</b><span>absences enregistrées</span></div>
        <div class="header-stat"><b>${totalStudents}</b><span>élèves concernés</span></div>
        <div class="header-stat"><b>${filiereOpts.length}</b><span>filières</span></div>
      </div>
    </header>

    <div class="filters">
      <label>Filière
        <select id="fFiliere">
          <option value="">Toutes</option>
          ${filiereOpts.map(f=>`<option value="${escapeAttr(f)}" ${filters.filiere===f?'selected':''}>${escapeHtml(f)}</option>`).join('')}
        </select>
      </label>
      <label>Semestre
        <select id="fSemestre">
          <option value="">Tous</option>
          ${semestreOpts.map(s=>`<option value="${s}" ${filters.semestre===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </label>
      <label>Du
        <input type="date" id="fFrom" value="${filters.from}">
      </label>
      <label>Au
        <input type="date" id="fTo" value="${filters.to}">
      </label>
      <label>Recherche
        <input type="text" id="fSearch" placeholder="Élève ou module…" value="${escapeAttr(filters.q)}">
      </label>
      <div class="spacer"></div>
      <button class="btn ghost" id="resetFilters">Réinitialiser</button>
      <button class="btn" id="addBtn">+ Ajouter une absence</button>
    </div>

    <div class="body-grid">
      <main>
        <div class="results-count">${filtered.length} résultat${filtered.length>1?'s':''}${filters.filiere||filters.semestre||filters.q||filters.from||filters.to ? ' (filtré)':''}</div>
        ${pageItems.length ? renderTable(pageItems) : `<div class="empty">Aucune absence ne correspond à ces filtres.</div>`}
        ${renderPagination(totalPages)}
      </main>
      <aside>
        <div>
          <p class="stats-title">Élèves les plus absents</p>
          ${renderTopList(computeTopStudents(filtered))}
        </div>
        <div>
          <p class="stats-title">Modules les plus touchés</p>
          ${renderTopList(computeTopModules(filtered))}
        </div>
      </aside>
    </div>
  `;

  wireEvents(filiereOpts);
}

function renderTable(items){
  return `
    <div class="roster">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Séance</th>
            <th>Filière</th>
            <th>Élève</th>
            <th>Module</th>
            <th>Observation</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${items.map(r=>`
            <tr data-id="${r.id}">
              <td class="cell-date">${r.date ? fmtDate(r.date) : '—'}</td>
              <td class="cell-seance">${r.seance ? escapeHtml(r.seance) : '—'}</td>
              <td><span class="tag">${escapeHtml(r.filiere)} ${escapeHtml(r.semestre)}</span></td>
              <td class="cell-name">${escapeHtml(r.etudiant)}</td>
              <td class="cell-module">${r.module ? escapeHtml(r.module) : '—'}</td>
              <td class="cell-obs">${r.observation ? escapeHtml(r.observation) : ''}</td>
              <td class="row-actions">
                <button class="icon-btn" data-edit="${r.id}" title="Modifier">✎</button>
                <button class="icon-btn" data-remove="${r.id}" title="Supprimer">✕</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderPagination(totalPages){
  if(totalPages<=1) return '';
  return `
    <div class="pagination">
      <button id="prevPage" ${page<=1?'disabled':''}>← Précédent</button>
      <span>Page ${page} / ${totalPages}</span>
      <button id="nextPage" ${page>=totalPages?'disabled':''}>Suivant →</button>
    </div>
  `;
}

function renderTopList(pairs){
  if(!pairs.length) return `<div class="top-item"><span>Aucune donnée</span></div>`;
  return pairs.map(([name,count])=>`
    <div class="top-item"><span>${escapeHtml(name)}</span><b>${count}</b></div>
  `).join('');
}

function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function wireEvents(filiereOpts){
  document.getElementById('fFiliere').addEventListener('change', e=>{ filters.filiere=e.target.value; page=1; render(); });
  document.getElementById('fSemestre').addEventListener('change', e=>{ filters.semestre=e.target.value; page=1; render(); });
  document.getElementById('fFrom').addEventListener('change', e=>{ filters.from=e.target.value; page=1; render(); });
  document.getElementById('fTo').addEventListener('change', e=>{ filters.to=e.target.value; page=1; render(); });
  document.getElementById('fSearch').addEventListener('input', e=>{ filters.q=e.target.value; page=1; render(); });
  document.getElementById('resetFilters').addEventListener('click', ()=>{
    filters = { filiere:'', semestre:'', q:'', from:'', to:'' }; page=1; render();
  });
  document.getElementById('addBtn').addEventListener('click', ()=>openRecordModal(null, filiereOpts));

  const prev = document.getElementById('prevPage');
  const next = document.getElementById('nextPage');
  if(prev) prev.addEventListener('click', ()=>{ page--; render(); });
  if(next) next.addEventListener('click', ()=>{ page++; render(); });

  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const rec = records.find(r=>r.id===btn.dataset.edit);
      if(rec) openRecordModal(rec, getFiliereOptions());
    });
  });
  document.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const rec = records.find(r=>r.id===btn.dataset.remove);
      if(rec && confirm(`Supprimer l'absence de ${rec.etudiant} du ${rec.date||'—'} ?`)){
        records = records.filter(r=>r.id!==rec.id);
        scheduleSave();
        render();
        showToast('Absence supprimée.');
      }
    });
  });
}

function openRecordModal(rec, filiereOpts){
  const isEdit = !!rec;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <h3>${isEdit ? 'Modifier l’absence' : 'Nouvelle absence'}</h3>
      <div class="two-col">
        <div class="field">
          <label>Filière</label>
          <input list="filiereList" id="mFiliere" value="${escapeAttr(rec?rec.filiere:'')}" placeholder="Ex. ISUSI">
          <datalist id="filiereList">${filiereOpts.map(f=>`<option value="${escapeAttr(f)}">`).join('')}</datalist>
        </div>
        <div class="field">
          <label>Semestre</label>
          <select id="mSemestre">
            ${['S1','S2','S3','S4','S5','S6'].map(s=>`<option value="${s}" ${rec&&rec.semestre===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="two-col">
        <div class="field">
          <label>Date</label>
          <input type="date" id="mDate" value="${rec&&rec.date?rec.date:''}">
        </div>
        <div class="field">
          <label>Séance</label>
          <input type="text" id="mSeance" value="${escapeAttr(rec?rec.seance||'':'')}" placeholder="08H30 - 12H30">
        </div>
      </div>
      ${isEdit ? `
      <div class="field">
        <label>Nom et prénom de l'élève</label>
        <input type="text" id="mEtudiant" value="${escapeAttr(rec.etudiant)}" placeholder="NOM Prénom">
      </div>
      ` : `
      <div class="field">
        <label>Élève(s) absent(s)</label>
        <div class="student-picker" id="studentPicker">
          <div class="chip-row" id="chipRow"></div>
          <div class="student-input-row">
            <input type="text" id="mStudentInput" placeholder="Taper un nom puis Entrée…" autocomplete="off">
            <div class="student-suggestions" id="studentSuggestions" style="display:none;"></div>
          </div>
        </div>
        <span class="picker-hint">Sélectionnez plusieurs élèves pour créer une absence identique à chacun.</span>
      </div>
      `}
      <div class="field">
        <label>Module</label>
        <input type="text" id="mModule" value="${escapeAttr(rec?rec.module||'':'')}" placeholder="Nom du module">
      </div>
      <div class="field">
        <label>Observation</label>
        <textarea id="mObs">${escapeHtml(rec?rec.observation||'':'')}</textarea>
      </div>
      <div class="modal-actions">
        ${isEdit ? '<button class="btn danger" id="deleteInModal">Supprimer</button>' : ''}
        <button class="btn ghost" id="cancelModal">Annuler</button>
        <button class="btn" id="saveModal">${isEdit?'Enregistrer':'Ajouter'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.addEventListener('click', e=>{ if(e.target===backdrop) backdrop.remove(); });
  backdrop.querySelector('#cancelModal').addEventListener('click', ()=>backdrop.remove());
  const delBtn = backdrop.querySelector('#deleteInModal');
  if(delBtn) delBtn.addEventListener('click', ()=>{
    if(confirm('Supprimer cette absence ?')){
      records = records.filter(r=>r.id!==rec.id);
      scheduleSave();
      backdrop.remove();
      render();
      showToast('Absence supprimée.');
    }
  });

  // --- Multi-student picker (add mode only) ---
  let selectedStudents = [];
  if(!isEdit){
    const allNames = uniqueSorted(records.map(r=>r.etudiant));
    const chipRow = backdrop.querySelector('#chipRow');
    const input = backdrop.querySelector('#mStudentInput');
    const suggBox = backdrop.querySelector('#studentSuggestions');

    function renderChips(){
      chipRow.innerHTML = selectedStudents.map((name,i)=>`
        <span class="chip">${escapeHtml(name)}<button type="button" data-i="${i}" aria-label="Retirer">✕</button></span>
      `).join('');
      chipRow.querySelectorAll('button').forEach(b=>{
        b.addEventListener('click', ()=>{
          selectedStudents.splice(Number(b.dataset.i),1);
          renderChips();
        });
      });
    }
    function addStudent(name){
      name = name.trim();
      if(!name) return;
      const already = selectedStudents.some(s=>s.toLowerCase()===name.toLowerCase());
      if(!already) selectedStudents.push(name);
      input.value='';
      suggBox.style.display='none';
      renderChips();
      input.focus();
    }
    function showSuggestions(){
      const q = input.value.trim().toLowerCase();
      let matches = allNames.filter(n=>!selectedStudents.some(s=>s.toLowerCase()===n.toLowerCase()));
      if(q) matches = matches.filter(n=>n.toLowerCase().includes(q));
      matches = matches.slice(0,8);
      if(!matches.length){ suggBox.style.display='none'; return; }
      suggBox.innerHTML = matches.map(n=>`<div data-name="${escapeAttr(n)}">${escapeHtml(n)}</div>`).join('');
      suggBox.style.display='block';
      suggBox.querySelectorAll('div').forEach(d=>{
        d.addEventListener('click', ()=>addStudent(d.dataset.name));
      });
    }
    input.addEventListener('focus', showSuggestions);
    input.addEventListener('input', showSuggestions);
    input.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault(); addStudent(input.value); }
      if(e.key===','){ e.preventDefault(); addStudent(input.value); }
      if(e.key==='Escape'){ suggBox.style.display='none'; }
    });
    document.addEventListener('click', function outsideClick(e){
      if(!backdrop.isConnected){ document.removeEventListener('click', outsideClick); return; }
      if(!e.target.closest('#studentPicker')) suggBox.style.display='none';
    });
  }

  backdrop.querySelector('#saveModal').addEventListener('click', ()=>{
    const filiere = backdrop.querySelector('#mFiliere').value.trim().toUpperCase();
    if(!filiere){ showToast('La filière est requise.'); return; }
    const baseData = {
      filiere,
      semestre: backdrop.querySelector('#mSemestre').value,
      date: backdrop.querySelector('#mDate').value || null,
      seance: backdrop.querySelector('#mSeance').value.trim() || null,
      module: backdrop.querySelector('#mModule').value.trim() || null,
      observation: backdrop.querySelector('#mObs').value.trim() || null,
    };
    if(isEdit){
      const etudiant = backdrop.querySelector('#mEtudiant').value.trim();
      if(!etudiant){ showToast('Le nom de l’élève est requis.'); return; }
      Object.assign(rec, baseData, {etudiant});
      showToast('Absence mise à jour.');
    }else{
      if(!selectedStudents.length){ showToast('Ajoutez au moins un élève.'); return; }
      selectedStudents.forEach(etudiant=>{
        records.push(Object.assign({id: uid()}, baseData, {etudiant}));
      });
      showToast(selectedStudents.length>1
        ? `${selectedStudents.length} absences ajoutées.`
        : 'Absence ajoutée.');
    }
    scheduleSave();
    backdrop.remove();
    render();
  });
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

async function init(){
  await loadData();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}
init();

})();
</script>
</body>
</html>
