<style>
:root{--paper:#F3EEE1;--paper-line:#D9CFB8;--paper-dark:#E7DFC9;--ink:#1B2A3C;--ink-soft:#4A5568;--binder:#22314A;--binder-light:#324667;--absent:#A6303A;--absent-bg:#F5E3E1;--gold:#B8934A;--good:#3E6B4F;--radius:4px}
*{box-sizing:border-box;margin:0;padding:0}html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Libre Franklin',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--binder);color:var(--paper);padding:22px 32px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;border-bottom:4px solid var(--gold)}

.header-stats{display:flex;gap:22px}
.header-stat{text-align:right}
.header-stat b{display:block;font-family:'Fraunces',serif;font-size:22px;color:var(--gold)}
.header-stat span{font-size:11px;color:#B9C4D8;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.filters{background:var(--paper-dark);border-bottom:1px solid var(--paper-line);padding:14px 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,input[type="text"],input[type="date"]{font-family:'IBM Plex Mono',monospace;font-size:12.5px;border:1px solid var(--paper-line);background:#fff;padding:8px 10px;border-radius:var(--radius);color:var(--ink)}
input[type="text"]{font-family:'Libre Franklin',sans-serif;min-width:200px}
select:focus,input:focus,button:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}
.filters label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);display:flex;flex-direction:column;gap:4px;font-family:'IBM Plex Mono',monospace}
button{font-family:'Libre Franklin',sans-serif;cursor:pointer}
.btn{background:var(--ink);color:var(--paper);border:none;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;transition:background .15s}
.btn:hover{background:var(--binder-light)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn.ghost:hover{background:rgba(0,0,0,.05)}
.btn.danger{background:var(--absent);color:#fff}
.btn.danger:hover{background:#8a252e}
.btn.gold{background:var(--gold);color:#fff}
.btn.gold:hover{background:#9a7a3c}
.btn.sm{padding:5px 10px;font-size:11px}
.spacer{flex:1}
.body-grid{display:grid;grid-template-columns:1fr 260px;gap:0;flex:1}

main{padding:22px 32px 40px}
aside{border-left:1px solid var(--paper-line);padding:22px 20px;display:flex;flex-direction:column;gap:20px}
.stats-title{font-family:'Fraunces',serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 8px}
.top-item{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px dotted var(--paper-line)}
.top-item:last-child{border-bottom:none}

.roster{background:rgba(255,255,255,.55);border:1px solid var(--paper-line);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);padding:10px 12px;border-bottom:1px solid var(--paper-line);background:var(--paper-dark);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--paper-line);vertical-align:top;font-size:13px}
tbody tr:hover{background:rgba(166,48,58,.04)}

.cell-date{font-family:'IBM Plex Mono',monospace;white-space:nowrap;font-size:12px}
.cell-seance{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);white-space:nowrap}
.cell-name{font-weight:600}
.tag{display:inline-block;font-size:10.5px;font-family:'IBM Plex Mono',monospace;background:var(--binder);color:var(--paper);padding:2px 6px;border-radius:3px;margin-right:4px}
.cell-module{font-size:12.5px;color:var(--ink-soft);max-width:220px}

.row-actions{white-space:nowrap}
.icon-btn{background:none;border:none;color:var(--ink-soft);font-size:14px;opacity:.55;margin-right:6px;cursor:pointer;padding:2px 4px}

.preview-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
.preview-table th{background:var(--paper-dark);font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;text-align:left;border-bottom:1px solid var(--paper-line)}
.preview-table td{padding:5px 8px;border-bottom:1px solid var(--paper-line)}

.import-stats{display:flex;gap:16px;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;flex-wrap:wrap}
.import-stats span{display:flex;align-items:center;gap:4px}

.confirm-box{background:var(--absent-bg);border:1px solid var(--absent);border-radius:var(--radius);padding:14px;margin-bottom:14px;font-size:13px;line-height:1.5}
.confirm-box strong{color:var(--absent)}
.format-info{background:rgba(255,255,255,.6);border:1px solid var(--paper-line);border-radius:var(--radius);padding:12px;margin-bottom:14px;font-size:12px;line-height:1.6;color:var(--ink-soft)}
.format-info code{background:var(--paper-dark);padding:1px 5px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px}
.format-info table{margin-top:6px;border-collapse:collapse;width:100%}
.format-info td{padding:3px 8px;border:1px solid var(--paper-line);font-size:12px}
.format-info td:first-child{background:var(--paper-dark);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;white-space:nowrap;width:100px}
.warn-tag{display:inline-block;background:var(--gold);color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;margin-left:6px;vertical-align:middle}
.mgmt-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.mgmt-toolbar .spacer{flex:1}
.sem-default-hint{font-size:11px;color:var(--ink-soft);font-style:italic;margin-top:4px;font-family:'IBM Plex Mono',monospace}
</style>
</head>

function addStudent(fil,sem,name){var k=mkKey(fil,sem);var nn=norm(name);if(!nn)return false;if(!stuReg[k])stuReg[k]=[];if(stuReg[k].some(function(s){return norm(s)===nn}))return false;stuReg[k].push(nn);ls(LS_STU,stuReg);return true}
function deleteStudent(fil,sem,stuName){var k=mkKey(fil,sem);var nn=norm(stuName);if(!stuReg[k])return{stu:0,rec:0};var before=stuReg[k].length;stuReg[k]=stuReg[k].filter(function(s){return norm(s)!==nn});var rm=before-stuReg[k].length;if(!stuReg[k].length)delete stuReg[k];ls(LS_STU,stuReg);var rr=0;st.rec=st.rec.filter(function(r){if(r.filiere===fil&&r.semestre===sem&&norm(r.etudiant)===nn){rr++;return false}return true});ls(LS_REC,st.rec);return{stu:rm,rec:rr}}

/* ═══════ Filtrage ═══════ */
function filtered(){var f=st.f,out=st.rec;if(f.fil)out=out.filter(function(r){return r.filiere===f.fil});if(f.sem)out=out.filter(function(r){return r.semestre===f.sem});if(f.mod)out=out.filter(function(r){return norm(r.module)===norm(f.mod)});if(f.df)out=out.filter(function(r){return r.date>=f.df});if(f.dt)out=out.filter(function(r){return r.date<=f.dt});if(f.q){var q=f.q.toLowerCase();out=out.filter(function(r){return r.etudiant.toLowerCase().indexOf(q)!==-1||r.module.toLowerCase().indexOf(q)!==-1||(r.observation||'').toLowerCase().indexOf(q)!==-1})}out.sort(function(a,b){return b.date.localeCompare(a.date)||a.seance.localeCompare(b.seance)||a.etudiant.localeCompare(b.etudiant)});return out}
function getMods(fil,sem){return(modReg[mkKey(fil,sem)]||[]).slice().sort()}
function getStus(fil,sem){return(stuReg[mkKey(fil,sem)]||[]).slice().sort()}
function getFils(){var s={};regKeys().forEach(function(k){var p=parseKey(k);if(p.fil)s[p.fil]=1});return Object.keys(s).sort()}
function getSems(fil){var s={};regKeys().forEach(function(k){var p=parseKey(k);if(!fil||p.fil===fil)s[p.sem]=1});return Object.keys(s).sort()}
function topAbsent(n){var c={};st.rec.forEach(function(r){c[r.etudiant]=(c[r.etudiant]||0)+1});return Object.keys(c).map(function(k){return{n:k,c:c[k]}}).sort(function(a,b){return b.c-a.c}).slice(0,n||5)}
function fmtDate(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function nid(){return'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

/* ═══════ Recherche flexible de colonne ═══════ */
function colVal(r,names){for(var i=0;i<names.length;i++){var keys=Object.keys(r);for(var j=0;j<keys.length;j++){if(keys[j].trim().toLowerCase()===names[i].toLowerCase()&&r[keys[j]]!==''&&r[keys[j]]!=null){return String(r[keys[j]]).trim()}}}return''}

function openEditModal(id){var r=st.rec.find(function(x){return x.id===id});if(!r)return;var fils=getFils();var h='<h3>Modifier l\'absence</h3>';h+='<div class="two-col"><div class="field"><label>Fili\u00e8re</label><select id="ef" onchange="updEditSems()"><option value="">--</option>';fils.forEach(function(f){h+='<option value="'+f+'"'+(r.filiere===f?' selected':'')+'>'+f+'</option>'});h+='</select></div><div class="field"><label>Semestre</label><select id="es" onchange="updEditOpts()"><option value="">--</option>';getSems(r.filiere).forEach(function(s){h+='<option value="'+s+'"'+(r.semestre===s?' selected':'')+'>'+s+'</option>'});h+='</select></div></div>';h+='<div class="field"><label>Module</label><select id="em">';getMods(r.filiere,r.semestre).forEach(function(m){h+='<option value="'+m+'"'+(norm(r.module)===norm(m)?' selected':'')+'>'+m+'</option>'});h+='</select></div>';h+='<div class="field"><label>\u00c9tudiant</label><select id="ee">';getStus(r.filiere,r.semestre).forEach(function(s){h+='<option value="'+s+'"'+(norm(r.etudiant)===norm(s)?' selected':'')+'>'+s+'</option>'});h+='</select></div>';h+='<div class="two-col"><div class="field"><label>Date</label><input type="date" id="ed" value="'+r.date+'"></div><div class="field"><label>S\u00e9ance</label><input type="text" id="ep" value="'+esc(r.seance)+'"></div></div>';h+='<div class="field"><label>Observation</label><textarea id="eo" rows="2">'+esc(r.observation||'')+'</textarea></div>';h+='<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn" onclick="saveEdit(\''+id+'\')">Sauvegarder</button></div>';openModal(h)}

function updModList(){
  var fil=(document.getElementById('mmf')||{}).value||'',sem=(document.getElementById('mms')||{}).value||'',q=((document.getElementById('mmq')||{}).value||'').toLowerCase();
  var map={};regKeys().forEach(function(k){var p=parseKey(k);if(fil&&p.fil!==fil)return;if(sem&&p.sem!==sem)return;(modReg[k]||[]).forEach(function(m){var nk=norm(m);if(!map[nk])map[nk]={name:m,fil:p.fil,sem:p.sem}})});
  var items=Object.keys(map).map(function(k){return map[k]});if(q)items=items.filter(function(it){return it.name.toLowerCase().indexOf(q)!==-1});items.sort(function(a,b){return a.name.localeCompare(b.name)});
  var el=document.getElementById('mmlist');if(!el)return;
  if(!items.length){el.innerHTML='<div style="padding:20px 0;text-align:center;color:var(--ink-soft);font-size:12px;font-style:italic">Aucun module trouv\u00e9.</div>';return}
  var h='';items.forEach(function(it){var ac=st.rec.filter(function(r){return r.filiere===it.fil&&r.semestre===it.sem&&norm(r.module)===norm(it.name)}).length;h+='<div class="mgmt-item"><div class="mgmt-item-info"><div class="mgmt-item-name">'+esc(it.name)+'</div><div class="mgmt-item-meta">'+esc(it.fil)+' / '+esc(it.sem)+(ac?' &mdash; '+ac+' absence'+(ac>1?'s':''):'')+'</div></div><button class="btn sm danger" onclick="confirmDelMod(\''+esc(it.fil)+'\',\''+esc(it.sem)+'\',\''+esc(it.name)+'\')">Supprimer</button></div>'});el.innerHTML=h;
}
function doAddMod(){var fil=(document.getElementById('mmf')||{}).value||'',sem=(document.getElementById('mms')||{}).value||'',name=(document.getElementById('mmadd')||{}).value||'';if(!fil||!sem){toast('S\u00e9lectionnez une fili\u00e8re et un semestre.');return}if(!name.trim()){toast('Entrez un nom de module.');return}if(addModule(fil,sem,name.trim())){document.getElementById('mmadd').value='';updModList();render();toast('Module ajout\u00e9.')}else{toast('Ce module existe d\u00e9j\u00e0.')}}
function confirmDelMod(fil,sem,modName){var nn=norm(modName);var ac=st.rec.filter(function(r){return r.filiere===fil&&r.semestre===sem&&norm(r.module)===nn}).length;var h='<h3>Supprimer le module</h3><div class="confirm-box">Supprimer <strong>'+esc(modName)+'</strong> ('+esc(fil)+' / '+esc(sem)+') ?';if(ac>0)h+='<br><br><span class="warn-tag">ATTENTION</span> '+ac+' absence'+(ac>1?'s':'')+' li\u00e9e'+(ac>1?'s':'')+' seront supprim\u00e9e'+(ac>1?'s':'')+'.';h+='</div><div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn danger" onclick="doDelMod(\''+esc(fil)+'\',\''+esc(sem)+'\',\''+esc(modName)+'\')">Confirmer</button></div>';openModal(h)}

/* ═══════ Import modules (Module / Filiere / Semestre) ═══════ */
var pendingModImport=null;
function openImportModModal(){

function handleStuFile(file){
  if(!file)return;
  loadXlsxLib().then(function(){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!rows.length){toast('Le fichier est vide.');return}
        parseStuImport(rows);
      }catch(err){toast('Erreur de lecture : '+err.message)}
    };
    reader.readAsArrayBuffer(file);
  }).catch(function(err){toast(err.message)});
}

function parseStuImport(rows){
  var parsed=[],errors=0;
  var semestresExistants=getSems();

  rows.slice(0,5000).forEach(function(r){
    /* Lecture flexible des colonnes */
    var nom = norm(colVal(r,['Nom','nom','NOM','Nom ']));
    var prenom = norm(colVal(r,['Prenom','Prénom','prenom','prénom','PRENOM','Prénom ','Prenom ']));
    var fil = norm(colVal(r,['Filiere','filiere','Filière','filière','FILIERE','Filiere ','Filière ']));
    var sem = norm(colVal(r,['Semestre','semestre','SEMESTRE','Sem','sem']));

    if(!nom||!fil){errors++;return}
    /* Prenom est optionnel : si absent, on garde juste le nom */
    if(!prenom) prenom='';

    /* Construire le nom complet : NOM Prénom (nom en majuscules) */
    var nomUpper = nom.toUpperCase();
    var fullName = prenom ? (nomUpper + ' ' + prenom) : nomUpper;

    /* Si pas de semestre dans le fichier, prendre le premier existant ou laisser vide */
    if(!sem && semestresExistants.length===1){
      sem = semestresExistants[0];
    }

    parsed.push({nom:nomUpper, prenom:prenom, fullName:fullName, filiere:fil, semestre:sem});
  });

  if(!parsed.length){
    toast('Aucune ligne valide.'+(errors?' ('+errors+' ligne'+(errors>1?'s':'')+' sans Nom/Filiere)':''));
    return;
  }

  /* Détecter doublons */
  var dupCount=0, newRows=[], noSemCount=0;
  parsed.forEach(function(r){
    /* Si pas de semestre, on ne peut pas enregistrer */
    if(!r.semestre){noSemCount++;return}
    var k=mkKey(r.filiere,r.semestre);
    var existing=stuReg[k]||[];
    var isDup=existing.some(function(s){return norm(s)===norm(r.fullName)});
    if(isDup){dupCount++}
    else{newRows.push(r)}
  });

  /* Dédupliquer dans les nouveaux */
  var seenNew={};
  newRows=newRows.filter(function(r){
    var key=r.filiere+'|'+r.semestre+'|'+r.fullName;
    if(seenNew[key])return false;
    seenNew[key]=true;return true;
  });

  pendingStuImport=newRows;

  var el=document.getElementById('stu-prev');
  if(!el)return;
  var h='';

  h+='<div class="import-stats">';
  h+='<span><span class="dot" style="background:var(--good)"></span> Nouveaux : '+newRows.length+'</span>';
  if(dupCount)h+='<span><span class="dot" style="background:var(--gold)"></span> D\u00e9j\u00e0 existants : '+dupCount+'</span>';
  if(noSemCount)h+='<span><span class="dot" style="background:var(--absent)"></span> Sans semestre : '+noSemCount+'</span>';
  if(errors)h+='<span><span class="dot" style="background:var(--absent)"></span> Incomplets : '+errors+'</span>';
  h+='</div>';

  if(noSemCount>0){
    h+='<div class="confirm-box" style="border-color:var(--gold);background:rgba(184,147,74,.08)">';
    h+='<strong style="color:var(--gold)">'+noSemCount+' \u00e9tudiant'+(noSemCount>1?'s':'')+' sans semestre</strong><br>';
    h+='<span style="font-size:12px;color:var(--ink-soft)">Ajoutez une colonne <code>Semestre</code> (S1, S2...) dans votre fichier pour les prendre en compte.</span>';
    h+='</div>';
  }

  /* Aperçu tableau */
  var preview=newRows.slice(0,12);
  if(preview.length){
    h+='<table class="preview-table"><thead><tr><th>Nom complet</th><th>Fili\u00e8re</th><th>Semestre</th></tr></thead><tbody>';
    preview.forEach(function(r){
      h+='<tr class="new"><td>'+esc(r.fullName)+'</td><td>'+esc(r.filiere)+'</td><td>'+esc(r.semestre)+'</td></tr>';
    });
    if(newRows.length>12)h+='<tr><td colspan="3" style="text-align:center;color:var(--ink-soft);font-style:italic">... et '+(newRows.length-12)+' autres</td></tr>';
    h+='</tbody></table>';
  }

  if(newRows.length){
    h+='<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn gold" onclick="doStuImport()">Importer '+newRows.length+' \u00e9tudiant'+(newRows.length>1?'s':'')+'</button></div>';
  }
  el.innerHTML=h;
}

function doStuImport(){
  if(!pendingStuImport||!pendingStuImport.length)return;
  var count=0;
  pendingStuImport.forEach(function(r){
    if(addStudent(r.filiere,r.semestre,r.fullName))count++;
  });
  pendingStuImport=null;
  closeModal();render();openStuMgmt();
  toast(count+' \u00e9tudiant'+(count>1?'s':'')+' import\u00e9'+(count>1?'s':'')+'.');
}

function handleAbsFile(file){if(!file)return;loadXlsxLib().then(function(){var reader=new FileReader();reader.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{defval:''});if(!rows.length){toast('Le fichier est vide.');return}parseAbsImport(rows)}catch(err){toast('Erreur : '+err.message)}};reader.readAsArrayBuffer(file)}).catch(function(err){toast(err.message)})}
function parseDate(v){if(!v)return null;if(typeof v==='number'){var d=XLSX.SSF.parse_date_code(v);if(d)return d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0')}var s=String(v).trim(),m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(m)return m[3]+'-'+m[2]+'-'+m[1];m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return s;return null}
function parseAbsImport(rows){var parsed=[],errors=0;rows.slice(0,5000).forEach(function(r){var fil=norm(colVal(r,['Filiere','filiere','Filière','filière']));var sem=norm(colVal(r,['Semestre','semestre']));var dat=parseDate(colVal(r,['Date','date']));var sea=colVal(r,['Seance','séance','Séance','seance']);var stu=colVal(r,['Etudiant','étudiant','Étudiant','etudiant','Nom','nom']);var mod=colVal(r,['Module','module']);var obs=colVal(r,['Observation','observation','Obs','obs'])||null;fil=norm(fil);sem=norm(sem);stu=norm(stu);mod=norm(mod);if(!fil||!sem||!dat||!sea||!stu||!mod){errors++;return}parsed.push({filiere:fil,semestre:sem,date:dat,seance:sea,etudiant:stu,module:mod,observation:obs||null,id:nid()})});if(!parsed.length){toast('Aucune ligne valide.'+(errors?' ('+errors+' erreurs)':''));return}var existing={};st.rec.forEach(function(r){existing[r.filiere+'|'+r.semestre+'|'+r.date+'|'+r.seance+'|'+r.etudiant+'|'+r.module]=1});var dupCount=0,newRows=[];parsed.forEach(function(r){var key=r.filiere+'|'+r.semestre+'|'+r.date+'|'+r.seance+'|'+r.etudiant+'|'+r.module;if(existing[key]){dupCount++}else{newRows.push(r);existing[key]=1}});pendingAbsImport=newRows;var el=document.getElementById('abs-prev');if(!el)return;var h='<div class="import-stats"><span><span class="dot" style="background:var(--good)"></span> Nouveaux : '+newRows.length+'</span>';if(dupCount)h+='<span><span class="dot" style="background:var(--gold)"></span> Doublons : '+dupCount+'</span>';if(errors)h+='<span><span class="dot" style="background:var(--absent)"></span> Erreurs : '+errors+'</span></div>';var preview=newRows.slice(0,8);if(preview.length){h+='<table class="preview-table"><thead><tr><th>Date</th><th>\u00c9tudiant</th><th>Module</th></tr></thead><tbody>';preview.forEach(function(r){h+='<tr class="new"><td>'+fmtDate(r.date)+'</td><td>'+esc(r.etudiant)+'</td><td>'+esc(r.module)+'</td></tr>'});if(newRows.length>8)h+='<tr><td colspan="3" style="text-align:center;color:var(--ink-soft);font-style:italic">... et '+(newRows.length-8)+' autres</td></tr>';h+='</tbody></table>'}if(newRows.length)h+='<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn gold" onclick="doAbsImport()">Importer '+newRows.length+' enregistrement'+(newRows.length>1?'s':'')+'</button></div>';el.innerHTML=h}
function doAbsImport(){if(!pendingAbsImport||!pendingAbsImport.length)return;pendingAbsImport.forEach(function(r){st.rec.push(r);addModule(r.filiere,r.semestre,r.module);addStudent(r.filiere,r.semestre,r.etudiant)});var count=pendingAbsImport.length;pendingAbsImport=null;ls(LS_REC,st.rec);closeModal();render();toast(count+' absence'+(count>1?'s':'')+' import\u00e9e'+(count>1?'s':'')+'.')}

/* ═══════ Export XLSX ═══════ */
function exportXlsx(){var all=filtered();if(!all.length){toast('Aucune donn\u00e9e \u00e0 exporter.');return}loadXlsxLib().then(function(){var data=all.map(function(r){return{'Filiere':r.filiere,'Semestre':r.semestre,'Date':r.date,'Seance':r.seance,'Etudiant':r.etudiant,'Module':r.module,'Observation':r.observation||''}});var ws=XLSX.utils.json_to_sheet(data);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Absences');ws['!cols']=[{wch:8},{wch:10},{wch:12},{wch:16},{wch:28},{wch:40},{wch:20}];XLSX.writeFile(wb,'absences_'+new Date().toISOString().slice(0,10)+'.xlsx');toast('Fichier export\u00e9.')}).catch(function(err){toast(err.message)})}

/* ═══════ Raccourcis clavier ═══════ */
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

/* ═══════ Initialisation ═══════ */
function init(){
  st.rec=ls(LS_REC);
  if(!st.rec){st.rec=SEED.map(function(r){return{id:r.id||nid(),filiere:norm(r.filiere),semestre:norm(r.semestre),date:r.date,seance:r.seance,etudiant:norm(r.etudiant),module:norm(r.module),observation:r.observation}});ls(LS_REC,st.rec)}
  else{st.rec=st.rec.map(function(r){return{id:r.id||nid(),filiere:norm(r.filiere),semestre:norm(r.semestre),date:r.date,seance:r.seance,etudiant:norm(r.etudiant),module:norm(r.module),observation:r.observation}});ls(LS_REC,st.rec)}
  loadMods();loadStus();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}
init();
</script>
