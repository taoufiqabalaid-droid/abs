<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre des absences — Institut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Libre+Franklin:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F3EEE1;--paper-line:#D9CFB8;--paper-dark:#E7DFC9;--ink:#1B2A3C;--ink-soft:#4A5568;--binder:#22314A;--binder-light:#324667;--absent:#A6303A;--absent-bg:#F5E3E1;--gold:#B8934A;--good:#3E6B4F;--radius:4px}
*{box-sizing:border-box;margin:0;padding:0}html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Libre Franklin',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--binder);color:var(--paper);padding:22px 32px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;border-bottom:4px solid var(--gold)}
header h1{font-family:'Fraunces',serif;font-size:26px;margin:0 0 2px}
header .sub{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#C7D1E2}
.header-stats{display:flex;gap:22px}
.header-stat{text-align:right}
.header-stat b{display:block;font-family:'Fraunces',serif;font-size:22px;color:var(--gold)}
.header-stat span{font-size:11px;color:#B9C4D8;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.filters{background:var(--paper-dark);border-bottom:1px solid var(--paper-line);padding:14px 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,input[type="text"],input[type="date"]{font-family:'IBM Plex Mono',monospace;font-size:12.5px;border:1px solid var(--paper-line);background:#fff;padding:8px 10px;border-radius:var(--radius);color:var(--ink)}
input[type="text"]{font-family:'Libre Franklin',sans-serif;min-width:200px}
select:focus,input:focus,button:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}
.filters label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);display:flex;flex-direction:column;gap:4px;font-family:'IBM Plex Mono',monospace}
button{font-family:'Libre Franklin',sans-serif;cursor:pointer}
.btn{background:var(--ink);color:var(--paper);border:none;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;transition:background .15s}
.btn:hover{background:var(--binder-light)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn.ghost:hover{background:rgba(0,0,0,.05)}
.btn.danger{background:var(--absent);color:#fff}
.btn.danger:hover{background:#8a252e}
.btn.gold{background:var(--gold);color:#fff}
.btn.gold:hover{background:#9a7a3c}
.btn.sm{padding:4px 10px;font-size:11px}
.spacer{flex:1}
.body-grid{display:grid;grid-template-columns:1fr 260px;gap:0;flex:1}
@media(max-width:900px){.body-grid{grid-template-columns:1fr}}
main{padding:22px 32px 40px}
aside{border-left:1px solid var(--paper-line);padding:22px 20px;display:flex;flex-direction:column;gap:20px}
.stats-title{font-family:'Fraunces',serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 8px}
.top-item{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px dotted var(--paper-line)}
.top-item:last-child{border-bottom:none}
.top-item b{font-family:'IBM Plex Mono',monospace;color:var(--absent)}
.roster{background:rgba(255,255,255,.55);border:1px solid var(--paper-line);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);padding:10px 12px;border-bottom:1px solid var(--paper-line);background:var(--paper-dark);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--paper-line);vertical-align:top;font-size:13px}
tbody tr:hover{background:rgba(166,48,58,.04)}
tbody tr:last-child td{border-bottom:none}
.cell-date{font-family:'IBM Plex Mono',monospace;white-space:nowrap;font-size:12px}
.cell-seance{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);white-space:nowrap}
.cell-name{font-weight:600}
.tag{display:inline-block;font-size:10.5px;font-family:'IBM Plex Mono',monospace;background:var(--binder);color:var(--paper);padding:2px 6px;border-radius:3px;margin-right:4px}
.cell-module{font-size:12.5px;color:var(--ink-soft);max-width:220px}
.cell-obs{font-size:12px;color:var(--ink-soft);font-style:italic;max-width:160px}
.row-actions{white-space:nowrap}
.icon-btn{background:none;border:none;color:var(--ink-soft);font-size:14px;opacity:.55;margin-right:6px;cursor:pointer;padding:2px 4px}
.icon-btn:hover{opacity:1;color:var(--absent)}
.empty{padding:50px 20px;text-align:center;color:var(--ink-soft);font-family:'Fraunces',serif;font-size:16px}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink-soft)}
.pagination button{background:#fff;border:1px solid var(--paper-line);border-radius:var(--radius);padding:6px 10px;font-size:12px}
.pagination button:disabled{opacity:.4;cursor:default}
.results-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);padding:0 2px 10px}
.modal-backdrop{position:fixed;inset:0;background:rgba(27,42,60,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);border-radius:8px;padding:24px;width:520px;max-width:100%;box-shadow:0 14px 36px rgba(0,0,0,.25);border:1px solid var(--paper-line);max-height:90vh;overflow:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal.wide{width:680px}
.modal h3{margin:0 0 16px;font-family:'Fraunces',serif;font-size:18px}
.field{margin-bottom:12px;display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace}
.field input,.field select,.field textarea{width:100%;font-family:'Libre Franklin',sans-serif;font-size:13.5px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:8px 10px;background:#fff}
.field textarea{resize:vertical;min-height:50px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.loading{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;color:var(--ink-soft);font-size:15px;z-index:100}
.mgmt-list{max-height:340px;overflow-y:auto;border:1px solid var(--paper-line);border-radius:var(--radius);background:#fff}
.mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--paper-line);font-size:13px;gap:8px}
.mgmt-item:last-child{border-bottom:none}
.mgmt-item:hover{background:var(--paper-dark)}
.mgmt-item-info{flex:1;min-width:0}
.mgmt-item-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mgmt-item-meta{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace}
.mgmt-item .btn{padding:4px 10px;font-size:11px;flex-shrink:0}
.mgmt-search{margin-bottom:12px}
.confirm-box{background:var(--absent-bg);border:1px solid var(--absent);border-radius:var(--radius);padding:14px;margin-bottom:14px;font-size:13px;line-height:1.5}
.confirm-box strong{color:var(--absent)}
.format-info{background:rgba(255,255,255,.6);border:1px solid var(--paper-line);border-radius:var(--radius);padding:12px;margin-bottom:14px;font-size:12px;line-height:1.6;color:var(--ink-soft)}
.format-info code{background:var(--paper-dark);padding:1px 5px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px}
.drop-zone{border:2px dashed var(--paper-line);border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(184,147,74,.06)}
.drop-zone-icon{font-size:32px;margin-bottom:8px;opacity:.5}
.drop-zone-text{font-size:13px;color:var(--ink-soft);margin-bottom:4px}
.drop-zone-hint{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;opacity:.7}
.preview-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
.preview-table th{background:var(--paper-dark);font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;text-align:left;border-bottom:1px solid var(--paper-line)}
.preview-table td{padding:5px 8px;border-bottom:1px solid var(--paper-line)}
.import-stats{display:flex;gap:16px;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;font-size:12px}
.import-stats span{display:flex;align-items:center;gap:4px}
.import-stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--paper-line);margin-bottom:16px}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:8px 16px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:all .15s;margin-bottom:-2px}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--gold)}
.tab-btn:hover{color:var(--ink)}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>

<script>
/* ═══════ Chargement dynamique XLSX ═══════ */
var xlsxLoaded = false, xlsxLoading = false;
function loadXlsxLib() {
    return new Promise(function(ok, no) {
        if (xlsxLoaded && window.XLSX) { ok(); return; }
        if (xlsxLoading) {
            var c = setInterval(function() { if (xlsxLoaded) { clearInterval(c); ok(); } }, 100);
            setTimeout(function() { clearInterval(c); no(new Error('Timeout')); }, 15000);
            return;
        }
        xlsxLoading = true;
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload = function() { xlsxLoaded = true; xlsxLoading = false; ok(); };
        s.onerror = function() { xlsxLoading = false; no(new Error('Connexion requise pour l\'import XLSX.')); };
        document.head.appendChild(s);
    });
}

/* ═══════ Constantes & État ═══════ */
var SEED, LS_REC = 'abs_rec_v5', LS_MOD = 'abs_mod_v5', LS_STU = 'abs_stu_v5', PP = 15;
var st = { rec: [], f: { fil: '', sem: '', mod: '', df: '', dt: '', q: '' }, p: 1, eid: null };
var modReg = {}, stuReg = {};
try { SEED = JSON.parse(document.getElementById('seed-data').textContent); } catch(e) { SEED = []; }

/* ═══════ LocalStorage helper ═══════ */
function ls(k, v) {
    try {
        if (v !== undefined) { localStorage.setItem(k, JSON.stringify(v)); return; }
        var r = localStorage.getItem(k);
        return r ? JSON.parse(r) : null;
    } catch(e) { return v !== undefined ? undefined : null; }
}

/* ═══════ Clé registre : FILIERE_SEMESTRE ═══════ */
function mkKey(fil, sem) { return (fil || '') + '_' + (sem || ''); }
function parseKey(k) { var p = k.split('_'); return { fil: p[0] || '', sem: p[1] || '' }; }
function allKeys() {
    var s = {};
    Object.keys(stuReg).forEach(function(k) { s[k] = 1; });
    Object.keys(modReg).forEach(function(k) { s[k] = 1; });
    return Object.keys(s).sort();
}

/* ═══════ Chargement des données ═══════ */
function loadMods() {
    modReg = ls(LS_MOD);
    if (!modReg) {
        /* Construire depuis les seed data */
        modReg = {};
        SEED.forEach(function(r) {
            var k = mkKey(r.filiere, r.semestre);
            if (!modReg[k]) modReg[k] = [];
            if (r.module && modReg[k].indexOf(r.module) === -1) modReg[k].push(r.module);
        });
        /* Trier chaque liste */
        Object.keys(modReg).forEach(function(k) { modReg[k].sort(); });
        saveMods();
    }
}

function loadStus() {
    stuReg = ls(LS_STU);
    if (!stuReg) {
        stuReg = {};
        SEED.forEach(function(r) {
            var k = mkKey(r.filiere, r.semestre);
            if (!stuReg[k]) stuReg[k] = [];
            if (r.etudiant && stuReg[k].indexOf(r.etudiant) === -1) stuReg[k].push(r.etudiant);
        });
        Object.keys(stuReg).forEach(function(k) { stuReg[k].sort(); });
        saveStus();
    }
}

function loadRecs() {
    st.rec = ls(LS_REC);
    if (!st.rec) {
        st.rec = SEED.slice();
        saveRecs();
    }
}

function saveMods() { ls(LS_MOD, modReg); }
function saveStus() { ls(LS_STU, stuReg); }
function saveRecs() { ls(LS_REC, st.rec); }

/* ═══════ Utilitaires ═══════ */
function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(d) { if (!d) return ''; var p = d.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
function newId() { return 'r' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }

function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(function() { t.classList.remove('show'); }, 2600);
}

/* ═══════ Données dérivées ═══════ */
function filieres() { var s = {}; allKeys().forEach(function(k) { var p = parseKey(k); if (p.fil) s[p.fil] = 1; }); return Object.keys(s).sort(); }
function semestres(fil) { var s = {}; allKeys().forEach(function(k) { var p = parseKey(k); if (p.fil === fil && p.sem) s[p.sem] = 1; }); return Object.keys(s).sort(); }
function modules(fil, sem) { var k = mkKey(fil, sem); return (modReg[k] || []).slice().sort(); }
function etudiants(fil, sem) { var k = mkKey(fil, sem); return (stuReg[k] || []).slice().sort(); }

/* ═══════ Filtrage & pagination ═══════ */
function filtered() {
    var f = st.f, r = st.rec;
    if (f.fil) r = r.filter(function(x) { return x.filiere === f.fil; });
    if (f.sem) r = r.filter(function(x) { return x.semestre === f.sem; });
    if (f.mod) r = r.filter(function(x) { return x.module === f.mod; });
    if (f.df) r = r.filter(function(x) { return x.date >= f.df; });
    if (f.dt) r = r.filter(function(x) { return x.date <= f.dt; });
    if (f.q) {
        var q = f.q.toLowerCase();
        r = r.filter(function(x) {
            return (x.etudiant || '').toLowerCase().indexOf(q) !== -1 ||
                   (x.module || '').toLowerCase().indexOf(q) !== -1 ||
                   (x.observation || '').toLowerCase().indexOf(q) !== -1;
        });
    }
    r.sort(function(a, b) { return (b.date + b.seance).localeCompare(a.date + a.seance); });
    return r;
}

function paged() {
    var all = filtered();
    var total = all.length;
    var maxP = Math.max(1, Math.ceil(total / PP));
    if (st.p > maxP) st.p = maxP;
    var start = (st.p - 1) * PP;
    return { rows: all.slice(start, start + PP), total: total, maxP: maxP };
}

/* ═══════ Statistiques ═══════ */
function topAbsents(n) {
    var c = {};
    st.rec.forEach(function(r) { c[r.etudiant] = (c[r.etudiant] || 0) + 1; });
    return Object.keys(c).map(function(n) { return { name: n, count: c[n] }; })
        .sort(function(a, b) { return b.count - a.count; }).slice(0, n || 5);
}

/* ═══════ Modales ═══════ */
function openModal(html, cls) {
    var root = document.getElementById('modal-root');
    root.innerHTML = '<div class="modal-backdrop" id="modal-bd">' +
        '<div class="modal ' + (cls || '') + '">' + html + '</div></div>';
    document.getElementById('modal-bd').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
}

function closeModal() {
    document.getElementById('modal-root').innerHTML = '';
}

/* ═══════ Modale : Ajouter/Modifier une absence ═══════ */

    var rec = editId ? st.rec.find(function(r) { return r.id === editId; }) : null;
    var fils = filieres(), sems = rec ? semestres(rec.filiere) : (st.f.fil ? semestres(st.f.fil) : []);
    var mods = rec ? modules(rec.filiere, rec.semestre) : (st.f.fil && st.f.sem ? modules(st.f.fil, st.f.sem) : []);
    var stus = rec ? etudiants(rec.filiere, rec.semestre) : (st.f.fil && st.f.sem ? etudiants(st.f.fil, st.f.sem) : []);

    var html = '<h3>' + (rec ? 'Modifier l\'absence' : 'Enregistrer une absence') + '</h3>' +
        '<div class="two-col">' +
            '<div class="field"><label>Filiere</label><select id="rf-fil">' +
                '<option value="">-- Choisir --</option>' +
                fils.map(function(f) { return '<option value="' + esc(f) + '"' + (rec && rec.filiere === f ? ' selected' : '') + '>' + esc(f) + '</option>'; }).join('') +
            '</select></div>' +
            '<div class="field"><label>Semestre</label><select id="rf-sem">' +
                '<option value="">-- Choisir --</option>' +
                sems.map(function(s) { return '<option value="' + esc(s) + '"' + (rec && rec.semestre === s ? ' selected' : '') + '>' + esc(s) + '</option>'; }).join('') +
            '</select></div>' +
        '</div>' +
        '<div class="field"><label>Module</label><select id="rf-mod">' +
            '<option value="">-- Choisir --</option>' +
            mods.map(function(m) { return '<option value="' + esc(m) + '"' + (rec && rec.module === m ? ' selected' : '') + '>' + esc(m) + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="field"><label>Etudiant</label><select id="rf-stu">' +
            '<option value="">-- Choisir --</option>' +
            stus.map(function(s) { return '<option value="' + esc(s) + '"' + (rec && rec.etudiant === s ? ' selected' : '') + '>' + esc(s) + '</option>'; }).join('') +
        '</select></div>' +
        '<div class="two-col">' +
            '<div class="field"><label>Date</label><input type="date" id="rf-date" value="' + (rec ? rec.date : '') + '"></div>' +
            '<div class="field"><label>Seance</label><input type="text" id="rf-seance" value="' + (rec ? esc(rec.seance) : '') + '" placeholder="08H30 - 12H30"></div>' +
        '</div>' +
        '<div class="field"><label>Observation</label><textarea id="rf-obs" placeholder="Optionnel">' + (rec ? esc(rec.observation || '') : '') + '</textarea></div>' +
        '<div class="modal-actions">' +
            '<button class="btn ghost" onclick="closeModal()">Annuler</button>' +
            '<button class="btn gold" onclick="saveRecForm(\'' + (editId || '') + '\')">Enregistrer</button>' +
        '</div>';

    openModal(html);

    /* Cascade filière → semestre → module/étudiant */
    setTimeout(function() {
        var filSel = document.getElementById('rf-fil');
        var semSel = document.getElementById('rf-sem');
        var modSel = document.getElementById('rf-mod');
        var stuSel = document.getElementById('rf-stu');

        if (filSel) {
            filSel.addEventListener('change', function() {
                var ss = semestres(this.value);
                semSel.innerHTML = '<option value="">-- Choisir --</option>' + ss.map(function(s) { return '<option value="' + esc(s) + '">' + esc(s) + '</option>'; }).join('');
                modSel.innerHTML = '<option value="">-- Choisir --</option>';
                stuSel.innerHTML = '<option value="">-- Choisir --</option>';
            });
        }
        if (semSel) {
            semSel.addEventListener('change', function() {
                var fil = filSel.value, sem = this.value;
                var ms = modules(fil, sem);
                var es = etudiants(fil, sem);
                modSel.innerHTML = '<option value="">-- Choisir --</option>' + ms.map(function(m) { return '<option value="' + esc(m) + '">' + esc(m) + '</option>'; }).join('');

}

function saveRecForm(editId) {
    var fil = document.getElementById('rf-fil').value;
    var sem = document.getElementById('rf-sem').value;
    var mod = document.getElementById('rf-mod').value;
    var stu = document.getElementById('rf-stu').value;
    var dat = document.getElementById('rf-date').value;
    var sea = document.getElementById('rf-seance').value.trim();
    var obs = document.getElementById('rf-obs').value.trim();

    if (!fil || !sem || !mod || !stu || !dat || !sea) {
        toast('Veuillez remplir tous les champs obligatoires.');
        return;
    }

    if (editId) {
        var rec = st.rec.find(function(r) { return r.id === editId; });
        if (rec) {
            rec.filiere = fil; rec.semestre = sem; rec.module = mod;
            rec.etudiant = stu; rec.date = dat; rec.seance = sea; rec.observation = obs || null;
        }
        toast('Absence modifiee.');
    } else {
        st.rec.push({ id: newId(), filiere: fil, semestre: sem, module: mod, etudiant: stu, date: dat, seance: sea, observation: obs || null });
        toast('Absence enregistree.');
    }

    /* Mettre à jour les registres si nouveau */
    var k = mkKey(fil, sem);
    if (!modReg[k]) modReg[k] = [];
    if (modReg[k].indexOf(mod) === -1) { modReg[k].push(mod); modReg[k].sort(); }
    if (!stuReg[k]) stuReg[k] = [];
    if (stuReg[k].indexOf(stu) === -1) { stuReg[k].push(stu); stuReg[k].sort(); }

    saveRecs(); saveMods(); saveStus();
    closeModal();
    render();
}

/* ═══════ Supprimer un enregistrement ═══════ */
function deleteRec(id) {
    var rec = st.rec.find(function(r) { return r.id === id; });
    if (!rec) return;
    openModal(
        '<h3>Confirmer la suppression</h3>' +
        '<div class="confirm-box">Voulez-vous vraiment supprimer l\'absence de <strong>' + esc(rec.etudiant) + '</strong> du ' + fmtDate(rec.date) + ' en <strong>' + esc(rec.module) + '</strong> ?</div>' +
        '<div class="modal-actions">' +
            '<button class="btn ghost" onclick="closeModal()">Annuler</button>' +
            '<button class="btn danger" onclick="confirmDeleteRec(\'' + id + '\')">Supprimer</button>' +
        '</div>'
    );
}

function confirmDeleteRec(id) {
    st.rec = st.rec.filter(function(r) { return r.id !== id; });
    saveRecs();
    closeModal();
    toast('Absence supprimee.');
    render();
}

/* ═══════ GESTION DES MODULES ═══════ */
function openModMgmt() {
    renderModMgmt();
}

function renderModMgmt(searchTerm) {
    var keys = allKeys();
    var allMods = [];
    keys.forEach(function(k) {
        var p = parseKey(k);
        (modReg[k] || []).forEach(function(m) {
            var count = st.rec.filter(function(r) { return r.filiere === p.fil && r.semestre === p.sem && r.module === m; }).length;
            allMods.push({ key: k, fil: p.fil, sem: p.sem, name: m, count: count });
        });
    });

    if (searchTerm) {
        var q = searchTerm.toLowerCase();
        allMods = allMods.filter(function(m) {
            return m.name.toLowerCase().indexOf(q) !== -1 || m.fil.toLowerCase().indexOf(q) !== -1 || m.sem.toLowerCase().indexOf(q) !== -1;
        });
    }

    var html = '<h3>Gestion des modules</h3>' +
        '<div class="mgmt-search"><input type="text" id="mod-search" placeholder="Rechercher un module..." value="' + esc(searchTerm || '') + '" style="width:100%"></div>' +
        '<div style="margin-bottom:12px"><button class="btn gold sm" onclick="openAddModForm()">+ Ajouter un module</button></div>' +
        '<div class="mgmt-list" style="max-height:400px">' +
        (allMods.length === 0 ? '<div class="empty" style="padding:30px">Aucun module trouve.</div>' :
        allMods.map(function(m) {
            return '<div class="mgmt-item">' +
                '<div class="mgmt-item-info">' +
                    '<div class="mgmt-item-name">' + esc(m.name) + '</div>' +
                    '<div class="mgmt-item-meta"><span class="tag">' + esc(m.fil) + '</span>' + esc(m.sem) + ' &middot; ' + m.count + ' absence' + (m.count > 1 ? 's' : '') + '</div>' +
                '</div>' +
                '<button class="btn danger sm" data-mod-key="' + esc(m.key) + '" data-mod-name="' + esc(m.name).replace(/"/g, '&quot;') + '" data-mod-count="' + m.count + '" onclick="deleteModPrompt(this)">Supprimer</button>' +
            '</div>';
        }).join('')) +
        '</div>' +
        '<div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Fermer</button></div>';

    openModal(html, 'wide');

    /* Recherche en temps réel */
    setTimeout(function() {
        var searchInput = document.getElementById('mod-search');
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                renderModMgmt(this.value);
                /* Restaurer le focus et le curseur */
                setTimeout(function() {
                    var si = document.getElementById('mod-search');
                    if (si) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
                }, 10);
            });
        }
    }, 50);
}

/* ═══════ SUPPRIMER UN MODULE — avec confirmation ═══════ */
function deleteModPrompt(btn) {
    var key = btn.getAttribute('data-mod-key');
    var name = btn.getAttribute('data-mod-name');
    var count = parseInt(btn.getAttribute('data-mod-count'), 10);
    var p = parseKey(key);

    var html = '<h3>Supprimer un module</h3>';

    if (count > 0) {
        html += '<div class="confirm-box">' +
            'Le module <strong>' + esc(name) + '</strong> (' + esc(p.fil) + ' / ' + esc(p.sem) + ') est lie a <strong>' + count + ' absence' + (count > 1 ? 's' : '') + '</strong>.<br><br>' +
            'Que souhaitez-vous faire ?' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">' +
            '<button class="btn danger" onclick="confirmDeleteMod(\'' + esc(key).replace(/'/g, "\\'") + '\',\'' + esc(name).replace(/'/g, "\\'") + '\',true)">Supprimer le module ET les ' + count + ' absence' + (count > 1 ? 's' : '') + '</button>' +
            '<button class="btn gold" onclick="confirmDeleteMod(\'' + esc(key).replace(/'/g, "\\'") + '\',\'' + esc(name).replace(/'/g, "\\'") + '\',false)">Supprimer le module uniquement (garder les absences)</button>' +
        '</div>';
    } else {
        html += '<div class="confirm-box">' +
            'Supprimer le module <strong>' + esc(name) + '</strong> (' + esc(p.fil) + ' / ' + esc(p.sem) + ') ?<br>Aucune absence n\'est liee a ce module.' +
        '</div>' +
        '<div style="margin-bottom:14px">' +
            '<button class="btn danger" onclick="confirmDeleteMod(\'' + esc(key).replace(/'/g, "\\'") + '\',\'' + esc(name).replace(/'/g, "\\'") + '\',true)">Confirmer la suppression</button>' +
        '</div>';
    }

    html += '<div class="modal-actions"><button class="btn ghost" onclick="openModMgmt()">Retour</button></div>';

    openModal(html);
}

function confirmDeleteMod(key, name, deleteRecords) {
    /* Retirer le module du registre */
    if (modReg[key]) {
        modReg[key] = modReg[key].filter(function(m) { return m !== name; });
        if (modReg[key].length === 0) delete modReg[key];
    }

    /* Supprimer les enregistrements liés si demandé */
    var p = parseKey(key);
    if (deleteRecords) {
        st.rec = st.rec.filter(function(r) {
            return !(r.filiere === p.fil && r.semestre === p.sem && r.module === name);
        });
        saveRecs();
    }

    /* Réinitialiser le filtre module si le module supprimé était sélectionné */
    if (st.f.mod === name) {
        st.f.mod = '';
    }

    saveMods();
    toast('Module "' + name + '" supprime.' + (deleteRecords ? ' Absences supprimees.' : ''));
    openModMgmt(); /* Retourner à la liste des modules */
    render();
}

/* ═══════ Import XLSX ═══════ */
function openImport() {
    var html = '<h3>Importer des absences (XLSX)</h3>' +
        '<div class="format-info">' +
            'Le fichier doit contenir les colonnes : <code>Filiere</code>, <code>Semestre</code>, <code>Date</code>, <code>Seance</code>, <code>Etudiant</code>, <code>Module</code>, <code>Observation</code> (optionnelle).<br>' +
            'Les dates doivent etre au format <code>AAAA-MM-JJ</code>.' +
        '</div>' +
        '<div class="drop-zone" id="drop-zone">' +
            '<div class="drop-zone-icon">&#128196;</div>' +
            '<div class="drop-zone-text">Deposez votre fichier XLSX ici</div>' +
            '<div class="drop-zone-hint">ou cliquez pour parcourir</div>' +
        '</div>' +
        '<input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">' +
        '<div id="import-preview"></div>' +
        '<div class="modal-actions">' +
            '<button class="btn ghost" onclick="closeModal()">Annuler</button>' +
            '<button class="btn gold" id="import-btn" style="display:none" onclick="doImport()">Importer</button>' +
        '</div>';

    openModal(html, 'wide');

    setTimeout(function() {
        var dz = document.getElementById('drop-zone');
        var fi = document.getElementById('file-input');
        if (!dz || !fi) return;

        dz.addEventListener('click', function() { fi.click(); });
        dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('dragover'); });
        dz.addEventListener('dragleave', function() { dz.classList.remove('dragover'); });
        dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
        fi.addEventListener('change', function() { if (fi.files.length) handleFile(fi.files[0]); });
    }, 50);
}

var _importData = [];

function handleFile(file) {
    loadXlsxLib().then(function() {
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var wb = XLSX.read(e.target.result, { type: 'array' });
                var ws = wb.Sheets[wb.SheetNames[0]];
                var rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
                if (!rows.length) { toast('Le fichier est vide.'); return; }

                /* Normaliser les clés */
                _importData = rows.map(function(r) {
                    function g(keys) {
                        for (var i = 0; i < keys.length; i++) {
                            var found = null;
                            Object.keys(r).forEach(function(k) {
                                if (k.toLowerCase().trim() === keys[i].toLowerCase()) found = r[k];
                            });
                            if (found !== null) return String(found).trim();
                        }
                        return '';
                    }
                    return {
                        filiere: g(['filiere', 'filière']),
                        semestre: g(['semestre', 'sem']),
                        date: g(['date']),
                        seance: g(['seance', 'séance', 'créneau', 'horaire']),
                        etudiant: g(['etudiant', 'étudiant', 'nom', 'nom complet', 'etud']),
                        module: g(['module', 'matiere', 'matière']),
                        observation: g(['observation', 'obs', 'remarque']) || null
                    };
                }).filter(function(r) { return r.etudiant && r.date && r.module; });

                if (!_importData.length) { toast('Aucune ligne valide trouvee.'); return; }

                /* Compter doublons */
                var existingIds = {};
                st.rec.forEach(function(r) { existingIds[r.filiere + '|' + r.semestre + '|' + r.date + '|' + r.seance + '|' + r.etudiant + '|' + r.module] = true; });
                var newCount = 0, dupCount = 0;
                _importData.forEach(function(r) {
                    var sig = r.filiere + '|' + r.semestre + '|' + r.date + '|' + r.seance + '|' + r.etudiant + '|' + r.module;
                    r._dup = !!existingIds[sig];
                    if (r._dup) dupCount++; else newCount++;
                });

                /* Prévisualisation */
                var prev = document.getElementById('import-preview');
                if (prev) {
                    prev.innerHTML =
                        '<div class="import-stats">' +
                            '<span><span class="dot" style="background:var(--good)"></span> ' + newCount + ' nouvelles</span>' +
                            '<span><span class="dot" style="background:var(--gold)"></span> ' + dupCount + ' doublons</span>' +
                        '</div>' +
                        '<table class="preview-table"><thead><tr><th>Statut</th><th>Date</th><th>Etudiant</th><th>Module</th></tr></thead><tbody>' +
                        _importData.slice(0, 20).map(function(r) {
                            return '<tr><td class="' + (r._dup ? 'dup' : 'new') + '">' + (r._dup ? 'Doublon' : 'Nouveau') + '</td><td>' + esc(r.date) + '</td><td>' + esc(r.etudiant) + '</td><td>' + esc(r.module) + '</td></tr>';
                        }).join('') +
                        (_importData.length > 20 ? '<tr><td colspan="4" style="text-align:center;color:var(--ink-soft);font-style:italic">... et ' + (_importData.length - 20) + ' autres lignes</td></tr>' : '') +
                        '</tbody></table>';

                    var btn = document.getElementById('import-btn');
                    if (btn) btn.style.display = '';
                }
            } catch(err) { toast('Erreur de lecture du fichier : ' + err.message); }
        };
        reader.readAsArrayBuffer(file);
    }).catch(function(err) { toast(err.message); });
}

function doImport() {
    var added = 0;
    _importData.forEach(function(r) {
        if (r._dup) return;
        var id = newId();
        st.rec.push({ id: id, filiere: r.filiere, semestre: r.semestre, date: r.date, seance: r.seance, etudiant: r.etudiant, module: r.module, observation: r.observation });

        /* Mettre à jour les registres */
        var k = mkKey(r.filiere, r.semestre);
        if (!modReg[k]) modReg[k] = [];
        if (modReg[k].indexOf(r.module) === -1) { modReg[k].push(r.module); modReg[k].sort(); }
        if (!stuReg[k]) stuReg[k] = [];
        if (stuReg[k].indexOf(r.etudiant) === -1) { stuReg[k].push(r.etudiant); stuReg[k].sort(); }
        added++;
    });

    saveRecs(); saveMods(); saveStus();
    closeModal();
    toast(added + ' absence' + (added > 1 ? 's' : '') + ' importee' + (added > 1 ? 's' : '') + '.');
    render();
}

/* ═══════ Export XLSX ═══════ */
function doExport() {
    var data = filtered();
    if (!data.length) { toast('Aucune donnee a exporter.'); return; }

    loadXlsxLib().then(function() {
        var rows = data.map(function(r) {
            return { 'Filiere': r.filiere, 'Semestre': r.semestre, 'Date': r.date, 'Seance': r.seance, 'Etudiant': r.etudiant, 'Module': r.module, 'Observation': r.observation || '' };
        });
        var ws = XLSX.utils.json_to_sheet(rows);
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Absences');
        XLSX.writeFile(wb, 'absences_' + new Date().toISOString().slice(0, 10) + '.xlsx');
        toast('Fichier exporte.');
    }).catch(function(err) { toast(err.message); });
}

/* ═══════ Réinitialisation ═══════ */
function resetAll() {
    openModal(
        '<h3>Reinitialiser les donnees</h3>' +
        '<div class="confirm-box">Cette action supprimera <strong>toutes les donnees</strong> (absences, modules, etudiants) et les remplacera par les donnees d\'exemple.<br><br>Cette operation est <strong>irreversible</strong>.</div>' +
        '<div class="modal-actions">' +
            '<button class="btn ghost" onclick="closeModal()">Annuler</button>' +
            '<button class="btn danger" onclick="confirmReset()">Reinitialiser</button>' +
        '</div>'
    );
}

function confirmReset() {
    localStorage.removeItem(LS_REC);
    localStorage.removeItem(LS_MOD);
    localStorage.removeItem(LS_STU);
    modReg = {}; stuReg = {}; st.rec = []; st.f = { fil: '', sem: '', mod: '', df: '', dt: '', q: '' }; st.p = 1;
    loadRecs(); loadMods(); loadStus();
    closeModal();
    toast('Donnees reinitialisees.');
    render();
}

/* ═══════ Rendu principal ═══════ */
function render() {
    var app = document.getElementById('app');
    var fils = filieres();
    var sems = st.f.fil ? semestres(st.f.fil) : [];
    var mods = (st.f.fil && st.f.sem) ? modules(st.f.fil, st.f.sem) : [];
    var pg = paged();
    var top = topAbsents(5);
    var totalRec = st.rec.length;

    var h = '';
    /* ── Header ── */
    h += '<header>' +
        '<div><h1>Registre des absences</h1><div class="sub">Institut — Gestion scolaire</div></div>' +
        '<div class="header-stats">' +
            '<div class="header-stat"><b>' + totalRec + '</b><span>Total</span></div>' +
            '<div class="header-stat"><b>' + pg.total + '</b><span>Filtre</span></div>' +
        '</div>' +
    '</header>';

    /* ── Filtres ── */
    h += '<div class="filters">' +
        '<label>Filiere<select onchange="setFilter(\'fil\',this.value)"><option value="">Toutes</option>' +
            fils.map(function(f) { return '<option value="' + esc(f) + '"' + (st.f.fil === f ? ' selected' : '') + '>' + esc(f) + '</option>'; }).join('') +
        '</select></label>' +
        '<label>Semestre<select onchange="setFilter(\'sem\',this.value)"><option value="">Tous</option>' +
            sems.map(function(s) { return '<option value="' + esc(s) + '"' + (st.f.sem === s ? ' selected' : '') + '>' + esc(s) + '</option>'; }).join('') +
        '</select></label>' +
        '<label>Module<select onchange="setFilter(\'mod\',this.value)"><option value="">Tous</option>' +
            mods.map(function(m) { return '<option value="' + esc(m) + '"' + (st.f.mod === m ? ' selected' : '') + '>' + esc(m) + '</option>'; }).join('') +
        '</select></label>' +
        '<label>Du<input type="date" value="' + esc(st.f.df) + '" onchange="setFilter(\'df\',this.value)"></label>' +
        '<label>Au<input type="date" value="' + esc(st.f.dt) + '" onchange="setFilter(\'dt\',this.value)"></label>' +
        '<label>Recherche<input type="text" value="' + esc(st.f.q) + '" placeholder="Nom, module..." oninput="setFilter(\'q\',this.value)"></label>' +
        '<div class="spacer"></div>' +
        '<button class="btn gold" onclick="openRecForm()">+ Absence</button>' +
    '</div>';

    /* ── Corps ── */
    h += '<div class="body-grid"><main>';

    /* Compteur résultats */
    h += '<div class="results-count">' + pg.total + ' resultat' + (pg.total > 1 ? 's' : '') + '</div>';

    /* Tableau */
    if (pg.rows.length) {
        h += '<div class="roster"><table><thead><tr>' +
            '<th>Date</th><th>Seance</th><th>Etudiant</th><th>Fil.</th><th>Module</th><th>Obs.</th><th></th>' +
            '</tr></thead><tbody>';

        pg.rows.forEach(function(r) {
            h += '<tr>' +
                '<td class="cell-date">' + fmtDate(r.date) + '</td>' +
                '<td class="cell-seance">' + esc(r.seance) + '</td>' +
                '<td class="cell-name">' + esc(r.etudiant) + '</td>' +
                '<td><span class="tag">' + esc(r.filiere) + '</span></td>' +
                '<td class="cell-module">' + esc(r.module) + '</td>' +
                '<td class="cell-obs">' + esc(r.observation) + '</td>' +
                '<td class="row-actions">' +
                    '<button class="icon-btn" title="Modifier" onclick="openRecForm(\'' + r.id + '\')">&#9998;</button>' +
                    '<button class="icon-btn" title="Supprimer" onclick="deleteRec(\'' + r.id + '\')">&#10005;</button>' +
                '</td>' +
            '</tr>';
        });

        h += '</tbody></table></div>';

        /* Pagination */
        if (pg.maxP > 1) {
            h += '<div class="pagination">' +
                '<button' + (st.p <= 1 ? ' disabled' : '') + ' onclick="goPage(' + (st.p - 1) + ')">&#9664;</button>' +
                '<span>Page ' + st.p + ' / ' + pg.maxP + '</span>' +
                '<button' + (st.p >= pg.maxP ? ' disabled' : '') + ' onclick="goPage(' + (st.p + 1) + ')">&#9654;</button>' +
            '</div>';
        }
    } else {
        h += '<div class="empty">Aucune absence enregistree.</div>';
    }

    h += '</main>';

    /* ── Sidebar ── */
    h += '<aside>';
    h += '<div><p class="stats-title">Etudiants les plus absents</p>';
    if (top.length) {
        top.forEach(function(t) {
            h += '<div class="top-item"><span>' + esc(t.name) + '</span><b>' + t.count + '</b></div>';
        });
    } else {
        h += '<div style="font-size:12px;color:var(--ink-soft);font-style:italic">Aucune donnee.</div>';
    }
    h += '</div>';

    h += '<div><p class="stats-title">Actions</p>' +
        '<div style="display:flex;flex-direction:column;gap:6px">' +
            '<button class="btn ghost sm" onclick="openModMgmt()">Gestion des modules</button>' +
            '<button class="btn ghost sm" onclick="openStuMgmt()">Gestion des etudiants</button>' +
            '<button class="btn ghost sm" onclick="openImport()">Importer (XLSX)</button>' +
            '<button class="btn ghost sm" onclick="doExport()">Exporter (XLSX)</button>' +
            '<button class="btn ghost sm" style="color:var(--absent);border-color:var(--absent)" onclick="resetAll()">Reinitialiser</button>' +
        '</div>' +
    '</div>';

    h += '</aside></div>';

    app.innerHTML = h;
}

/* ═══════ Interactions filtres/pagination ═══════ */
function setFilter(key, val) {
    st.f[key] = val;
    /* Réinitialiser les filtres en cascade */
    if (key === 'fil') { st.f.sem = ''; st.f.mod = ''; }
    if (key === 'sem') { st.f.mod = ''; }
    st.p = 1;
    render();
}

function goPage(p) {
    st.p = p;
    render();
    window.scrollTo(0, 0);
}

/* ═══════ Initialisation ═══════ */
function init() {
    loadMods();
    loadStus();
    loadRecs();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';
    render();
}

/* Lancer au chargement */
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
</body>
</html>
