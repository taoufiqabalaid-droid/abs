<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre des absences — Institut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Libre+Franklin:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F3EEE1;--paper-line:#D9CFB8;--paper-dark:#E7DFC9;--ink:#1B2A3C;--ink-soft:#4A5568;--binder:#22314A;--binder-light:#324667;--absent:#A6303A;--absent-bg:#F5E3E1;--gold:#B8934A;--good:#3E6B4F;--radius:4px}
*{box-sizing:border-box;margin:0;padding:0}html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Libre Franklin',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
header{background:var(--binder);color:var(--paper);padding:22px 32px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;border-bottom:4px solid var(--gold)}
header h1{font-family:'Fraunces',serif;font-size:26px;margin:0 0 2px}
header .sub{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#C7D1E2}
.header-stats{display:flex;gap:22px}
.header-stat{text-align:right}
.header-stat b{display:block;font-family:'Fraunces',serif;font-size:22px;color:var(--gold)}
.header-stat span{font-size:11px;color:#B9C4D8;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.filters{background:var(--paper-dark);border-bottom:1px solid var(--paper-line);padding:14px 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,input[type="text"],input[type="date"]{font-family:'IBM Plex Mono',monospace;font-size:12.5px;border:1px solid var(--paper-line);background:#fff;padding:8px 10px;border-radius:var(--radius);color:var(--ink)}
input[type="text"]{font-family:'Libre Franklin',sans-serif;min-width:200px}
select:focus,input:focus,button:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}
.filters label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);display:flex;flex-direction:column;gap:4px;font-family:'IBM Plex Mono',monospace}
button{font-family:'Libre Franklin',sans-serif;cursor:pointer}
.btn{background:var(--ink);color:var(--paper);border:none;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;transition:background .15s}
.btn:hover{background:var(--binder-light)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn.ghost:hover{background:rgba(0,0,0,.05)}
.btn.danger{background:var(--absent);color:#fff}
.btn.danger:hover{background:#8a252e}
.btn.gold{background:var(--gold);color:#fff}
.btn.gold:hover{background:#9a7a3c}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.spacer{flex:1}
.body-grid{display:grid;grid-template-columns:1fr 260px;gap:0;flex:1}
@media(max-width:900px){.body-grid{grid-template-columns:1fr}aside{border-left:none;border-top:1px solid var(--paper-line)}}
main{padding:22px 32px 40px}
aside{border-left:1px solid var(--paper-line);padding:22px 20px;display:flex;flex-direction:column;gap:20px}
.stats-title{font-family:'Fraunces',serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 8px}
.top-item{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px dotted var(--paper-line)}
.top-item:last-child{border-bottom:none}
.top-item b{font-family:'IBM Plex Mono',monospace;color:var(--absent)}
.roster{background:rgba(255,255,255,.55);border:1px solid var(--paper-line);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);padding:10px 12px;border-bottom:1px solid var(--paper-line);background:var(--paper-dark);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--paper-line);vertical-align:top;font-size:13px}
tbody tr:hover{background:rgba(166,48,58,.04)}
tbody tr:last-child td{border-bottom:none}
.cell-date{font-family:'IBM Plex Mono',monospace;white-space:nowrap;font-size:12px}
.cell-seance{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);white-space:nowrap}
.cell-name{font-weight:600}
.tag{display:inline-block;font-size:10.5px;font-family:'IBM Plex Mono',monospace;background:var(--binder);color:var(--paper);padding:2px 6px;border-radius:3px;margin-right:4px}
.cell-module{font-size:12.5px;color:var(--ink-soft);max-width:220px}
.cell-obs{font-size:12px;color:var(--ink-soft);font-style:italic;max-width:160px}
.row-actions{white-space:nowrap}
.icon-btn{background:none;border:none;color:var(--ink-soft);font-size:14px;opacity:.55;margin-right:6px;cursor:pointer;padding:2px 4px}
.icon-btn:hover{opacity:1;color:var(--absent)}
.empty{padding:50px 20px;text-align:center;color:var(--ink-soft);font-family:'Fraunces',serif;font-size:16px}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink-soft)}
.pagination button{background:#fff;border:1px solid var(--paper-line);border-radius:var(--radius);padding:6px 10px;font-size:12px}
.pagination button:disabled{opacity:.4;cursor:default}
.results-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);padding:0 2px 10px}
.modal-backdrop{position:fixed;inset:0;background:rgba(27,42,60,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);border-radius:8px;padding:24px;width:520px;max-width:100%;box-shadow:0 14px 36px rgba(0,0,0,.25);border:1px solid var(--paper-line);max-height:90vh;overflow:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal.wide{width:680px}
.modal h3{margin:0 0 16px;font-family:'Fraunces',serif;font-size:18px}
.field{margin-bottom:12px;display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace}
.field input,.field select,.field textarea{width:100%;font-family:'Libre Franklin',sans-serif;font-size:13.5px;border:1px solid var(--paper-line);border-radius:var(--radius);padding:8px 10px;background:#fff}
.field textarea{resize:vertical;min-height:50px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.loading{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;color:var(--ink-soft);font-size:15px;z-index:100}
.mgmt-list{max-height:340px;overflow-y:auto;border:1px solid var(--paper-line);border-radius:var(--radius);background:#fff}
.mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--paper-line);font-size:13px;gap:8px}
.mgmt-item:last-child{border-bottom:none}
.mgmt-item:hover{background:var(--paper-dark)}
.mgmt-item-info{flex:1;min-width:0}
.mgmt-item-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mgmt-item-meta{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace}
.mgmt-item .btn{padding:4px 10px;font-size:11px;flex-shrink:0}
.mgmt-search{margin-bottom:12px}
.drop-zone{border:2px dashed var(--paper-line);border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(184,147,74,.06)}
.drop-zone-icon{font-size:32px;margin-bottom:8px;opacity:.5}
.drop-zone-text{font-size:13px;color:var(--ink-soft);margin-bottom:4px}
.drop-zone-hint{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;opacity:.7}
.preview-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
.preview-table th{background:var(--paper-dark);font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;text-align:left;border-bottom:1px solid var(--paper-line)}
.preview-table td{padding:5px 8px;border-bottom:1px solid var(--paper-line)}
.preview-table .dup{color:var(--gold);font-style:italic}
.preview-table .new{color:var(--good);font-weight:600}
.import-stats{display:flex;gap:16px;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;font-size:12px}
.import-stats span{display:flex;align-items:center;gap:4px}
.import-stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.confirm-box{background:var(--absent-bg);border:1px solid var(--absent);border-radius:var(--radius);padding:14px;margin-bottom:14px;font-size:13px;line-height:1.5}
.confirm-box strong{color:var(--absent)}
.confirm-box .confirm-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.confirm-box .confirm-actions label{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;color:var(--ink-soft)}
.confirm-box .confirm-actions label input[type="checkbox"]{accent-color:var(--absent);width:14px;height:14px}
.format-info{background:rgba(255,255,255,.6);border:1px solid var(--paper-line);border-radius:var(--radius);padding:12px;margin-bottom:14px;font-size:12px;line-height:1.6;color:var(--ink-soft)}
.format-info code{background:var(--paper-dark);padding:1px 5px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px}
.mgmt-header-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.mgmt-header-row .spacer{flex:1}
.mgmt-tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:2px solid var(--paper-line)}
.mgmt-tab{padding:8px 14px;font-size:12px;font-family:'IBM Plex Mono',monospace;background:none;border:none;cursor:pointer;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s}
.mgmt-tab:hover{color:var(--ink)}
.mgmt-tab.active{color:var(--ink);border-bottom-color:var(--gold);font-weight:600}
.mgmt-section-title{font-family:'Fraunces',serif;font-size:13px;color:var(--ink-soft);margin:12px 0 6px;padding-bottom:4px;border-bottom:1px dotted var(--paper-line)}
.mgmt-section-title:first-child{margin-top:0}
</style>
</head>

function ls(k,v){try{if(v!==undefined)localStorage.setItem(k,JSON.stringify(v));else{var r=localStorage.getItem(k);return r?JSON.parse(r):null}}catch(e){return v!==undefined?undefined:null}}

function regKeys(){var s={};Object.keys(stuReg).forEach(function(k){s[k]=1});Object.keys(modReg).forEach(function(k){s[k]=1});return Object.keys(s)}
function parseKey(k){var p=k.split('_');return{fil:p[0]||'',sem:p[1]||''}}
function mkKey(fil,sem){return fil+'_'+sem}

function loadMods(){modReg=ls(LS_MOD);if(!modReg){modReg={};SEED.forEach(function(r){var k=mkKey(r.filiere,r.semestre);if(!modReg[k])modReg[k]=[];if(modReg[k].indexOf(r.module)<0)modReg[k].push(r.module)});ls(LS_MOD,modReg)}}

function loadRecs(){st.rec=ls(LS_REC);if(!st.rec){st.rec=SEED.slice();ls(LS_REC,st.rec)}}
function saveRecs(){ls(LS_REC,st.rec)}
function saveMods(){ls(LS_MOD,modReg)}
function saveStus(){ls(LS_STU,stuReg)}

function getStus(fil,sem){var k=mkKey(fil,sem);return stuReg[k]||[]}

function getAllSems(fil){var s={};regKeys().forEach(function(k){var p=parseKey(k);if(!fil||p.fil===fil)s[p.sem]=1});return Object.keys(s).sort()}

  if(f.dt)d=d.filter(function(r){return r.date<=f.dt});
  if(f.q){var q=f.q.toLowerCase();d=d.filter(function(r){return(r.etudiant+' '+r.module+' '+(r.observation||'')).toLowerCase().indexOf(q)>=0})}
  d.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:a.seance<b.seance?-1:1});
  return d;
}

/* ═══════ Toast ═══════ */
var _tt;
function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show')},2800)}

/* ═══════ Modal helpers ═══════ */
function openModal(html,wide){

  bd.innerHTML='<div class="modal'+(wide?' wide':'')+'">'+html+'</div>';

  document.body.appendChild(bd);
}
function closeModals(){var m=document.getElementById('active-modal');if(m)m.remove()}

/* ═══════ Format date ═══════ */
function fmtDate(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}

/* ═══════ Rendu principal ═══════ */
function render(){
  var app=document.getElementById('app');
  var fils=getAllFils(),sems=getAllSems(st.f.fil),mods=getMods(st.f.fil,st.f.sem);
  var data=filtered(),total=data.length,tp=Math.max(1,Math.ceil(total/PP));

  var page=data.slice((st.p-1)*PP,st.p*PP);

  /* Stats header */
  var totalAbs=st.rec.length;
  var etuSet={};st.rec.forEach(function(r){etuSet[r.etudiant]=1});
  var nbEtu=Object.keys(etuSet).length;
  var modSet={};st.rec.forEach(function(r){modSet[r.module]=1});
  var nbMod=Object.keys(modSet).length;

  var h='<header>';
  h+='<div><h1>Registre des absences</h1><div class="sub">Institut — Gestion acad\u00e9mique</div></div>';

  h+='<div class="header-stat"><b>'+totalAbs+'</b><span>Absences</span></div>';
  h+='<div class="header-stat"><b>'+nbEtu+'</b><span>\u00c9tudiants</span></div>';

  h+='<div class="filters">';
  h+='<label>Fili\u00e8re<select onchange="st.f.fil=this.value;st.f.sem=\'\';st.f.mod=\'\';st.p=1;render()"><option value="">— Toutes —</option>';
  fils.forEach(function(f){h+='<option value="'+f+'"'+(st.f.fil===f?' selected':'')+'>'+f+'</option>'});
  h+='</select></label>';
  h+='<label>Semestre<select onchange="st.f.sem=this.value;st.f.mod=\'\';st.p=1;render()"><option value="">— Tous —</option>';
  sems.forEach(function(s){h+='<option value="'+s+'"'+(st.f.sem===s?' selected':'')+'>'+s+'</option>'});
  h+='</select></label>';
  h+='<label>Module<select onchange="st.f.mod=this.value;st.p=1;render()"><option value="">— Tous —</option>';
  mods.forEach(function(m){h+='<option value="'+m+'"'+(st.f.mod===m?' selected':'')+'>'+m+'</option>'});
  h+='</select></label>';
  h+='<label>Du<input type="date" value="'+st.f.df+'" onchange="st.f.df=this.value;st.p=1;render()"></label>';
  h+='<label>Au<input type="date" value="'+st.f.dt+'" onchange="st.f.dt=this.value;st.p=1;render()"></label>';
  h+='<label>Rechercher<input type="text" placeholder="\u00c9tudiant, module..." value="'+esc(st.f.q)+'" oninput="st.f.q=this.value;st.p=1;render()"></label>';
  h+='<div class="spacer"></div>';
  h+='<button class="btn gold" onclick="openAddModal()">+ Absence</button>';
  h+='<button class="btn ghost" onclick="openModModal()">Modules</button>';
  h+='<button class="btn ghost" onclick="openStuModal()">\u00c9tudiants</button>';
  h+='<button class="btn ghost" onclick="openImportModal()">Import</button>';
  h+='</div>';

  /* Corps */
  h+='<div class="body-grid"><main>';

  /* Compteur résultats */
  h+='<div class="results-count">'+total+' r\u00e9sultat'+(total>1?'s':'')+'</div>';

  /* Tableau */
  if(page.length===0){
    h+='<div class="empty">Aucune absence enregistr\u00e9e</div>';
  } else {
    h+='<div class="roster"><table><thead><tr>';
    h+='<th>Date</th><th>S\u00e9ance</th><th>Fili\u00e8re</th><th>Module</th><th>\u00c9tudiant</th><th>Obs.</th><th></th>';
    h+='</tr></thead><tbody>';
    page.forEach(function(r){
      h+='<tr>';
      h+='<td class="cell-date">'+fmtDate(r.date)+'</td>';
      h+='<td class="cell-seance">'+esc(r.seance)+'</td>';
      h+='<td><span class="tag">'+esc(r.filiere)+'</span>'+esc(r.semestre)+'</td>';
      h+='<td class="cell-module">'+esc(r.module)+'</td>';
      h+='<td class="cell-name">'+esc(r.etudiant)+'</td>';
      h+='<td class="cell-obs">'+esc(r.observation||'')+'</td>';
      h+='<td class="row-actions">';
      h+='<button class="icon-btn" title="Modifier" onclick="openEditModal(\''+r.id+'\')">&#9998;</button>';
      h+='<button class="icon-btn" title="Supprimer" onclick="delRec(\''+r.id+'\')">&#10005;</button>';
      h+='</td></tr>';
    });
    h+='</tbody></table></div>';

    /* Pagination */
    if(tp>1){
      h+='<div class="pagination">';
      h+='<button '+(st.p<=1?'disabled':'')+' onclick="st.p--;render()">&laquo; Pr\u00e9c.</button>';

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderSidebar(){
  var s='';
  var data=filtered();
  /* Top étudiants absents */
  var counts={};
  data.forEach(function(r){counts[r.etudiant]=(counts[r.etudiant]||0)+1});
  var sorted=Object.keys(counts).map(function(k){return{name:k,c:counts[k]}}).sort(function(a,b){return b.c-a.c}).slice(0,8);
  s+='<div><p class="stats-title">\u00c9tudiants les plus absents</p>';
  if(sorted.length===0){s+='<div style="font-size:12px;color:var(--ink-soft);font-style:italic">Aucune donn\u00e9e</div>'}
  sorted.forEach(function(item){s+='<div class="top-item"><span>'+esc(item.name)+'</span><b>'+item.c+'</b></div>'});
  s+='</div>';

  /* Top modules */
  var mcounts={};
  data.forEach(function(r){mcounts[r.module]=(mcounts[r.module]||0)+1});
  var msorted=Object.keys(mcounts).map(function(k){return{name:k,c:mcounts[k]}}).sort(function(a,b){return b.c-a.c}).slice(0,6);
  s+='<div><p class="stats-title">Modules concern\u00e9s</p>';
  if(msorted.length===0){s+='<div style="font-size:12px;color:var(--ink-soft);font-style:italic">Aucune donn\u00e9e</div>'}
  msorted.forEach(function(item){s+='<div class="top-item"><span style="font-size:12px">'+esc(item.name)+'</span><b>'+item.c+'</b></div>'});
  s+='</div>';

  /* Par filière */
  var fcounts={};
  data.forEach(function(r){var k=r.filiere+' '+r.semestre;fcounts[k]=(fcounts[k]||0)+1});
  s+='<div><p class="stats-title">Par fili\u00e8re / semestre</p>';
  var fkeys=Object.keys(fcounts).sort();
  if(fkeys.length===0){s+='<div style="font-size:12px;color:var(--ink-soft);font-style:italic">Aucune donn\u00e9e</div>'}
  fkeys.forEach(function(k){s+='<div class="top-item"><span>'+esc(k)+'</span><b>'+fcounts[k]+'</b></div>'});
  s+='</div>';

  return s;
}

/* ═══════ Ajouter/Modifier une absence ═══════ */
function openAddModal(){
  var fils=getAllFils(),sems=st.f.fil?getAllSems(st.f.fil):[],mods=st.f.fil&&st.f.sem?getMods(st.f.fil,st.f.sem):[],stus=st.f.fil&&st.f.sem?getStus(st.f.fil,st.f.sem):[];
  var today=new Date().toISOString().split('T')[0];
  var h='<h3>Nouvelle absence</h3>';
  h+=recForm(fils,sems,mods,stus,{filiere:st.f.fil,semestre:st.f.sem,date:today,seance:'',etudiant:'',module:'',observation:''},'addRec(this)');

}

function openEditModal(id){
  var r=st.rec.find(function(x){return x.id===id});if(!r)return;
  var fils=getAllFils(),sems=getAllSems(r.filiere),mods=getMods(r.filiere,r.semestre),stus=getStus(r.filiere,r.semestre);

  openModal(h);
}

function recForm(fils,sems,mods,stus,val,onchange){

  h+='<div class="field"><label>Semestre</label><select name="semestre" onchange="recSemChange(this)">';

  h+='</select></div>';
  h+='</div>';
  h+='<div class="field"><label>Module</label><select name="module">';

/* Mise à jour dynamique des selects filière/semestre dans le formulaire */
function recFilChange(sel){
  var modal=sel.closest('.modal');
  var fil=sel.value;
  var sems=fil?getAllSems(fil):[];
  var semSel=modal.querySelector('[name="semestre"]');
  var oldSem=semSel.value;
  semSel.innerHTML='<option value="">— Choisir —</option>';
  sems.forEach(function(s){semSel.innerHTML+='<option value="'+s+'"'+(s===oldSem?' selected':'')+'>'+s+'</option>'});
  recSemChange(semSel);
}
function recSemChange(sel){
  var modal=sel.closest('.modal');
  var fil=modal.querySelector('[name="filiere"]').value;
  var sem=sel.value;
  var mods=fil&&sem?getMods(fil,sem):[];
  var stus=fil&&sem?getStus(fil,sem):[];
  var modSel=modal.querySelector('[name="module"]');
  var stuSel=modal.querySelector('[name="etudiant"]');
  var oldMod=modSel.value,oldStu=stuSel.value;
  modSel.innerHTML='<option value="">— Choisir —</option>';
  mods.forEach(function(m){modSel.innerHTML+='<option value="'+m+'"'+(m===oldMod?' selected':'')+'>'+m+'</option>'});
  stuSel.innerHTML='<option value="">— Choisir —</option>';
  stus.forEach(function(s){stuSel.innerHTML+='<option value="'+s+'"'+(s===oldStu?' selected':'')+'>'+s+'</option>'});
}

function getFormVal(modal){
  return{
    filiere:modal.querySelector('[name="filiere"]').value,
    semestre:modal.querySelector('[name="semestre"]').value,
    module:modal.querySelector('[name="module"]').value,
    etudiant:modal.querySelector('[name="etudiant"]').value,
    date:modal.querySelector('[name="date"]').value,
    seance:modal.querySelector('[name="seance"]').value.trim(),
    observation:modal.querySelector('[name="observation"]').value.trim()||null
  }
}

function addRec(modal){
  var v=getFormVal(modal);
  if(!v.filiere||!v.semestre||!v.module||!v.etudiant||!v.date||!v.seance){toast('Veuillez remplir tous les champs obligatoires.');return}
  v.id=genId();
  st.rec.push(v);saveRecs();
  /* Mettre à jour registres si nouveau */
  var k=mkKey(v.filiere,v.semestre);
  if(modReg[k]&&modReg[k].indexOf(v.module)<0){modReg[k].push(v.module);saveMods()}
  if(stuReg[k]&&stuReg[k].indexOf(v.etudiant)<0){stuReg[k].push(v.etudiant);saveStus()}
  closeModals();render();toast('Absence enregistr\u00e9e.');
}

function editRec(modal,id){
  var v=getFormVal(modal);
  if(!v.filiere||!v.semestre||!v.module||!v.etudiant||!v.date||!v.seance){toast('Veuillez remplir tous les champs obligatoires.');return}
  var idx=st.rec.findIndex(function(r){return r.id===id});if(idx<0)return;
  v.id=id;st.rec[idx]=v;saveRecs();
  var k=mkKey(v.filiere,v.semestre);
  if(modReg[k]&&modReg[k].indexOf(v.module)<0){modReg[k].push(v.module);saveMods()}
  if(stuReg[k]&&stuReg[k].indexOf(v.etudiant)<0){stuReg[k].push(v.etudiant);saveStus()}
  closeModals();render();toast('Absence mise \u00e0 jour.');
}

function delRec(id){
  var r=st.rec.find(function(x){return x.id===id});if(!r)return;
  /* Confirmation inline via modal */
  var h='<h3>Supprimer cette absence ?</h3>';
  h+='<div class="confirm-box"><strong>'+esc(r.etudiant)+'</strong> — '+esc(r.module)+'<br>'+fmtDate(r.date)+' '+esc(r.seance);
  h+='<div class="confirm-actions" style="margin-top:12px">';
  h+='<button class="btn danger" onclick="doDelRec(\''+id+'\')">Supprimer</button>';
  h+='<button class="btn ghost" onclick="closeModals()">Annuler</button>';
  h+='</div></div>';
  openModal(h);
}
function doDelRec(id){st.rec=st.rec.filter(function(r){return r.id!==id});saveRecs();closeModals();render();toast('Absence supprim\u00e9e.')}

/* ═══════ Gestion des modules ═══════ */
var _modSearch='';
function openModModal(){
  _modSearch='';
  renderModModalInner();
}

function renderModModalInner(){
  var keys=regKeys().sort();
  var totalMods=0;
  keys.forEach(function(k){totalMods+=(modReg[k]||[]).length});

  var h='<h3>Gestion des modules</h3>';

  /* ── BOUTON SUPPRIMER TOUT ── */
  h+='<div class="mgmt-header-row">';
  h+='<button class="btn danger" '+(totalMods===0?'disabled':'')+' onclick="confirmDeleteAllMods()">Supprimer tous les modules</button>';
  h+='<span style="font-size:11px;color:var(--ink-soft);font-family:\'IBM Plex Mono\',monospace;">'+totalMods+' module'+(totalMods>1?'s':'')+' au total</span>';
  h+='</div>';

  /* Zone de confirmation (cachée par défaut) */
  h+='<div id="mod-confirm-box" style="display:none"></div>';

  /* Ajout de module */
  h+='<div class="mgmt-header-row" style="margin-top:4px">';
  h+='<select id="mod-add-fil" onchange="modAddFilChange()" style="width:100px"><option value="">Fili\u00e8re</option>';
  getAllFils().forEach(function(f){h+='<option value="'+f+'">'+f+'</option>'});
  h+='</select>';
  h+='<select id="mod-add-sem" style="width:80px"><option value="">Sem.</option></select>';
  h+='<input type="text" id="mod-add-name" placeholder="Nom du module" style="flex:1;min-width:140px" onkeydown="if(event.key===\'Enter\')addMod()">';
  h+='<button class="btn" onclick="addMod()">Ajouter</button>';
  h+='</div>';

  /* Recherche */
  h+='<div class="mgmt-search"><input type="text" placeholder="Rechercher un module..." value="'+esc(_modSearch)+'" oninput="_modSearch=this.value;renderModModalList()" style="width:100%"></div>';

  /* Liste */
  h+='<div id="mod-list-container">';
  h+=buildModList(keys);
  h+='</div>';

  h+='<div class="modal-actions"><button class="btn ghost" onclick="closeModals()">Fermer</button></div>';
  openModal(h);
}

function modAddFilChange(){
  var fil=document.getElementById('mod-add-fil').value;
  var sel=document.getElementById('mod-add-sem');
  sel.innerHTML='<option value="">Sem.</option>';
  if(fil){getAllSems(fil).forEach(function(s){sel.innerHTML+='<option value="'+s+'">'+s+'</option>'})}
}

function addMod(){
  var fil=document.getElementById('mod-add-fil').value;
  var sem=document.getElementById('mod-add-sem').value;
  var name=document.getElementById('mod-add-name').value.trim();
  if(!fil||!sem||!name){toast('Veuillez remplir la fili\u00e8re, le semestre et le nom du module.');return}
  var k=mkKey(fil,sem);
  if(!modReg[k])modReg[k]=[];
  if(modReg[k].indexOf(name)>=0){toast('Ce module existe d\u00e9j\u00e0 pour cette fili\u00e8re/semestre.');return}
  modReg[k].push(name);modReg[k].sort();saveMods();
  /* Mettre à jour aussi stuReg si la clé n'existe pas */
  if(!stuReg[k]){stuReg[k]=[];saveStus()}
  renderModModalInner();render();toast('Module ajout\u00e9.');
}

function delMod(fil,sem,name){
  var k=mkKey(fil,sem);
  if(modReg[k]){modReg[k]=modReg[k].filter(function(m){return m!==name});if(modReg[k].length===0)delete modReg[k];saveMods()}
  renderModModalInner();render();toast('Module supprim\u00e9.');
}

function buildModList(keys){
  var q=_modSearch.toLowerCase();
  var h='';
  var hasAny=false;
  keys.forEach(function(k){
    var p=parseKey(k);
    var mods=(modReg[k]||[]).slice().sort();
    if(q){mods=mods.filter(function(m){return m.toLowerCase().indexOf(q)>=0})}
    if(mods.length===0)return;
    hasAny=true;
    h+='<div class="mgmt-section-title">'+esc(p.fil)+' — '+esc(p.sem)+' <span style="font-weight:400;color:var(--ink-soft)">('+mods.length+')</span></div>';
    h+='<div class="mgmt-list" style="max-height:200px;margin-bottom:8px">';
    mods.forEach(function(m){
      /* Compter les absences pour ce module */
      var cnt=st.rec.filter(function(r){return r.filiere===p.fil&&r.semestre===p.sem&&r.module===m}).length;
      h+='<div class="mgmt-item">';
      h+='<div class="mgmt-item-info"><div class="mgmt-item-name">'+esc(m)+'</div><div class="mgmt-item-meta">'+cnt+' absence'+(cnt>1?'s':'')+'</div></div>';
      h+='<button class="btn danger" style="padding:3px 8px;font-size:10px" onclick="delMod(\''+esc(p.fil)+'\',\''+esc(p.sem)+'\',\''+esc(m).replace(/'/g,"\\'")+'\')">&#10005;</button>';
      h+='</div>';
    });
    h+='</div>';
  });
  if(!hasAny){h='<div class="empty" style="padding:30px 10px;font-size:13px">Aucun module trouv\u00e9.</div>'}
  return h;
}

function renderModModalList(){
  var c=document.getElementById('mod-list-container');
  if(c)c.innerHTML=buildModList(regKeys().sort());
}

/* ═══════ SUPPRIMER TOUS LES MODULES ═══════ */
function confirmDeleteAllMods(){
  var totalMods=0;
  Object.values(modReg).forEach(function(arr){totalMods+=arr.length});
  if(totalMods===0){toast('Aucun module \u00e0 supprimer.');return}

  /* Compter les absences liées */
  var allModNames=[];
  Object.values(modReg).forEach(function(arr){arr.forEach(function(m){if(allModNames.indexOf(m)<0)allModNames.push(m)})});
  var relatedAbs=st.rec.filter(function(r){return allModNames.indexOf(r.module)>=0}).length;

  var box=document.getElementById('mod-confirm-box');
  box.style.display='block';
  box.innerHTML='<div class="confirm-box">';
  box.innerHTML+='<strong>Attention — Action irr\u00e9versible !</strong><br>';
  box.innerHTML+='Vous allez supprimer <strong>'+totalMods+' module(s)</strong> de toutes les fili\u00e8res et semestres.';
  if(relatedAbs>0){box.innerHTML+='<br>Ces modules sont li\u00e9s \u00e0 <strong>'+relatedAbs+' enregistrement(s)</strong> d\'absence.'}
  box.innerHTML+='<div class="confirm-actions">';
  box.innerHTML+='<label><input type="checkbox" id="del-mods-check-abs"> Supprimer aussi les '+relatedAbs+' absence(s) associ\u00e9e(s)</label>';
  box.innerHTML+='<div style="flex:1"></div>';
  box.innerHTML+='<button class="btn danger" onclick="doDeleteAllMods()">Confirmer la suppression</button>';
  box.innerHTML+='<button class="btn ghost" onclick="cancelDeleteAllMods()">Annuler</button>';
  box.innerHTML+='</div></div>';
}

function cancelDeleteAllMods(){
  var box=document.getElementById('mod-confirm-box');
  if(box)box.style.display='none';
}

function doDeleteAllMods(){
  var alsoAbs=false;
  var chk=document.getElementById('del-mods-check-abs');
  if(chk)alsoAbs=chk.checked;

  /* Collecter tous les noms de modules pour suppression éventuelle des absences */
  var allModNames=[];
  Object.values(modReg).forEach(function(arr){arr.forEach(function(m){if(allModNames.indexOf(m)<0)allModNames.push(m)})});

  /* Supprimer les modules */
  modReg={};saveMods();

  /* Supprimer les absences si demandé */
  if(alsoAbs&&allModNames.length>0){
    var before=st.rec.length;
    st.rec=st.rec.filter(function(r){return allModNames.indexOf(r.module)<0});
    saveRecs();
    var deleted=before-st.rec.length;
    toast('Tous les modules et '+deleted+' absence(s) ont \u00e9t\u00e9 supprim\u00e9s.');
  } else {
    toast('Tous les modules ont \u00e9t\u00e9 supprim\u00e9s.');
  }

  /* Re-rendre la modale puis la page */
  renderModModalInner();
  render();
}

/* ═══════ Gestion des étudiants ═══════ */
var _stuSearch='';
function openStuModal(){
  _stuSearch='';
  renderStuModalInner();
}

function renderStuModalInner(){
  var keys=regKeys().sort();
  var totalStus=0;
  keys.forEach(function(k){totalStus+=(stuReg[k]||[]).length});

  var h='<h3>Gestion des \u00e9tudiants</h3>';

  /* Ajout */
  h+='<div class="mgmt-header-row">';
  h+='<select id="stu-add-fil" onchange="stuAddFilChange()" style="width:100px"><option value="">Fili\u00e8re</option>';
  getAllFils().forEach(function(f){h+='<option value="'+f+'">'+f+'</option>'});
  h+='</select>';
  h+='<select id="stu-add-sem" style="width:80px"><option value="">Sem.</option></select>';
  h+='<input type="text" id="stu-add-name" placeholder="Nom de l\'\u00e9tudiant" style="flex:1;min-width:140px" onkeydown="if(event.key===\'Enter\')addStu()">';
  h+='<button class="btn" onclick="addStu()">Ajouter</button>';
  h+='</div>';

  /* Recherche */
  h+='<div class="mgmt-search"><input type="text" placeholder="Rechercher un \u00e9tudiant..." value="'+esc(_stuSearch)+'" oninput="_stuSearch=this.value;renderStuModalList()" style="width:100%"></div>';

  h+='<div id="stu-list-container">'+buildStuList(keys)+'</div>';
  h+='<div class="modal-actions"><button class="btn ghost" onclick="closeModals()">Fermer</button></div>';
  openModal(h);
}

function stuAddFilChange(){
  var fil=document.getElementById('stu-add-fil').value;
  var sel=document.getElementById('stu-add-sem');
  sel.innerHTML='<option value="">Sem.</option>';
  if(fil){getAllSems(fil).forEach(function(s){sel.innerHTML+='<option value="'+s+'">'+s+'</option>'})}
}

function addStu(){
  var fil=document.getElementById('stu-add-fil').value;
  var sem=document.getElementById('stu-add-sem').value;
  var name=document.getElementById('stu-add-name').value.trim().toUpperCase();
  if(!fil||!sem||!name){toast('Veuillez remplir tous les champs.');return}
  var k=mkKey(fil,sem);
  if(!stuReg[k])stuReg[k]=[];
  if(stuReg[k].indexOf(name)>=0){toast('Cet \u00e9tudiant existe d\u00e9j\u00e0.');return}
  stuReg[k].push(name);stuReg[k].sort();saveStus();
  if(!modReg[k]){modReg[k]=[];saveMods()}
  renderStuModalInner();render();toast('\u00c9tudiant ajout\u00e9.');
}

function delStu(fil,sem,name){
  var k=mkKey(fil,sem);
  if(stuReg[k]){stuReg[k]=stuReg[k].filter(function(s){return s!==name});if(stuReg[k].length===0)delete stuReg[k];saveStus()}
  renderStuModalInner();render();toast('\u00c9tudiant supprim\u00e9.');
}

function buildStuList(keys){
  var q=_stuSearch.toLowerCase();
  var h='',hasAny=false;
  keys.forEach(function(k){
    var p=parseKey(k);
    var stus=(stuReg[k]||[]).slice().sort();
    if(q){stus=stus.filter(function(s){return s.toLowerCase().indexOf(q)>=0})}
    if(stus.length===0)return;
    hasAny=true;
    h+='<div class="mgmt-section-title">'+esc(p.fil)+' — '+esc(p.sem)+' <span style="font-weight:400;color:var(--ink-soft)">('+stus.length+')</span></div>';
    h+='<div class="mgmt-list" style="max-height:200px;margin-bottom:8px">';
    stus.forEach(function(s){
      var cnt=st.rec.filter(function(r){return r.filiere===p.fil&&r.semestre===p.sem&&r.etudiant===s}).length;
      h+='<div class="mgmt-item"><div class="mgmt-item-info"><div class="mgmt-item-name">'+esc(s)+'</div><div class="mgmt-item-meta">'+cnt+' absence'+(cnt>1?'s':'')+'</div></div>';
      h+='<button class="btn danger" style="padding:3px 8px;font-size:10px" onclick="delStu(\''+esc(p.fil)+'\',\''+esc(p.sem)+'\',\''+esc(s).replace(/'/g,"\\'")+'\')">&#10005;</button></div>';
    });
    h+='</div>';
  });
  if(!hasAny){h='<div class="empty" style="padding:30px 10px;font-size:13px">Aucun \u00e9tudiant trouv\u00e9.</div>'}
  return h;
}

function renderStuModalList(){
  var c=document.getElementById('stu-list-container');
  if(c)c.innerHTML=buildStuList(regKeys().sort());
}

/* ═══════ Import XLSX ═══════ */
function openImportModal(){
  var h='<h3>Importer depuis Excel</h3>';
  h+='<div class="format-info">';
  h+='Le fichier doit contenir les colonnes : <code>Fili\u00e8re</code>, <code>Semestre</code>, <code>Date</code>, <code>S\u00e9ance</code>, <code>\u00c9tudiant</code>, <code>Module</code>, <code>Observation</code> (optionnelle).<br>';
  h+='La date doit \u00eatre au format <code>AAAA-MM-JJ</code> ou <code>JJ/MM/AAAA</code>.';
  h+='</div>';
  h+='<div class="drop-zone" id="import-drop" onclick="document.getElementById(\'import-file\').click()">';
  h+='<div class="drop-zone-icon">&#128196;</div>';
  h+='<div class="drop-zone-text">Cliquez ou glissez un fichier .xlsx / .xls</div>';
  h+='<div class="drop-zone-hint">Feuille 1 utilis\u00e9e par d\u00e9faut</div>';
  h+='</div>';
  h+='<input type="file" id="import-file" accept=".xlsx,.xls" style="display:none" onchange="handleImportFile(this)">';
  h+='<div id="import-preview"></div>';
  h+='<div class="modal-actions"><button class="btn ghost" onclick="closeModals()">Fermer</button></div>';
  openModal(h,true);

  /* Drag & drop */
  var zone=document.getElementById('import-drop');
  if(zone){
    zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('dragover')});
    zone.addEventListener('dragleave',function(){zone.classList.remove('dragover')});
    zone.addEventListener('drop',function(e){e.preventDefault();zone.classList.remove('dragover');if(e.dataTransfer.files.length){var inp=document.getElementById('import-file');var dt=new DataTransfer();dt.items.add(e.dataTransfer.files[0]);inp.files=dt.files;handleImportFile(inp)}});
  }
}

var _importData=[];
function handleImportFile(inp){
  if(!inp.files.length)return;
  var file=inp.files[0];
  loadXlsxLib().then(function(){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!rows.length){toast('Le fichier est vide.');return}
        _importData=parseImportRows(rows);
        renderImportPreview();
      }catch(err){toast('Erreur de lecture : '+err.message)}
    };
    reader.readAsArrayBuffer(file);
  }).catch(function(err){toast(err.message)});
}

function parseImportRows(rows){
  return rows.map(function(r){
    var d=r['Date']||r['date']||'';
    /* Essayer JJ/MM/AAAA → AAAA-MM-JJ */
    if(d&&/^\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}$/.test(d)){
      var parts=d.split(/[\/\-\.]/);
      if(parts[2].length===2)parts[2]='20'+parts[2];
      d=parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');
    }
    return{
      filiere:String(r['Fili\u00e8re']||r['filiere']||r['Filiere']||'').trim(),
      semestre:String(r['Semestre']||r['semestre']||'').trim(),
      date:String(d).trim(),
      seance:String(r['S\u00e9ance']||r['seance']||r['Seance']||'').trim(),
      etudiant:String(r['\u00c9tudiant']||r['etudiant']||r['Etudiant']||'').trim().toUpperCase(),
      module:String(r['Module']||r['module']||'').trim(),
      observation:String(r['Observation']||r['observation']||r['Obs.']||'').trim()||null
    }
  }).filter(function(r){return r.filiere&&r.semestre&&r.date&&r.etudiant&&r.module});
}

function renderImportPreview(){
  var existing=st.rec.slice();
  var newCount=0,dupCount=0;
  _importData.forEach(function(r){
    var dup=existing.some(function(e){
      return e.filiere===r.filiere&&e.semestre===r.semestre&&e.date===r.date&&e.seance===r.seance&&e.etudiant===r.etudiant&&e.module===r.module
    });
    if(dup)dupCount++;else newCount++;
  });

  var h='<div class="import-stats">';
  h+='<span><span class="dot" style="background:var(--good)"></span> Nouveaux : <strong>'+newCount+'</strong></span>';
  h+='<span><span class="dot" style="background:var(--gold)"></span> Doublons : <strong>'+dupCount+'</strong></span>';
  h+='</div>';

  if(newCount>0){
    h+='<div style="max-height:200px;overflow-y:auto;border:1px solid var(--paper-line);border-radius:var(--radius);margin-bottom:12px">';
    h+='<table class="preview-table"><thead><tr><th>Date</th><th>\u00c9tudiant</th><th>Module</th><th>Statut</th></tr></thead><tbody>';
    var existing2=st.rec.slice();
    _importData.forEach(function(r){
      var dup=existing2.some(function(e){return e.filiere===r.filiere&&e.semestre===r.semestre&&e.date===r.date&&e.seance===r.seance&&e.etudiant===r.etudiant&&e.module===r.module});
      h+='<tr><td>'+fmtDate(r.date)+'</td><td>'+esc(r.etudiant)+'</td><td>'+esc(r.module)+'</td>';
      h+='<td class="'+(dup?'dup':'new')+'">'+(dup?'Doublon':'Nouveau')+'</td></tr>';
    });
    h+='</tbody></table></div>';
    h+='<div class="modal-actions" style="margin-top:0"><button class="btn gold" onclick="doImport()">Importer '+newCount+' absence(s)</button></div>';
  } else {
    h+='<div style="text-align:center;color:var(--ink-soft);font-style:italic;padding:16px">Toutes les lignes sont des doublons.</div>';
  }

  var c=document.getElementById('import-preview');
  if(c)c.innerHTML=h;
}

function doImport(){
  var existing=st.rec.slice();
  var added=0;
  _importData.forEach(function(r){
    var dup=existing.some(function(e){return e.filiere===r.filiere&&e.semestre===r.semestre&&e.date===r.date&&e.seance===r.seance&&e.etudiant===r.etudiant&&e.module===r.module});
    if(dup)return;
    r.id=genId();st.rec.push(r);existing.push(r);added++;
    /* Mettre à jour registres */
    var k=mkKey(r.filiere,r.semestre);
    if(!modReg[k])modReg[k]=[];
    if(modReg[k].indexOf(r.module)<0){modReg[k].push(r.module)}
    if(!stuReg[k])stuReg[k]=[];
    if(stuReg[k].indexOf(r.etudiant)<0){stuReg[k].push(r.etudiant)}
  });
  saveRecs();saveMods();saveStus();
  closeModals();render();toast(added+' absence(s) import\u00e9e(s).');
}

/* ═══════ Initialisation ═══════ */
function init(){
  loadMods();loadStus();loadRecs();
  render();
}
init();
</script>
